<script>
let db=null;let solved=0;


const SECTIONS = [
// =========== PARTIE 2 : GROUP BY, HAVING, JOINTURES, SOUS-REQUETES ===========
{
  id:"groupby",
  title:"Partie 2 — Les regroupements (GROUP BY)",
  explanations:[
    {html:`<strong>GROUP BY</strong> — Comment regrouper les enregistrements sur une caracteristique commune ?<br><br>
Par exemple, on souhaite calculer le chiffre d'affaires (<code>CACLIC</code>) pour chaque categorie de client (<code>NOCAT</code>) ?<br>
Dans la table CLIENT, il y a 36 clients, donc 36 CACLIC.<br><br>
<div class="step">Etape 1 : Visualiser les donnees triees par categorie :<br><code>SELECT NOCLI, RSCLI, NOCAT, CACLIC FROM client ORDER BY NOCAT;</code></div>
<div class="step">Etape 2 : On souhaite additionner les CA pour chacune des categories. Deux commandes necessaires :<br>
• <code>GROUP BY NOCAT</code> pour regrouper par categorie<br>
• <code>SUM(CACLIC)</code> pour additionner les CA<br>
<code>SELECT NOCAT, SUM(CACLIC) FROM client GROUP BY NOCAT;</code></div>
<div class="step"><span class="warning">⚠ Regle GROUP BY :</span> Seules les colonnes "regroupables" peuvent etre dans le SELECT.<br>
• <code>SUM(CACLIC)</code> peut etre affiche (c'est une agregation)<br>
• <code>NOCLI</code>, <code>RSCLI</code> ne peuvent PAS etre affiches (pas dans le GROUP BY).<br>
Si on ajoute RSCLI → erreur "n'est pas une expression du GROUP BY".</div>`}
  ],
  exercises:[
    {n:1,cat:"GROUP BY",q:"Quel est le chiffre d'affaires moyen, maxi et mini par n° de famille d'article ?",
     hint:"Utilisez AVG(), MAX(), MIN() avec GROUP BY NOFAM",
     sol:"SELECT NOFAM, ROUND(AVG(CAART),2) AS 'CA moyen', MAX(CAART) AS 'CA maxi', MIN(CAART) AS 'CA mini'\nFROM article\nGROUP BY NOFAM;",
     check:r=>r.length>0&&r[0].columns.length>=4},
    {n:2,cat:"GROUP BY",q:"Calculer la somme des chiffres d'affaires des articles par n° de fournisseur. Respecter l'ordre et utiliser un alias de colonne.",
     hint:"SUM(CAART) avec GROUP BY NOFOUR, ORDER BY NOFOUR",
     sol:"SELECT NOFOUR, SUM(CAART) AS 'Total CA'\nFROM article\nGROUP BY NOFOUR\nORDER BY NOFOUR;",
     check:r=>r.length>0&&r[0].columns.length>=2},
    {n:3,cat:"GROUP BY",q:"Afficher le chiffre d'affaires (<code>CAREP</code>) total des representants par n° de secteur (<code>NOSECT</code>). Respecter l'ordre et l'alias.",
     hint:"SUM(CAREP) avec GROUP BY NOSECT, ORDER BY NOSECT",
     sol:"SELECT NOSECT, SUM(CAREP) AS 'CA total'\nFROM representant\nGROUP BY NOSECT\nORDER BY NOSECT;",
     check:r=>r.length>0}
  ]
},
{
  id:"having",
  title:"Partie 2 — Conditionner les regroupements (HAVING)",
  explanations:[
    {html:`<strong>HAVING</strong> — Si on ne souhaite pas afficher TOUS les regroupements, mais uniquement ceux correspondant a une condition, on utilise <code>HAVING</code> (en plus de GROUP BY).<br><br>
Exemple : CA moyen par categorie, uniquement pour les categories ayant un CA moyen > 98 000 :<br>
<code>SELECT NOCAT, ROUND(AVG(CACLIC),2) AS "CA moyen" FROM client<br>GROUP BY NOCAT<br>HAVING AVG(CACLIC) > 98000;</code><br><br>
<div class="step"><span class="warning">⚠ Difference cruciale :</span><br>
• <strong>WHERE</strong> = condition sur les <strong>enregistrements</strong> (avant regroupement)<br>
• <strong>HAVING</strong> = condition sur les <strong>groupes</strong> (apres regroupement)<br><br>
1. Selectionner certains enregistrements, puis les regrouper → <code>WHERE + GROUP BY</code><br>
2. Regrouper, puis selectionner certains groupes → <code>GROUP BY + HAVING</code></div>`}
  ],
  exercises:[
    {n:4,cat:"HAVING",q:"Somme et moyenne des chiffres d'affaires des articles par n° de famille ayant un chiffre d'affaires moyen superieur a 500 000.",
     hint:"GROUP BY NOFAM HAVING AVG(CAART) > 500000",
     sol:"SELECT NOFAM, SUM(CAART) AS 'Somme CA', ROUND(AVG(CAART),2) AS 'Moyenne CA'\nFROM article\nGROUP BY NOFAM\nHAVING AVG(CAART) > 500000;",
     check:r=>r.length>0},
    {n:5,cat:"WHERE+GROUP BY",q:"Somme et moyenne des CA des articles par n° de famille, pour les articles des fournisseurs n° 80, 100, 105, 111, 112.",
     hint:"WHERE NOFOUR IN (...) + GROUP BY NOFAM — ici WHERE filtre AVANT le regroupement",
     sol:"SELECT NOFAM, SUM(CAART) AS 'Somme CA', ROUND(AVG(CAART),2) AS 'Moyenne CA'\nFROM article\nWHERE NOFOUR IN (80, 100, 105, 111, 112)\nGROUP BY NOFAM;",
     check:r=>r.length>0}
  ]
},
{
  id:"jointures",
  title:"Partie 2 — Les jointures",
  explanations:[
    {html:`<strong>JOINTURE</strong> — Une jointure permet d'afficher dans le resultat d'une requete des attributs presents dans <strong>plusieurs tables</strong>.<br><br>
Exemple : On veut afficher les clients et leur categorie. Le libelle de la categorie se trouve dans la table <code>CATEGORIE</code>, pas dans <code>CLIENT</code>.<br>
<code>SELECT NOCLI, RSCLI, LIBCAT<br>FROM client, categorie<br>WHERE client.NOCAT = categorie.NOCAT;</code><br><br>
<div class="step"><strong>Syntaxe MySQL avec JOIN :</strong><br>
<code>SELECT NOCLI, RSCLI, LIBCAT<br>FROM client<br>JOIN categorie ON client.NOCAT = categorie.NOCAT;</code><br>
Les deux syntaxes sont equivalentes.</div>`}
  ],
  exercises:[
    {n:6,cat:"JOIN",q:"Lister les articles et le libelle de leur famille. Le resultat contient 38 lignes.",
     hint:"JOIN article et famille sur NOFAM",
     sol:"SELECT article.NOART, DESART, LIBFAM\nFROM article\nJOIN famille ON article.NOFAM = famille.NOFAM;",
     check:r=>r.length>0&&r[0].values.length>=30},
    {n:7,cat:"JOIN",q:"Lister les representants et le libelle de leur secteur.",
     hint:"JOIN representant et secteur sur NOSECT",
     sol:"SELECT representant.NOREP, NOMREP, PRNREP, LIBSECT\nFROM representant\nJOIN secteur ON representant.NOSECT = secteur.NOSECT;",
     check:r=>r.length>0}
  ]
},
{
  id:"join_multi",
  title:"Partie 2 — Jointures multiples",
  explanations:[
    {html:`<strong>Plusieurs jointures dans une meme requete</strong><br><br>
Exemple : Lister les clients (NOCLI, RSCLI), commandes (NOCDE) et articles (NOART, DESART) :<br>
<code>SELECT client.NOCLI, RSCLI, commande.NOCDE, article.NOART, DESART<br>FROM client<br>JOIN commande ON client.NOCLI = commande.NOCLI<br>JOIN lignecde ON commande.NOCDE = lignecde.NOCDE<br>JOIN article ON lignecde.NOART = article.NOART;</code><br><br>
<div class="step">On liste toutes les tables necessaires dans les JOIN (y compris celles ou aucune rubrique ne sera affichee, comme LIGNECDE).<br>
Le resultat comporte 122 lignes.</div>`}
  ],
  exercises:[
    {n:8,cat:"JOIN multiple",q:"Lister les livraisons en affichant le n° du client, sa raison sociale, le n° de livraison, le n° et la designation des articles, ainsi que la quantite livree dans l'ordre des n° de livraison. (102 lignes)",
     hint:"4 tables : livraison → client + ligneliv → article, ORDER BY NOLIV",
     sol:"SELECT client.NOCLI, RSCLI, livraison.NOLIV, article.NOART, DESART, QTELIV\nFROM livraison\nJOIN client ON livraison.NOCLI = client.NOCLI\nJOIN ligneliv ON livraison.NOLIV = ligneliv.NOLIV\nJOIN article ON ligneliv.NOART = article.NOART\nORDER BY livraison.NOLIV;",
     check:r=>r.length>0&&r[0].values.length>=80},
    {n:9,cat:"JOIN+LIKE",q:"Lister les articles dont la designation contient VTT (<code>NOART</code> et <code>DESART</code>), ainsi que leur famille (<code>LIBFAM</code>), fournisseur (<code>RSFOUR</code>) et branche (<code>LIBBRAN</code>).",
     hint:"4 tables : article → famille → fournisseur + branche, WHERE DESART LIKE '%VTT%'",
     sol:"SELECT article.NOART, DESART, LIBFAM, RSFOUR, LIBBRAN\nFROM article\nJOIN famille ON article.NOFAM = famille.NOFAM\nJOIN fournisseur ON article.NOFOUR = fournisseur.NOFOUR\nJOIN branche ON fournisseur.NOBRAN = branche.NOBRAN\nWHERE DESART LIKE '%VTT%';",
     check:r=>r.length>0}
  ]
},
{
  id:"join_group",
  title:"Partie 2 — Jointures + GROUP BY + Conditions",
  explanations:[
    {html:`<strong>Combiner jointures, conditions et regroupements</strong><br><br>
Exemple : Cumul des quantites commandees par article, pour les commandes restant a traiter (ETACDE = 'N') :<br><br>
<div class="step"><strong>Etape 1 :</strong> Le systeme execute la jointure entre les deux tables<br>
<code>SELECT NOART, QTECDE FROM lignecde<br>JOIN commande ON lignecde.NOCDE = commande.NOCDE<br>ORDER BY NOART;</code></div>
<div class="step"><strong>Etape 2 :</strong> Il applique la condition et ne retient que les enregistrements correspondants<br>
<code>SELECT NOART, QTECDE FROM lignecde<br>JOIN commande ON lignecde.NOCDE = commande.NOCDE<br>WHERE ETACDE = 'N'<br>ORDER BY NOART;</code></div>
<div class="step"><strong>Etape 3 :</strong> Il effectue en dernier les regroupements et calcule la somme des QTECDE<br>
<code>SELECT NOART, SUM(QTECDE) AS 'Cumul quantites commandees'<br>FROM lignecde<br>JOIN commande ON lignecde.NOCDE = commande.NOCDE<br>WHERE ETACDE = 'N'<br>GROUP BY NOART;</code><br>
Le resultat compte 17 enregistrements.</div>`}
  ],
  exercises:[
    {n:10,cat:"JOIN+GROUP+WHERE",q:"Lister le nombre de commandes par secteur, pour les representants dont le CA est superieur a 800 000.",
     hint:"JOIN representant + commande, WHERE CAREP > 800000, GROUP BY NOSECT",
     sol:"SELECT representant.NOSECT, COUNT(NOCDE) AS 'Nb commandes'\nFROM representant\nJOIN commande ON representant.NOREP = commande.NOREP\nWHERE CAREP > 800000\nGROUP BY representant.NOSECT;",
     check:r=>r.length>0}
  ]
},
{
  id:"group_col",
  title:"Partie 2 — Afficher une colonne hors GROUP BY",
  explanations:[
    {html:`<strong>Comment afficher une colonne sur laquelle ne porte pas le regroupement ?</strong><br><br>
On souhaite calculer le nombre de commandes par representant. On ne peut pas faire le GROUP BY sur NOMREP (risque d'homonymie). On regroupe sur NOREP.<br><br>
<div class="step">Requete avec seulement NOREP :<br><code>SELECT representant.NOREP, COUNT(NOCDE) AS 'Nb commandes'<br>FROM representant<br>JOIN commande ON representant.NOREP = commande.NOREP<br>GROUP BY representant.NOREP;</code></div>
<div class="step">Si on ajoute NOMREP dans le SELECT → <span class="warning">erreur "n'est pas une expression GROUP BY"</span><br>
→ Il faut ajouter NOMREP dans le GROUP BY :<br>
<code>SELECT representant.NOREP, NOMREP, COUNT(NOCDE) AS 'Nb commandes'<br>FROM representant<br>JOIN commande ON representant.NOREP = commande.NOREP<br>GROUP BY representant.NOREP, NOMREP;</code></div>`}
  ],
  exercises:[]
},
{
  id:"sousreq",
  title:"Partie 2 — Les sous-requetes",
  explanations:[
    {html:`<strong>SOUS-REQUETE</strong> — Comment integrer une requete dans une requete ?<br><br>
Exemple : Lister les clients dont le CACLIC est superieur au CA courant moyen.<br><br>
<div class="step"><strong>Methodologie :</strong> On commence par la fin !<br>
1. Ecrire la requete qui trouve le CA moyen : <code>SELECT AVG(CACLIC) FROM client;</code><br>
2. Ecrire la requete qui liste les clients dont le CA > ce resultat<br>
3. Remplacer la valeur par la sous-requete :<br>
<code>SELECT NOCLI, RSCLI, CACLIC FROM client<br>WHERE CACLIC > (SELECT AVG(CACLIC) FROM client);</code></div>`}
  ],
  exercises:[
    {n:11,cat:"Sous-requete",q:"Lister toutes les commandes ayant deja eu une livraison et ayant encore des articles en attente de livraison (utiliser l'ETACDE = 'N').",
     hint:"ETACDE = 'N' signifie que la commande n'est pas totalement livree mais une livraison existe",
     sol:"SELECT * FROM commande\nWHERE ETACDE = 'N';",
     check:r=>r.length>0},
    {n:12,cat:"NOT IN",q:"Les articles sont vendus de deux manieres : directement au magasin ou par le biais de commandes. Lister tous les articles n'ayant pas ete commandes.",
     hint:"Articles dont NOART n'est PAS dans la table lignecde → NOT IN ou NOT EXISTS",
     sol:"SELECT NOART, DESART FROM article\nWHERE NOART NOT IN (SELECT DISTINCT NOART FROM lignecde);",
     check:r=>r.length>0},
    {n:13,cat:"Sous-requete",q:"Tous les clients ayant commande l'article ayant le plus fort chiffre d'affaires de tous les articles commandes.",
     hint:"D'abord trouver le NOART avec le MAX(CAART) parmi les articles commandes, puis trouver les clients",
     sol:"SELECT DISTINCT client.NOCLI, RSCLI, article.NOART, DESART\nFROM client\nJOIN commande ON client.NOCLI = commande.NOCLI\nJOIN lignecde ON commande.NOCDE = lignecde.NOCDE\nJOIN article ON lignecde.NOART = article.NOART\nWHERE article.NOART = (\n  SELECT lignecde.NOART FROM lignecde\n  JOIN article ON lignecde.NOART = article.NOART\n  ORDER BY CAART DESC LIMIT 1\n);",
     check:r=>r.length>0},
    {n:14,cat:"HAVING+GROUP",q:"Lister tous les clients ayant passe au moins 2 commandes. Respecter l'ordre des enregistrements.",
     hint:"GROUP BY NOCLI HAVING COUNT(*) >= 2, JOIN client pour avoir RSCLI",
     sol:"SELECT client.NOCLI, RSCLI\nFROM client\nJOIN commande ON client.NOCLI = commande.NOCLI\nGROUP BY client.NOCLI, RSCLI\nHAVING COUNT(*) >= 2\nORDER BY client.NOCLI;",
     check:r=>r.length>0},
    {n:15,cat:"JOIN+GROUP",q:"Par n° de famille, le chiffre d'affaires moyen, maxi et mini des articles commandes.<br><span class='warning'>Attention : bien verifier le nombre de lignes et les montants de la famille 52.</span>",
     hint:"JOIN lignecde → article, GROUP BY NOFAM, avec AVG/MAX/MIN sur CAART des articles COMMANDES",
     sol:"SELECT article.NOFAM, ROUND(AVG(CAART),2) AS 'CA Moyen',\n       MAX(CAART) AS 'CA Maxi', MIN(CAART) AS 'CA mini'\nFROM article\nJOIN lignecde ON article.NOART = lignecde.NOART\nGROUP BY article.NOFAM\nORDER BY article.NOFAM;",
     check:r=>r.length>0},
    {n:16,cat:"NOT LIKE+WHERE",q:"Lister les clients n'appartenant pas au groupe VELOCIP (la raison sociale ne doit pas contenir VELOCIP) et n'appartenant pas a la categorie n° 6, classes par categorie, puis par raison sociale.",
     hint:"WHERE RSCLI NOT LIKE '%VELOCIP%' AND NOCAT <> 6 ORDER BY NOCAT, RSCLI",
     sol:"SELECT NOCLI, RSCLI, NOCAT FROM client\nWHERE RSCLI NOT LIKE '%VELOCIP%'\n  AND NOCAT <> 6\nORDER BY NOCAT, RSCLI;",
     check:r=>r.length>0},
    {n:17,cat:"GROUP BY",q:"Quel est le nombre d'articles par famille ?",
     hint:"COUNT(*) + GROUP BY NOFAM, JOIN famille pour le libelle",

{

Exemple : Lister les clients dont le CACLIC est inferieur au CA moyen de LEUR categorie :<br>
<code>SELECT NOCLI, RSCLI, CACLIC FROM client cl1<br>WHERE CACLIC < (SELECT AVG(CACLIC) FROM client cl2 WHERE cl2.NOCAT = cl1.NOCAT);</code><br><br>
<div class="step">La sous-requete est dite <strong>correlee</strong> car elle ne fait la moyenne que sur les clients dont le n° categorie est le meme que celui de la requete principale. D'ou la condition <code>cl2.NOCAT = cl1.NOCAT</code>.</div>`}

Exemple : Lister toutes les categories y compris celles sans client :<br>
<div class="step"><strong>Syntaxe Oracle :</strong> <code>WHERE cl.NOCAT(+) = cat.NOCAT</code> (le (+) est Oracle seulement)<br>
<strong>Syntaxe MySQL/standard :</strong> <code>LEFT JOIN</code><br>

<code>SELECT NOCLI, RSCLI, CACLIC FROM client WHERE NOCLI IN<br>  (SELECT NOCLI FROM commande GROUP BY NOCLI HAVING COUNT(*) = 1)<br>UNION<br>SELECT NOCLI, RSCLI, CACLIC FROM client cl1 WHERE CACLIC <<br>  (SELECT AVG(CACLIC) FROM client cl2 WHERE cl2.NOCAT = cl1.NOCAT)<br>ORDER BY 2;</code><br><br>
<div class="step"><span class="warning">⚠</span> UNION elimine les doublons. Les colonnes des deux SELECT doivent etre compatibles (meme nombre, memes types).<br>
En MySQL, utiliser <code>UNION ALL</code> pour garder les doublons.</div>`}

<div class="step"><span class="tip">Note MySQL :</span> MySQL ne supporte INTERSECT qu'a partir de la version 8.0.31. En SQLite c'est supporte. Alternative : utiliser <code>IN</code> avec une sous-requete.<br>
<code>SELECT NOART, DESART, CAART FROM article a1<br>WHERE CAART > (SELECT AVG(CAART) FROM article a2 WHERE a2.NOFAM = a1.NOFAM)<br>AND NOART IN (<br>  SELECT NOART FROM lignecde GROUP BY NOART HAVING COUNT(*) > 3<br>);</code></div>`}

<div class="step"><span class="warning">⚠ Attention :</span> l'ordre des requetes est capital ! Si on inverse, le resultat change completement.<br>
En MySQL >= 8.0.31 : <code>EXCEPT</code>. En SQLite : <code>EXCEPT</code>.<br>
Alternative : <code>AND NOART NOT IN (...)</code></div>`}

     sol:"SELECT a1.NOART, a1.DESART, a1.CAART FROM article a1\nWHERE a1.CAART > (SELECT AVG(CAART) FROM article a2 WHERE a2.NOFAM = a1.NOFAM)\nAND a1.NOART NOT IN (\n  SELECT NOART FROM lignecde GROUP BY NOART HAVING COUNT(*) > 3\n)\nORDER BY 1;",

{
  id:"any_all",

  explanations:[
    {html:`<strong>ANY</strong> — Comparer une valeur a <em>n'importe quelle</em> valeur ramenee par une sous-requete.<br>
<code>WHERE CACLIC > ANY (SELECT CACLIC FROM client WHERE NOCAT = 1)</code><br>
→ CA superieur a <strong>au moins un</strong> client de categorie 1 (= superieur au MIN).<br><br>
<strong>ALL</strong> — Comparer une valeur a <em>toutes</em> les valeurs ramenees.<br>
<code>WHERE CACLIC > ALL (SELECT CACLIC FROM client WHERE NOCAT = 1)</code><br>
→ CA superieur a <strong>tous</strong> les clients de categorie 1 (= superieur au MAX).<br><br>
<div class="step"><span class="tip">Equivalences :</span><br>
• <code>> ANY(...)</code> = <code>> MIN(...)</code><br>
• <code>> ALL(...)</code> = <code>> MAX(...)</code><br>
En SQLite, ANY/ALL ne sont pas supportes directement → utiliser MIN/MAX.</div>`}
  ],

<span class="tip">Remarque :</span> EXISTS peut etre remplace par NOT IN :<br>

  id:"transactions",
  title:"Partie 4 — Transactions (COMMIT, ROLLBACK)",
  explanations:[
    {html:`<strong>Gestion des transactions</strong><br><br>
Les mises a jour se font a travers des <strong>transactions</strong>. Toutes les operations effectuees entre le dernier COMMIT ou ROLLBACK sont temporaires.<br><br>
<div class="step">Exemple pratique (a tester dans le bac a sable) :<br>
<code>-- Verifier les donnees avant<br>SELECT * FROM lignefact LIMIT 5;<br><br>-- Supprimer toutes les lignes<br>DELETE FROM lignefact;<br>SELECT * FROM lignefact;  -- vide !<br><br>-- Annuler avec ROLLBACK<br>-- (en SQLite : pas de ROLLBACK sans BEGIN)<br>-- En MySQL : ROLLBACK; restitue les donnees</code></div>
<div class="step"><span class="tip">Cas d'usage :</span> L'enregistrement d'une commande necessite :<br>
1. Ajout de l'entete de commande (INSERT sur COMMANDE)<br>
2. Ajout des lignes de commande (INSERT sur LIGNECDE)<br>
3. Mise a jour du stock (UPDATE sur ARTICLE)<br>
Si une etape echoue → ROLLBACK annule TOUT.</div>`}
  ],
  exercises:[]
}
];

// Load GESCOM database

function resetDB(){
  if(db) db.close();
  fetch("../../sql/gescom_sqlite.sql").then(r=>r.text()).then(sqlText=>{
    db = new (db.constructor.constructor === Function ? db.constructor : window.SQL).Database();
    const stmts = sqlText.split(';').filter(s=>s.trim());
    for(const s of stmts){try{db.run(s+';');}catch(e){}}
    alert('BDD reinitialisee ! Toutes les donnees sont revenues a l\'etat initial.');
  });
}

async function initDB(){
  const sqlPromise = initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`});
  const dataPromise = fetch("../../sql/gescom_sqlite.sql").then(r=>r.text());
  const [SQL, sqlText] = await Promise.all([sqlPromise, dataPromise]);
  db = new SQL.Database();
  const stmts = sqlText.split(';').filter(s=>s.trim());
  for(const s of stmts){try{db.run(s+';');}catch(e){}}
  renderAll();
}

function renderAll(){
  const container = document.getElementById('content');
  const nav = document.getElementById('navBtns');
  let totalEx = 0;
  let html = '';
  let navHtml = '';
  
  SECTIONS.forEach((sec,si) => {
    navHtml += `<button class="nav-btn" onclick="document.getElementById('sec_${sec.id}').scrollIntoView({behavior:'smooth'})">${sec.title.replace(/Partie \d+ — /,'')}</button>`;
    html += `<div class="section" id="sec_${sec.id}"><h2>${sec.title}</h2>`;
    
    // Render explanations
    sec.explanations.forEach(exp => {
      html += `<div class="explanation">${exp.html}</div>`;
    });
    
    // Render exercises
    sec.exercises.forEach(ex => {
      totalEx++;
      html += `<div class="ex" id="ex_${ex.n}">
        <div class="ex-header">
          <span class="ex-num">Ex. ${ex.n}</span>
          <span class="ex-cat">${ex.cat}</span>
          <span class="ex-status pending" id="status_${ex.n}">En attente</span>
        </div>
        <div class="ex-q">${ex.q}</div>
        <textarea class="sql-input" id="input_${ex.n}" placeholder="-- Ecrivez votre requete SQL ici..."></textarea>
        <div class="btn-row">
          <button class="btn btn-run" onclick="runEx(${ex.n})">RUN</button>
          <button class="btn btn-hint" onclick="toggleHint(${ex.n})">Indice</button>
          <button class="btn btn-sol" onclick="toggleSol(${ex.n})">Solution</button>
        </div>
        <div class="hint-box" id="hint_${ex.n}">${ex.hint}</div>
        <div class="sol-box" id="sol_${ex.n}"><code>${ex.sol.replace(/\n/g,'<br>')}</code></div>
        <div class="result" id="result_${ex.n}"></div>
        <div class="error-msg" id="err_${ex.n}"></div>
      </div>`;
    });
    
    html += '</div>';
  });
  
  container.innerHTML = html;
  nav.innerHTML = navHtml;
  document.getElementById('total').textContent = totalEx;
}

function toggleHint(n){
  const el = document.getElementById('hint_'+n);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function toggleSol(n){
  const el = document.getElementById('sol_'+n);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function runEx(n){
  const sql = document.getElementById('input_'+n).value.trim();
  const resultDiv = document.getElementById('result_'+n);
  const errDiv = document.getElementById('err_'+n);
  errDiv.textContent = '';
  resultDiv.innerHTML = '';
  
  if(!sql){errDiv.textContent = 'Ecrivez une requete avant de cliquer RUN.';return;}
  
  try{
    // Execute potentially multiple statements
    const statements = sql.split(';').filter(s=>s.trim());
    let lastResult = null;
    for(const stmt of statements){
      const trimmed = stmt.trim();
      if(!trimmed) continue;
      if(trimmed.toUpperCase().startsWith('SELECT')){
        lastResult = db.exec(trimmed);
      } else {
        db.run(trimmed);
        // If DML, show affected message
        if(!trimmed.toUpperCase().startsWith('SELECT')){
          resultDiv.innerHTML += `<div class="result-info">✅ Commande executee : ${trimmed.substring(0,40)}...</div>`;
        }
      }
    }
    
    if(lastResult && lastResult.length > 0){
      const r = lastResult;
      let tbl = '<table><tr>';
      r[0].columns.forEach(c => tbl += `<th>${c}</th>`);
      tbl += '</tr>';
      r[0].values.forEach(row => {
        tbl += '<tr>';
        row.forEach(v => tbl += `<td>${v===null?'<em style="color:var(--muted)">NULL</em>':v}</td>`);
        tbl += '</tr>';
      });
      tbl += '</table>';
      resultDiv.innerHTML = tbl + `<div class="result-info">${r[0].values.length} ligne(s) retournee(s)</div>`;
      
      // Check if correct
      const sec = SECTIONS.find(s => s.exercises.some(e => e.n === n));
      const ex = sec?.exercises.find(e => e.n === n);
      if(ex && ex.check(r)){
        const st = document.getElementById('status_'+n);
        if(st.textContent !== '✅ Correct'){
          st.textContent = '✅ Correct';
          st.className = 'ex-status ok';
          solved++;
          updateProgress();
        }
      }
    } else if(resultDiv.innerHTML === ''){
      resultDiv.innerHTML = '<div class="result-info">Commande executee (pas de resultat SELECT).</div>';
    }
  }catch(e){
    errDiv.textContent = '❌ Erreur SQL : ' + e.message;
  }
}

function updateProgress(){
  const total = SECTIONS.reduce((s,sec) => s + sec.exercises.length, 0);
  document.getElementById('solved').textContent = solved;
  document.getElementById('pct').textContent = Math.round(solved/total*100) + '%';
  document.getElementById('pbar').style.width = Math.round(solved/total*100) + '%';
}

initDB();
</script>
