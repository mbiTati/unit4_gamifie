<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Boss LO4 — Le Documentaliste</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--surface:#fff;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--accent:#7c3aed;--success:#059669;--error:#dc2626;--code-bg:#1e293b}
[data-theme="dark"]{--bg:#090c14;--surface:#111827;--card:#1a2236;--text:#e2e8f0;--muted:#64748b;--border:rgba(255,255,255,.06);--code-bg:#0d1117}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
.header{background:var(--surface);padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.header h1{font-size:1rem;font-weight:800}.header .sub{font-size:.7rem;color:var(--muted)}
.sb{display:flex;gap:.5rem;align-items:center}
.sbi{background:var(--card);border:1px solid var(--border);padding:.2rem .6rem;border-radius:6px;text-align:center}
.sbi .l{font-size:.55rem;color:var(--muted);text-transform:uppercase}.sbi .v{font-size:.95rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.toggle{width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;position:relative;transition:.3s}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:var(--accent);border-radius:50%;transition:.3s}
[data-theme="dark"] .toggle::after{left:18px}
.main{max-width:700px;margin:0 auto;padding:1.5rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:.8rem;text-align:center;transition:.3s}
.card h2{font-size:1.3rem;font-weight:900;margin-bottom:.3rem}
.card p{color:var(--muted);font-size:.85rem}
.btn{padding:.55rem 1.3rem;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-go{background:var(--accent);color:#fff}.btn-go:hover{opacity:.9}
.progress{height:4px;background:var(--border);border-radius:2px;margin:.8rem 0;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.q-text{font-size:.95rem;font-weight:600;text-align:left;margin:.8rem 0;line-height:1.5}
.q-text code{background:var(--code-bg);color:#93c5fd;padding:.1rem .3rem;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.82rem}
.opt{display:block;width:100%;text-align:left;padding:.65rem 1rem;margin:.35rem 0;background:var(--surface);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.85rem;cursor:pointer;transition:.15s}
.opt:hover{border-color:var(--accent)}.opt.ok{border-color:var(--success);background:rgba(5,150,105,.06)}
.opt.ko{border-color:var(--error);background:rgba(220,38,38,.04)}.opt.off{pointer-events:none;opacity:.6}
.fb{padding:.6rem;border-radius:8px;margin-top:.5rem;font-size:.82rem;display:none;text-align:left}
.fb.show{display:block}.fb.g{background:rgba(5,150,105,.06);color:var(--success);border:1px solid rgba(5,150,105,.15)}
.fb.r{background:rgba(220,38,38,.04);color:var(--error);border:1px solid rgba(220,38,38,.1)}
.final{font-size:2.2rem;font-weight:900;color:var(--accent)}
.star{font-size:1.5rem;margin:.3rem 0}
.hist{text-align:left;margin-top:1rem;font-size:.78rem;line-height:1.8}
.hist-row{display:flex;align-items:center;gap:.4rem;padding:.15rem 0}
.back{display:block;text-align:center;margin-top:1rem;color:var(--muted);font-size:.75rem;font-weight:600;text-decoration:none}
.hidden{display:none}
</style></head><body>
<script>
if (!localStorage.getItem('cq_student')) { window.location.href = '../../app/login.html'; }
</script>

<div style="background:var(--surface,#1e293b);padding:.4rem 1rem;border-bottom:1px solid var(--border,#334155);position:sticky;top:0;z-index:100"><a href="../../index.html" style="font-size:.78rem;color:var(--muted,#94a3b8);text-decoration:none;font-weight:600;padding:.3rem .6rem;border:1px solid rgba(148,163,184,.2);border-radius:5px;transition:.2s">← Hub</a></div>

<div class="header">


  <div><h1>Boss LO4 — Le Documentaliste</h1><div class="sub">LO4 Documentation — DFD, flowcharts, guide utilisateur, D3</div></div>
  <div class="sb">
    <div class="sbi"><div class="l">Score</div><div class="v" id="sc">0</div></div>
    <div class="sbi"><div class="l">Streak</div><div class="v" id="st">0</div></div>
    <div class="sbi"><div class="l">Q.</div><div class="v"><span id="qn">0</span>/20</div></div>
    <div class="toggle" onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'"></div>
  </div>
</div>
<div class="main">
  <div class="card" id="intro"><h2>Le Documentaliste</h2><p>LO4 Documentation — DFD, flowcharts, guide utilisateur, D3</p><p style="margin-top:.4rem;font-size:.78rem">20 questions — Repondez vite pour maximiser le streak</p><button class="btn btn-go" onclick="go()" style="margin-top:1rem">Commencer</button></div>
  <div class="hidden" id="quiz"></div>
  <div class="hidden" id="fin"></div>
</div>

<script>
const Q=[{"q":"La documentation TECHNIQUE est destinee a :","o":["Les utilisateurs finaux","Les DEVELOPPEURS et DBA","Les clients","La direction uniquement"],"c":1,"e":"Doc technique = pour ceux qui maintiennent et developpent le systeme."},{"q":"Le DFD montre :","o":["La logique des decisions","Les FLUX DE DONNEES entre processus","Le code SQL","L'interface utilisateur"],"c":1,"e":"DFD = Data Flow Diagram = circulation des donnees dans le systeme."},{"q":"Le DFD niveau 0 est appele :","o":["Diagramme detaille","Diagramme de CONTEXTE","Diagramme physique","Flowchart"],"c":1,"e":"Niveau 0 = contexte : le systeme entier vu comme 1 seul processus."},{"q":"Dans un DFD, un cercle/rectangle arrondi represente :","o":["Un stockage","Un PROCESSUS (transformation de donnees)","Une entite externe","Un flux"],"c":1,"e":"Processus = action qui transforme les donnees entrantes en sortantes."},{"q":"Un rectangle ouvert dans un DFD represente :","o":["Un processus","Un STOCKAGE de donnees (data store / table BDD)","Une entite externe","Une decision"],"c":1,"e":"Rectangle ouvert = stockage. C'est une table ou un fichier de la BDD."},{"q":"Un rectangle ferme dans un DFD represente :","o":["Un processus","Un stockage","Une ENTITE EXTERNE (personne/systeme exterieur)","Un flux de donnees"],"c":1,"e":"Entite externe = source ou destination de donnees en dehors du systeme."},{"q":"Une fleche dans un DFD represente :","o":["Un processus","Un stockage","Une entite","Un FLUX DE DONNEES"],"c":1,"e":"Les fleches montrent la direction du transfert de donnees."},{"q":"Le niveau 2 du DFD decompose :","o":["Le systeme entier","UN processus du niveau 1 en sous-processus","Les entites externes","Les tables BDD"],"c":1,"e":"Chaque niveau 'zoome' dans un processus pour plus de details."},{"q":"Un losange dans un flowchart represente :","o":["Un processus","Un stockage","Une DECISION (oui/non, condition)","Une entree/sortie"],"c":1,"e":"Losange = decision/branchement. Oui ou Non, Vrai ou Faux."},{"q":"DFD et flowchart sont :","o":["Identiques","Complementaires mais DIFFERENTS","Inutiles","Reserves au DBA"],"c":1,"e":"DFD = flux de donnees. Flowchart = logique sequentielle. Deux outils differents."},{"q":"Le dictionnaire de donnees TECHNIQUE contient :","o":["Les mots de passe","Le TYPE MySQL exact + contraintes de chaque colonne","Les requetes favorites","Les captures d'ecran"],"c":1,"e":"Table par table, colonne par colonne : nom, type, contraintes, description."},{"q":"La documentation UTILISATEUR contient :","o":["Le code SQL","Des GUIDES PAS A PAS avec captures d'ecran","Les DFD","Le schema de la BDD"],"c":1,"e":"Doc utilisateur = comment UTILISER le systeme (pas comment il fonctionne)."},{"q":"Une bonne capture d'ecran dans un guide est :","o":["L'ecran entier sans annotation","NUMEROTEE avec elements entoures et legende","Juste du texte copie","Un screenshot flou"],"c":1,"e":"Annoter : numeroter les actions, entourer les boutons, ajouter une legende."},{"q":"La FAQ doit etre basee sur :","o":["Des questions inventees","Les VRAIS problemes rencontres par les utilisateurs","Le code SQL","Le MCD"],"c":1,"e":"Les meilleures FAQ viennent des erreurs reellement rencontrees."},{"q":"Le guide de demarrage rapide couvre :","o":["Toute la documentation","Les 5 PREMIERES MINUTES : connexion, navigation, 1ere action","La normalisation","Les tests"],"c":1,"e":"Quick start = juste ce qu'il faut pour commencer a utiliser le systeme."},{"q":"Pour le critere M5, il faut produire :","o":["Juste le guide utilisateur","Doc technique COMPLETE avec DFD et flowcharts","Seulement le DFD","Un email"],"c":1,"e":"M5 = documentation complete incluant DFD (flux) et flowcharts (logique)."},{"q":"Pour le critere D3, il faut :","o":["Juste decrire le systeme","Evaluer et proposer des AMELIORATIONS pour l'efficacite continue","Tout supprimer","Aucune action"],"c":1,"e":"D3 = evaluation + propositions concretes : cloud, API, BI, mobile, automatisation..."},{"q":"Un exemple d'amelioration D3 serait :","o":["Ajouter une 20eme table","Migrer vers le CLOUD pour la haute disponibilite","Supprimer les tests","Retirer les FK"],"c":1,"e":"Cloud (AWS RDS, Supabase), API REST, dashboard BI, app mobile..."},{"q":"La difference entre P5 et M5 :","o":["Aucune","P5 = produire la doc, M5 = doc COMPLETE avec DFD+flowcharts","P5 est plus difficile","M5 est optionnel"],"c":1,"e":"P5 = minimum (doc technique + utilisateur). M5 = enrichi avec diagrammes."},{"q":"Les symboles du flowchart : ovale, rectangle, losange, parallelogramme representent :","o":["Entite, relation, FK, PK","DEBUT/FIN, PROCESSUS, DECISION, ENTREE/SORTIE","Table, colonne, index, vue","Rien de special"],"c":1,"e":"Ovale=debut/fin. Rectangle=action. Losange=decision. Parallelogramme=E/S."}];
let cur=0,sc=0,str=0,mx=0,ans=[];
function go(){$('intro').classList.add('hidden');$('quiz').classList.remove('hidden');show()}
function $(i){return document.getElementById(i)}
function show(){const q=Q[cur];$('qn').textContent=cur+1;
$('quiz').innerHTML='<div class="card"><div class="progress"><div class="progress-fill" style="width:'+((cur/Q.length)*100)+'%"></div></div><div class="q-text">'+q.q+'</div><div id="os">'+q.o.map((o,i)=>'<button class="opt" onclick="pk('+i+')">'+o+'</button>').join('')+'</div><div class="fb" id="fb"></div></div>'}
function pk(i){const q=Q[cur],ok=i===q.c;if(ok){sc+=10+str*2;str++;if(str>mx)mx=str}else str=0;
ans.push({i:cur,ok});$('sc').textContent=sc;$('st').textContent=str;
document.querySelectorAll('.opt').forEach((o,j)=>{o.classList.add('off');if(j===q.c)o.classList.add('ok');if(j===i&&!ok)o.classList.add('ko')});
const f=$('fb');f.classList.add('show',ok?'g':'r');f.innerHTML=(ok?'<strong>Correct</strong>':'<strong>Incorrect</strong>')+' — '+q.e;
setTimeout(()=>{cur++;cur<Q.length?show():end()},ok?1200:2800)}
function end(){$('quiz').classList.add('hidden');const f=$('fin');f.classList.remove('hidden');
const p=Math.round(ans.filter(a=>a.ok).length/Q.length*100);
const s=p>=90?'*** EXCELLENT ***':p>=70?'** TRES BIEN **':p>=50?'* BIEN *':'';
f.innerHTML='<div class="card"><div class="final">'+sc+' pts</div><div class="star">'+s+'</div><p style="color:var(--muted)">'+p+'% — Streak max: '+mx+'</p><div class="hist">'+ans.map((a,i)=>'<div class="hist-row"><span style="color:'+(a.ok?'var(--success)':'var(--error)')+'">'+( a.ok?'V':'X')+'</span> '+Q[i].q.substring(0,70)+(Q[i].q.length>70?'...':'')+'</div>').join('')+'</div><button class="btn btn-go" onclick="location.reload()" style="margin-top:1rem">Rejouer</button></div>'}
</script><script src="../../app/comment-widget.js"></script>
<script src="../../app/progress-saver.js"></script>

<script>
// Auto-save score when leaving the page
window.addEventListener('beforeunload', function() {
  if (typeof saveGameScore === 'function') {
    var s = 0;
    if (typeof score !== 'undefined') s = score;
    else if (typeof totalScore !== 'undefined') s = totalScore;
    else if (typeof points !== 'undefined') s = points;
    else if (typeof correct !== 'undefined') s = correct * 10;
    if (s > 0) saveGameScore('boss_lo4', s, 0);
  }
});
</script>
</body></html>
