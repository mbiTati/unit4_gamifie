<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Boss Final — LO1 a LO4</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--surface:#fff;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--accent:#ea580c;--success:#059669;--error:#dc2626;--code-bg:#1e293b}
[data-theme="dark"]{--bg:#090c14;--surface:#111827;--card:#1a2236;--text:#e2e8f0;--muted:#64748b;--border:rgba(255,255,255,.06);--code-bg:#0d1117}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
.header{background:var(--surface);padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.header h1{font-size:1rem;font-weight:800}.sub{font-size:.7rem;color:var(--muted)}
.sb{display:flex;gap:.5rem;align-items:center}
.sbi{background:var(--card);border:1px solid var(--border);padding:.2rem .6rem;border-radius:6px;text-align:center}
.sbi .l{font-size:.55rem;color:var(--muted);text-transform:uppercase}.sbi .v{font-size:.95rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.toggle{width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;position:relative;transition:.3s}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:var(--accent);border-radius:50%;transition:.3s}
[data-theme="dark"] .toggle::after{left:18px}
.main{max-width:700px;margin:0 auto;padding:1.5rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:.8rem;text-align:center;transition:.3s}
.card h2{font-size:1.3rem;font-weight:900;margin-bottom:.3rem}
.card p{color:var(--muted);font-size:.85rem}
.btn{padding:.55rem 1.3rem;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-go{background:var(--accent);color:#fff}.btn-go:hover{opacity:.9}
.progress{height:4px;background:var(--border);border-radius:2px;margin:.8rem 0;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.q-text{font-size:.95rem;font-weight:600;text-align:left;margin:.8rem 0;line-height:1.5}
.q-text code{background:var(--code-bg);color:#93c5fd;padding:.1rem .3rem;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.82rem}
.opt{display:block;width:100%;text-align:left;padding:.65rem 1rem;margin:.35rem 0;background:var(--surface);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.85rem;cursor:pointer;transition:.15s}
.opt:hover{border-color:var(--accent)}.opt.ok{border-color:var(--success);background:rgba(5,150,105,.06)}
.opt.ko{border-color:var(--error);background:rgba(220,38,38,.04)}.opt.off{pointer-events:none;opacity:.6}
.fb{padding:.6rem;border-radius:8px;margin-top:.5rem;font-size:.82rem;display:none;text-align:left}
.fb.show{display:block}.fb.g{background:rgba(5,150,105,.06);color:var(--success);border:1px solid rgba(5,150,105,.15)}
.fb.r{background:rgba(220,38,38,.04);color:var(--error);border:1px solid rgba(220,38,38,.1)}
.final{font-size:2.2rem;font-weight:900;color:var(--accent)}.star{font-size:1.5rem;margin:.3rem 0}
.hidden{display:none}
.back{display:block;text-align:center;margin-top:1rem;color:var(--muted);font-size:.75rem;font-weight:600;text-decoration:none}
</style></head><body>
<div style="background:var(--surface,#1e293b);padding:.4rem 1rem;border-bottom:1px solid var(--border,#334155);position:sticky;top:0;z-index:100"><a href="../../index.html" style="font-size:.78rem;color:var(--muted,#94a3b8);text-decoration:none;font-weight:600;padding:.3rem .6rem;border:1px solid rgba(148,163,184,.2);border-radius:5px;transition:.2s">← Hub</a></div>

<div class="header">

<div><h1>Boss Final — Toutes les LO</h1><div class="sub">20 questions LO1 a LO4 melangees</div></div>
<div class="sb"><div class="sbi"><div class="l">Score</div><div class="v" id="sc">0</div></div><div class="sbi"><div class="l">Streak</div><div class="v" id="st">0</div></div><div class="sbi"><div class="l">Q.</div><div class="v"><span id="qn">0</span>/20</div></div><div class="toggle" onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'"></div></div></div>
<div class="main">
<div class="card" id="intro"><h2>Boss Final</h2><p>LO1 Conception + LO2 SQL + LO3 Tests + LO4 Documentation</p><p style="margin-top:.4rem;font-size:.78rem">20 questions melangees — Le defi ultime</p><button class="btn btn-go" onclick="go()" style="margin-top:1rem">Commencer</button></div>
<div class="hidden" id="quiz"></div><div class="hidden" id="fin"></div>
</div><script>
const Q=[{"q":"<code>A → B</code> en DF signifie :","o":["A depend de B","Connaitre A determine B de facon unique","A est la FK de B","B est un index"],"c":1,"e":"DF : connaitre A suffit pour trouver B."},{"q":"La CIF identifie le cote qui recevra :","o":["La PK","La FK lors du passage MCD→MLD","L'index","Le trigger"],"c":1,"e":"CIF = cote (0,1) ou (1,1) → FK en MLD."},{"q":"Atomicite 1NF et Atomicite ACID sont :","o":["Identiques","Deux concepts DIFFERENTS","Synonymes","Liees"],"c":1,"e":"1NF = valeur indivisible. ACID = transaction tout-ou-rien."},{"q":"<code>CREATE TABLE</code> est une commande :","o":["DML","DDL","DCL","DQL"],"c":1,"e":"DDL = Data Definition Language."},{"q":"<code>DELETE FROM artiste;</code> sans WHERE :","o":["Supprime 1 ligne","Supprime TOUTES les lignes","Erreur","Supprime la table"],"c":1,"e":"Sans WHERE = tout est supprime !"},{"q":"<code>IS NULL</code> vs <code>= NULL</code> :","o":["Pareil","IS NULL correct, = NULL ne marche PAS","= NULL correct","Aucun ne marche"],"c":1,"e":"NULL n'est pas une valeur → seul IS NULL fonctionne."},{"q":"<code>HAVING</code> filtre :","o":["Les lignes","Les GROUPES apres agregation","Les colonnes","Les tables"],"c":1,"e":"WHERE avant, HAVING apres GROUP BY."},{"q":"<code>LEFT JOIN</code> retourne :","o":["L'intersection","TOUT a gauche + NULL si pas de correspondance","Tout a droite","Le produit cartesien"],"c":1,"e":"LEFT = tout a gauche, meme sans match."},{"q":"Une VUE est :","o":["Une copie physique","Une requete SAUVEGARDEE (table virtuelle)","Un index","Un trigger"],"c":1,"e":"Vue = SELECT enregistre, recalcule a chaque appel."},{"q":"Le RGPD donne le droit a l'oubli :","o":["Oublier son mot de passe","Demander la SUPPRESSION de ses donnees","Supprimer la BDD","Tout chiffrer"],"c":1,"e":"Droit a l'effacement."},{"q":"Le test WHITE BOX :","o":["On ne voit pas le code","On CONNAIT le code interne","On teste au hasard","On ignore les erreurs"],"c":1,"e":"White box = on voit et teste le code."},{"q":"Donnees de test : normal + limite + erronee. La donnee LIMITE pour VARCHAR(100) est :","o":["'abc'","Chaine de EXACTEMENT 100 caracteres","NULL","Un nombre"],"c":1,"e":"Limite = aux bornes (100 car exact)."},{"q":"Le DFD montre :","o":["La logique","Les FLUX DE DONNEES","Le code SQL","Les tests"],"c":1,"e":"DFD = Data Flow Diagram."},{"q":"Un losange dans un flowchart = :","o":["Processus","Stockage","DECISION (oui/non)","Entree/sortie"],"c":2,"e":"Losange = branchement conditionnel."},{"q":"Pour D1 (design), il faut :","o":["Dessiner le MCD","EVALUER forces/faiblesses/ameliorations","Creer 20 tables","Coder en SQL"],"c":1,"e":"D1 = evaluation critique argumentee."},{"q":"<code>ON DELETE CASCADE</code> :","o":["Bloque","Supprime les ENFANTS avec le parent","Met a NULL","Ignore"],"c":1,"e":"CASCADE = suppression en cascade."},{"q":"<code>COUNT(*)</code> vs <code>COUNT(col)</code> :","o":["Identique","COUNT(*) tout, COUNT(col) IGNORE NULL","COUNT(col) plus rapide","Les deux ignorent NULL"],"c":1,"e":"COUNT(col) ignore les NULL."},{"q":"Le principe du moindre privilege :","o":["GRANT ALL","Droits STRICTEMENT necessaires","Aucun droit","Changer chaque jour"],"c":1,"e":"Minimum = meilleure securite."},{"q":"Pour D3 (documentation), il faut :","o":["Decrire le systeme","EVALUER et proposer des ameliorations continues","Tout supprimer","Rien"],"c":1,"e":"D3 = cloud, API, BI, mobile..."},{"q":"Une association N:M en MLD devient :","o":["FK simple","TABLE ASSOCIATIVE avec PK composee","Fusion des tables","Rien"],"c":1,"e":"N:M → table associative (ex: genre_artiste)."}];
let cur=0,sc=0,str=0,mx=0,ans=[];
function go(){document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');show()}
function show(){const q=Q[cur];document.getElementById('qn').textContent=cur+1;document.getElementById('quiz').innerHTML='<div class="card"><div class="progress"><div class="progress-fill" style="width:'+((cur/Q.length)*100)+'%"></div></div><div class="q-text">'+q.q+'</div><div id="os">'+q.o.map((o,i)=>'<button class="opt" onclick="pk('+i+')">'+o+'</button>').join('')+'</div><div class="fb" id="fb"></div></div>'}
function pk(i){const q=Q[cur],ok=i===q.c;if(ok){sc+=10+str*2;str++;if(str>mx)mx=str}else str=0;ans.push({i:cur,ok});document.getElementById('sc').textContent=sc;document.getElementById('st').textContent=str;document.querySelectorAll('.opt').forEach((o,j)=>{o.classList.add('off');if(j===q.c)o.classList.add('ok');if(j===i&&!ok)o.classList.add('ko')});const f=document.getElementById('fb');f.classList.add('show',ok?'g':'r');f.innerHTML=(ok?'<strong>Correct</strong>':'<strong>Incorrect</strong>')+' — '+q.e;setTimeout(()=>{cur++;cur<Q.length?show():end()},ok?1200:2800)}
function end(){document.getElementById('quiz').classList.add('hidden');const f=document.getElementById('fin');f.classList.remove('hidden');const p=Math.round(ans.filter(a=>a.ok).length/Q.length*100);const s=p>=90?''*** EXCELLENT ***'':p>=70?''** TRES BIEN **'':p>=50?''* BIEN *'':'';f.innerHTML='<div class="card"><div class="final">'+sc+' pts</div><div class="star">'+s+'</div><p style="color:var(--muted)">'+p+'% — Streak max: '+mx+'</p><button class="btn btn-go" onclick="location.reload()" style="margin-top:1rem">Rejouer</button></div>'}
</script></body></html>
