<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Boss LO3 — Le Chasseur de Bugs</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#090c14;--surface:#111827;--card:#1a2236;--text:#e2e8f0;--muted:#64748b;--border:rgba(255,255,255,.06);--accent:#f59e0b;--success:#10b981;--error:#ef4444}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.header{background:var(--surface);padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.6rem}.header h1{font-size:1.1rem;font-weight:800}.header .sub{font-size:.72rem;color:var(--muted)}.sb{display:flex;gap:.6rem}.sbi{background:rgba(255,255,255,.06);padding:.2rem .6rem;border-radius:5px;text-align:center}.sbi .l{font-size:.55rem;color:var(--muted);text-transform:uppercase}.sbi .v{font-size:1rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent)}.main{max-width:800px;margin:0 auto;padding:1.5rem}.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1.3rem;margin-bottom:.8rem;text-align:center}.card h2{font-size:1.4rem;font-weight:900;margin-bottom:.3rem}.card p{color:var(--muted);font-size:.85rem}.btn{padding:.6rem 1.5rem;border:none;border-radius:8px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:.2s;margin:.3rem}.btn-go{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(0,0,0,.2)}.btn-go:hover{transform:translateY(-1px)}.progress{height:5px;background:rgba(255,255,255,.06);border-radius:3px;margin:1rem 0;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}.quiz-opt{display:block;width:100%;text-align:left;padding:.7rem 1rem;margin:.4rem 0;background:var(--surface);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.88rem;cursor:pointer;transition:.15s}.quiz-opt:hover{border-color:var(--accent);background:rgba(255,255,255,.02)}.quiz-opt.correct{border-color:var(--success);background:rgba(16,185,129,.08)}.quiz-opt.wrong{border-color:var(--error);background:rgba(239,68,68,.06)}.quiz-opt.disabled{pointer-events:none;opacity:.7}.fb{padding:.6rem;border-radius:8px;margin-top:.5rem;font-size:.82rem;display:none}.fb.show{display:block}.fb.ok{background:rgba(16,185,129,.08);color:var(--success)}.fb.ko{background:rgba(239,68,68,.06);color:var(--error)}.streak{font-size:.7rem;color:var(--accent);margin-top:.3rem}.final-score{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hidden{display:none}.back{display:inline-block;margin-top:.8rem;color:var(--muted);font-size:.75rem;font-weight:600}
</style></head><body>
<div class="header"><div><h1>&#9876; Boss LO3 — Le Chasseur de Bugs</h1><div class="sub">Strategies de test — 10 questions</div></div><div class="sb"><div class="sbi"><div class="l">Score</div><div class="v" id="score">0</div></div><div class="sbi"><div class="l">Streak</div><div class="v" id="streak">0</div></div><div class="sbi"><div class="l">Question</div><div class="v"><span id="qn">0</span>/10</div></div></div></div>
<div class="main">
<div class="card" id="intro"><h2>&#9876; Le Chasseur de Bugs</h2><p>Strategies de test — 10 questions</p><p style="margin-top:.5rem;font-size:.8rem">10 questions — Repondez vite pour maximiser votre streak !</p><button class="btn btn-go" onclick="start()" style="margin-top:1rem">Commencer le combat</button></div>
<div class="hidden" id="quiz"></div>
<div class="hidden" id="final"></div>
</div>
<a class="back" href="../../index.html" style="display:block;text-align:center">&larr; Retour au hub</a>
<script>
const Q=[{"q":"White box testing signifie :","o":["On ne voit pas le code","On connait le code et la structure interne","On teste uniquement l'interface","On utilise des donnees aleatoires"],"c":1,"e":"White box = on voit le code. Black box = on teste sans voir le code."},{"q":"Une donnee de test ERRONEE sert a :","o":["Verifier le fonctionnement normal","Verifier que le systeme REJETTE les donnees invalides","Tester la performance","Rien"],"c":1,"e":"Donnee erronee = volontairement invalide. Le systeme DOIT la rejeter."},{"q":"La matrice de tracabilite relie :","o":["Tables entre elles","Tests aux besoins du cahier des charges","Bugs aux developpeurs","FK aux PK"],"c":1,"e":"Chaque besoin doit etre couvert par au moins 1 test."},{"q":"Apres correction d'un bug, il faut :","o":["Passer au test suivant","Re-tester le cas + tests de regression","Supprimer le test","Ignorer"],"c":1,"e":"Toujours re-tester apres correction. Les autres tests doivent aussi encore passer."},{"q":"INSERT avec email doublon sur UNIQUE retourne :","o":["Succes","Erreur 1062","Erreur 1452","NULL"],"c":1,"e":"Erreur 1062 = Duplicate entry for key."},{"q":"INSERT avec FK invalide retourne :","o":["Succes","Erreur 1048","Erreur 1452","Erreur 3819"],"c":2,"e":"Erreur 1452 = Cannot add child row: FK constraint fails."},{"q":"Le taux de couverture mesure :","o":["La vitesse","Le % de fonctionnalites testees","Le nombre de bugs","La satisfaction"],"c":1,"e":"Couverture = nb tests / nb fonctionnalites total."},{"q":"Pour M4, il faut :","o":["Juste lister les tests","Justifier le choix des donnees et analyser les resultats","100% de reussite","10 tests maximum"],"c":1,"e":"M4 = analyse argumentee de l'efficacite des tests."},{"q":"CHECK (prix >= 0) avec prix = -1 retourne :","o":["Succes","Erreur 3819","NULL","0"],"c":1,"e":"Erreur 3819 = Check constraint violated (MySQL 8.0.16+)."},{"q":"'' (chaine vide) est pareil que NULL :","o":["Vrai","Faux — '' est une valeur, NULL est l'ABSENCE de valeur","Depend du type","Seulement en MySQL"],"c":1,"e":"NOT NULL accepte '' (chaine vide). Ce sont 2 choses differentes."}];
let cur=0,sc=0,str=0,maxStr=0,ans=[];
function start(){document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');show()}
function show(){const q=Q[cur];document.getElementById('qn').textContent=cur+1;document.getElementById('quiz').innerHTML='<div class="card"><div class="progress"><div class="progress-fill" style="width:'+((cur/Q.length)*100)+'%"></div></div><h3 style="font-size:1rem;margin:.8rem 0;text-align:left;line-height:1.5">'+q.q+'</h3><div id="opts">'+q.o.map((o,i)=>'<button class="quiz-opt" onclick="pick('+i+')">'+o+'</button>').join('')+'</div><div class="fb" id="fb"></div><div class="streak" id="strk"></div></div>'}
function pick(i){const q=Q[cur],ok=i===q.c;if(ok){sc+=10+(str*2);str++;if(str>maxStr)maxStr=str}else{str=0}ans.push({i:cur,ok});document.getElementById('score').textContent=sc;document.getElementById('streak').textContent=str;const opts=document.querySelectorAll('.quiz-opt');opts.forEach((o,j)=>{o.classList.add('disabled');if(j===q.c)o.classList.add('correct');if(j===i&&!ok)o.classList.add('wrong')});const fb=document.getElementById('fb');fb.classList.add('show',ok?'ok':'ko');fb.textContent=ok?'Correct ! '+q.e:'Incorrect. '+q.e;document.getElementById('strk').textContent=str>1?'Streak: '+str+'x !':'';setTimeout(()=>{cur++;cur<Q.length?show():end()},ok?1200:2500)}
function end(){document.getElementById('quiz').classList.add('hidden');const f=document.getElementById('final');f.classList.remove('hidden');const pct=Math.round((ans.filter(a=>a.ok).length/Q.length)*100);const stars=pct>=90?'\u2B50\u2B50\u2B50':pct>=70?'\u2B50\u2B50':pct>=50?'\u2B50':'';f.innerHTML='<div class="card"><div class="final-score">'+sc+' pts</div><div style="font-size:1.5rem;margin:.3rem 0">'+stars+'</div><p style="color:var(--muted)">'+pct+'% correct — Streak max: '+maxStr+'</p><div style="margin-top:1rem;text-align:left">'+ans.map((a,i)=>'<div style="display:flex;align-items:center;gap:.4rem;padding:.3rem 0;font-size:.8rem"><span style="color:'+(a.ok?'var(--success)':'var(--error)')+';font-weight:700">'+(a.ok?'\u2713':'\u2717')+'</span><span>'+Q[i].q.substring(0,65)+'...</span></div>').join('')+'</div><button class="btn btn-go" onclick="location.reload()" style="margin-top:1rem">Rejouer</button></div>'}
</script></body></html>
