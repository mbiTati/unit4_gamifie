<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--lo1:#10b981;--lo2:#3b82f6;--lo4:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.topbar h1{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.topbar-right a{color:var(--muted);text-decoration:none;font-size:.72rem;font-weight:600;border:1px solid var(--border);padding:.3rem .6rem;border-radius:5px}
.main{max-width:800px;margin:0 auto;padding:1.5rem}

/* TABS */
.tabs{display:flex;gap:.3rem;margin-bottom:1.2rem;border-bottom:1px solid var(--border);padding-bottom:.3rem}
.tab{padding:.4rem .8rem;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none;font-family:inherit;border-radius:6px 6px 0 0}
.tab.active{color:var(--accent2);border-bottom:2px solid var(--accent2)}

/* PODIUM */
.podium{display:flex;justify-content:center;align-items:flex-end;gap:1rem;margin-bottom:2rem;min-height:200px}
.podium-item{text-align:center;position:relative}
.podium-bar{border-radius:12px 12px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:.8rem .6rem;min-width:100px}
.podium-rank{font-size:1.5rem;font-weight:900;margin-bottom:.3rem}
.podium-char{width:50px;height:65px;margin:0 auto}
.podium-name{font-size:.75rem;font-weight:700;margin-top:.4rem;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-score{font-size:.7rem;color:var(--muted)}
.podium-xp{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:.9rem}

/* LEADERBOARD */
.board{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.board-row{display:flex;align-items:center;padding:.6rem 1rem;border-bottom:1px solid var(--border);gap:.8rem;transition:background .2s}
.board-row:last-child{border-bottom:none}
.board-row:hover{background:rgba(50,224,196,.02)}
.board-row.me{background:rgba(50,224,196,.05);border-left:3px solid var(--accent2)}
.rank{font-size:.9rem;font-weight:800;min-width:28px;text-align:center;font-family:'JetBrains Mono',monospace}
.rank-1{color:#fbbf24}.rank-2{color:#d1d5db}.rank-3{color:#d97706}
.board-char{width:36px;height:46px;flex-shrink:0}
.board-info{flex:1;min-width:0}
.board-name{font-size:.82rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.board-level{font-size:.62rem;font-weight:600;padding:.1rem .3rem;border-radius:3px;display:inline-block}
.board-stats{display:flex;gap:1rem;align-items:center;flex-shrink:0}
.board-stat{text-align:right}
.board-stat .n{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.82rem}
.board-stat .l{font-size:.55rem;color:var(--muted);text-transform:uppercase}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--muted)}
</style>
</head>

if (!localStorage.getItem('cq_student')) { window.location.href = 'login.html'; }

  <!-- CLASS FILTER -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap">

      <option value="all">Toutes les classes</option>

<script>
const student = JSON.parse(localStorage.getItem('cq_student') || 'null');

function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  ['xp','exercises','scores','duels'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === id ? 'block' : 'none';
  });
}

async function loadScores() {
  const students = await supabase.query('cq_students', { select: '*', order: 'last_name.asc' }) || [];
  const allStudentsFull = Array.isArray(students) ? students.filter(s => s.role !== 'teacher') : [];
  
  // Populate class filter
  const classFilter = document.getElementById('classFilter');
  const classes = [...new Set(allStudentsFull.map(s => s.class_name).filter(Boolean))].sort();
  // Default to student's own class (never show "all")
  const studentData = JSON.parse(localStorage.getItem('cq_student') || 'null');
  const myClass = studentData?.class_name || 'BI1';
  if (classFilter.value === 'all' && !classFilter.dataset.userChanged) {
    classFilter.value = myClass;
  }
  const currentClass = classFilter.value;
  // Teachers see "Toutes", students only see their class by default
  const isTeacher = studentData?.role === 'teacher';
  classFilter.innerHTML = (isTeacher ? '<option value="all">Toutes les classes</option>' : '') + 
    classes.map(cl => '<option value="' + cl + '"' + (cl === currentClass ? ' selected' : '') + '>' + cl + '</option>').join('');
  
  // Filter by selected class
  const allStudents = currentClass === 'all' 
    ? allStudentsFull 
    : allStudentsFull.filter(s => s.class_name === currentClass);
  
  document.getElementById('filterInfo').textContent = allStudents.length + ' élève(s)' + (currentClass !== 'all' ? ' en ' + currentClass : '');
  
  var _ps = await supabase.query('cq_student_progress', { select: '*', filter: { 'unit_id': 'eq.4' } }).catch(function(){return [];});
  if (!Array.isArray(_ps)) _ps = await supabase.query('cq_student_progress', { select: '*' }).catch(function(){return [];});
  var progress = Array.isArray(_ps) ? _ps : [];
  const progressList = Array.isArray(progress) ? progress : [];
  
  var _gs = await supabase.query('cq_game_scores', { select: '*', filter: { 'unit_id': 'eq.4' } }).catch(function(){return [];});
  if (!Array.isArray(_gs)) _gs = await supabase.query('cq_game_scores', { select: '*' }).catch(function(){return [];});
  var gameScores = Array.isArray(_gs) ? _gs : [];
  const gsList = Array.isArray(gameScores) ? gameScores : [];
  
  // Load privacy settings
  const settingsRaw = await supabase.query('cq_student_settings', { select: '*' }) || [];
  const settingsList = Array.isArray(settingsRaw) ? settingsRaw : [];
  const privateStudents = new Set(
    settingsList.filter(s => s.scores_public === false).map(s => s.student_id)
  );
  
  // Calculate per-student stats
  // Filter: hide students who set scores_public = false (except current user)
  const visibleStudents = allStudents.filter(s => 
    !privateStudents.has(s.id) || (student && s.id === student.id)
  );
  
  const rankings = visibleStudents.map(s => {
    const sp = progressList.filter(p => p.student_id === s.id);
    let xpFromProgress = 0;
    for (const p of sp) xpFromProgress += (p.credits_earned || 0) + (p.game_score || 0);
    
    const myGames = gsList.filter(g => g.student_id === s.id);
    const totalGameScore = myGames.reduce((a, g) => a + (g.score || 0), 0);
    const exercisesDone = new Set(myGames.map(g => g.game_id)).size;
    // XP from games: best score per game, /5, max 20 per game
    const bestPerGame = {};
    for (const g of myGames) {
      if (!bestPerGame[g.game_id] || g.score > bestPerGame[g.game_id]) {
        bestPerGame[g.game_id] = g.score;
      }
    }
    const xpFromGames = Object.values(bestPerGame).reduce((a, s) => a + Math.min(Math.floor(s / 5), 20), 0);
    const totalXP = xpFromProgress + xpFromGames;
    const level = getLevel(totalXP);
    
    return {
      ...s,
      totalXP,
      totalGameScore,
      exercisesDone,
      gamesPlayed: myGames.length,
      level,
    };
  });
  
  // Sort for each tab
  const byXP = [...rankings].sort((a, b) => b.totalXP - a.totalXP);
  const byExo = [...rankings].sort((a, b) => b.exercisesDone - a.exercisesDone || b.totalGameScore - a.totalGameScore);
  const byScore = [...rankings].sort((a, b) => b.totalGameScore - a.totalGameScore);
  
  // Add duel stats
  const rankingsWithDuels = rankings.map(r => {
    const duelGames = gsList.filter(g => g.student_id === r.id && g.game_id === 'duel-sql');
    return { ...r, duelCount: duelGames.length, duelScore: duelGames.reduce((a,g) => a + (g.score||0), 0) };
  });
  
  const byXP2 = [...rankingsWithDuels].sort((a, b) => b.totalXP - a.totalXP);
  const byExo2 = [...rankingsWithDuels].sort((a, b) => b.exercisesDone - a.exercisesDone || b.totalGameScore - a.totalGameScore);
  const byScore2 = [...rankingsWithDuels].sort((a, b) => b.totalGameScore - a.totalGameScore);
  const byDuels = [...rankingsWithDuels].sort((a, b) => b.duelScore - a.duelScore || b.duelCount - a.duelCount);
  
  renderBoard('XP', byXP2, 'totalXP', 'XP', 'exercisesDone', 'Exercices');
  renderBoard('Exo', byExo2, 'exercisesDone', 'Exercices', 'totalGameScore', 'Score');
  renderBoard('Score', byScore2, 'totalGameScore', 'Score', 'exercisesDone', 'Exercices');
  renderBoard('Duels', byDuels, 'duelScore', 'Pts duel', 'duelCount', 'Duels');
  
  // Teacher badge
  if (isTeacher) {
    var obs = document.createElement('div');
    obs.style.cssText = 'max-width:800px;margin:.5rem auto;padding:.5rem 1rem;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-family:Outfit,sans-serif;font-size:.75rem;color:#F59E0B;text-align:center;font-weight:700';
    obs.textContent = '👁️ Mode Observateur — Vous voyez le classement de vos élèves';
    var mainEl = document.querySelector('.main');
    if (mainEl) mainEl.insertBefore(obs, mainEl.firstChild);
  }
}

function renderBoard(suffix, data, mainKey, mainLabel, secKey, secLabel) {
  const podium = document.getElementById('podium' + suffix);
  const board = document.getElementById('board' + suffix);
  
  if (data.length === 0) {
    podium.innerHTML = '';
    board.innerHTML = '<div class="empty">Aucune donnée pour le moment.</div>';
    return;
  }
  
  // Podium — top 3
  const podiumColors = ['#fbbf24', '#d1d5db', '#d97706'];
  const podiumHeights = [160, 130, 110];
  const podiumOrder = data.length >= 3 ? [1, 0, 2] : data.length >= 2 ? [1, 0] : [0];
  
  let pHtml = '';
  for (const pos of podiumOrder) {
    if (pos >= data.length) continue;
    const s = data[pos];
    const color = podiumColors[pos];
    const h = podiumHeights[pos];
    pHtml += '<div class="podium-item">';
    pHtml += '<div class="podium-char" id="podchar' + suffix + pos + '"></div>';
    pHtml += '<div class="podium-bar" style="height:' + h + 'px;background:' + color + '12;border:1px solid ' + color + '30">';
    pHtml += '<div class="podium-rank" style="color:' + color + '">' + (pos === 0 ? '🥇' : pos === 1 ? '🥈' : '🥉') + '</div>';
    pHtml += '<div class="podium-xp" style="color:' + color + '">' + s[mainKey] + '</div>';
    pHtml += '<div class="podium-score" style="font-size:.6rem">' + mainLabel + '</div>';
    pHtml += '</div>';
    pHtml += '<div class="podium-name">' + s.first_name + ' ' + s.last_name.charAt(0) + '.</div>';
    pHtml += '</div>';
  }
  podium.innerHTML = pHtml;
  
  // Create characters on podium
  for (const pos of podiumOrder) {
    if (pos >= data.length) continue;
    const container = document.getElementById('podchar' + suffix + pos);
    if (container) {
      const ch = createCharacter(data[pos].level.index, container, 40);
      ch.classList.add(pos === 0 ? 'dancing' : 'bouncing');
    }
  }
  
  // Full leaderboard
  let bHtml = '';
  for (let i = 0; i < data.length; i++) {
    const s = data[i];
    const isMe = student && s.id === student.id;
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    
    bHtml += '<div class="board-row ' + (isMe ? 'me' : '') + '">';
    bHtml += '<div class="rank ' + rankClass + '">' + (i + 1) + '</div>';
    bHtml += '<div class="board-char" id="bchar' + suffix + i + '"></div>';
    bHtml += '<div class="board-info">';
    bHtml += '<div class="board-name">' + s.first_name + ' ' + s.last_name + (isMe ? ' (vous)' : '') + '</div>';
    bHtml += '<span class="board-level" style="background:' + s.level.color + '15;color:' + s.level.color + '">' + s.level.name + '</span>';
    bHtml += '</div>';
    bHtml += '<div class="board-stats">';
    bHtml += '<div class="board-stat"><div class="n" style="color:var(--accent2)">' + s[mainKey] + '</div><div class="l">' + mainLabel + '</div></div>';
    bHtml += '<div class="board-stat"><div class="n">' + s[secKey] + '</div><div class="l">' + secLabel + '</div></div>';
    bHtml += '</div>';
    bHtml += '</div>';
  }
  board.innerHTML = bHtml;
  
  // Create mini characters in leaderboard
  for (let i = 0; i < Math.min(data.length, 20); i++) {
    const container = document.getElementById('bchar' + suffix + i);
    if (container) {
      const ch = createCharacter(data[i].level.index, container, 30);
      if (student && data[i].id === student.id) ch.classList.add('bouncing');
    }
  }
}

loadScores();

function doLogout() {
  localStorage.removeItem('cq_student');
  localStorage.removeItem('cq_token');
  localStorage.removeItem('cq_refresh');
  localStorage.removeItem('cq_user');
  window.location.href = 'login.html';
}
</script>
