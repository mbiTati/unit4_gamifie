<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DataQuest — Gestion des Projets</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--lo1:#10b981;--lo2:#3b82f6;--lo4:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.main{max-width:1000px;margin:0 auto;padding:1.5rem 1rem}
.project-tabs{display:flex;gap:.3rem;margin-bottom:1.2rem;flex-wrap:wrap}
.ptab{padding:.4rem .8rem;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--muted);border:1px solid var(--border);background:var(--card);border-radius:6px;font-family:inherit;transition:all .2s}
.ptab:hover{border-color:var(--accent2);color:var(--accent2)}
.ptab.active{color:var(--lo1);border-color:var(--lo1);background:rgba(16,185,129,.06)}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem;margin-bottom:.8rem;overflow:hidden}
.team-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.team-name{font-size:.85rem;font-weight:800;color:var(--accent2)}
.team-members{font-size:.65rem;color:var(--muted)}
.team-progress{font-size:.7rem;font-weight:700}
.step-row{border:1px solid var(--border);border-radius:6px;padding:.5rem .6rem;margin-bottom:.3rem;transition:all .2s}
.step-row.done{border-color:var(--lo1);background:rgba(16,185,129,.02)}
.step-header{display:flex;justify-content:space-between;align-items:center}
.step-name{font-size:.72rem;font-weight:700}
.step-meta{font-size:.6rem;color:var(--lo1);font-weight:700}
.step-work{font-size:.65rem;color:var(--text);margin-top:.3rem;padding:.4rem;background:rgba(255,255,255,.02);border-radius:4px;max-height:150px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--border);line-height:1.4}
.step-actions{margin-top:.3rem;display:flex;gap:.3rem;align-items:center}
.step-actions textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.3rem .4rem;font-size:.65rem;font-family:inherit;resize:vertical;min-height:32px}
.btn{border:none;padding:.3rem .7rem;border-radius:4px;font-size:.65rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.btn-blue{background:var(--lo2);color:#fff}.btn-blue:hover{opacity:.8}
.btn-green{background:var(--lo1);color:#fff}.btn-green:hover{opacity:.8}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{opacity:.8}
.btn-red{background:var(--error);color:#fff}.btn-red:hover{opacity:.8}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem}
.manage-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem}
.manage-title{font-size:.85rem;font-weight:800;color:var(--gold);margin-bottom:.5rem}
</style>
</head>
<body>
<script>
if (!localStorage.getItem('cq_student')) { window.location.href = 'login.html'; }
var student = JSON.parse(localStorage.getItem('cq_student') || 'null');
if (!student || student.role !== 'teacher') {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Outfit,sans-serif"><div style="text-align:center;color:var(--error)">Accès réservé aux enseignants.<br><a href="login.html" style="color:var(--accent2)">Se connecter</a></div></div>';
}
</script>

<div class="main">
  <h1 style="font-size:1.2rem;font-weight:900;margin-bottom:.2rem;background:linear-gradient(135deg,var(--lo1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">📋 Gestion des Projets</h1>
  <p style="font-size:.72rem;color:var(--muted);margin-bottom:1rem">Créez les équipes, suivez l'avancement, commentez et validez chaque étape.</p>

  <!-- Project selector -->
  <div class="project-tabs" id="projectTabs"></div>

  <!-- Management section -->
  <div class="manage-section" id="manageSection">
    <div class="manage-title">👑 Gestion (prof)</div>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem">
      <span style="font-size:.72rem;font-weight:600">Équipes de</span>
      <select id="teamSize" style="background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.2rem;font-size:.7rem;font-family:inherit">
        <option value="2">2</option><option value="3" selected>3</option><option value="4">4</option>
      </select>
      <button class="btn btn-green" onclick="autoTeams()">Former les équipes</button>
      <button class="btn btn-red" onclick="resetTeams()">Réinitialiser</button>
      <span style="margin-left:auto;display:flex;gap:.3rem">
        <button class="btn btn-gold" onclick="unlockProject()">Débloquer projet</button>
        <button class="btn" style="background:var(--border);color:var(--text)" onclick="lockProject()">Verrouiller</button>
      </span>
    </div>
    <div id="manageMsg" style="font-size:.7rem;min-height:1.2rem;margin-top:.3rem"></div>
    
    <!-- Manual student assignment -->
    <div style="margin-top:.6rem;padding-top:.5rem;border-top:1px solid var(--border);display:flex;gap:.4rem;align-items:center;flex-wrap:wrap">
      <span style="font-size:.68rem;font-weight:700;color:var(--lo2)">Ajouter un élève :</span>
      <select id="addStudentSelect" style="background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.2rem .4rem;font-size:.68rem;font-family:inherit;min-width:150px"></select>
      <span style="font-size:.68rem;color:var(--muted)">→ Équipe</span>
      <select id="addTeamSelect" style="background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.2rem .4rem;font-size:.68rem;font-family:inherit;width:60px"></select>
      <button class="btn btn-blue" onclick="addStudentToTeam()" style="font-size:.65rem">+ Ajouter</button>
      <span id="addStudentMsg" style="font-size:.6rem;min-width:100px"></span>
    </div>
  </div>

  <!-- Teams & submissions -->
  <div id="teamsContent"><div class="empty">Sélectionnez un projet ci-dessus.</div></div>
</div>

<script src="supabase-config.js?v=1774960217"></script>
<script>
var SB_URL = 'https://jslbfkaujahihvjdxcjg.supabase.co/rest/v1';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGJma2F1amFoaWh2amR4Y2pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODA3MzksImV4cCI6MjA4ODE1NjczOX0.h1lCm-DOG8wgUpMc0Ob1fUDSGpSu_Ix6PpboggdAVAc';

var PROJECTS = {
  'veloshop': 'VéloShop',
  'techrepair': 'TechRepair',
  'swissevent': 'SwissEvent',
  'meethub': 'MeetHub',
  'hotelview': 'HotelView',
  'saasboard': 'SaaSBoard'
};
var STEPS = ['Recueil des besoins', 'Dictionnaire des données', 'MCD', 'MLD + SQL', 'Requêtes', 'Tests + Documentation'];

var currentProjectId = null;
var allStudentsMap = {};

// Build project tabs
(function() {
  var html = '';
  for (var pid in PROJECTS) {
    html += '<button class="ptab" data-pid="' + pid + '" onclick="selectProject(\'' + pid + '\')">' + PROJECTS[pid] + '</button>';
  }
  document.getElementById('projectTabs').innerHTML = html;
})();

function selectProject(pid) {
  currentProjectId = pid;
  document.querySelectorAll('.ptab').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-pid') === pid);
  });
  loadTeams();
}

async function loadStudentsMap() {
  if (Object.keys(allStudentsMap).length > 0) return;
  try {
    var res = await fetch(SB_URL + '/cq_students?select=id,first_name,last_name&role=eq.student', { headers: { 'apikey': SB_KEY } });
    var list = await res.json();
    if (Array.isArray(list)) {
      for (var i = 0; i < list.length; i++) {
        allStudentsMap[list[i].id] = list[i].first_name + ' ' + list[i].last_name;
      }
    }
  } catch(e) {}
}

async function loadTeams() {
  if (!currentProjectId) return;
  var container = document.getElementById('teamsContent');
  container.innerHTML = '<div class="empty">Chargement...</div>';
  
  await loadStudentsMap();
  
  try {
    // Load team members
    var tmRes = await fetch(SB_URL + '/cq_team_members?project_id=eq.' + currentProjectId + '&unit_id=eq.4&order=team_number.asc', { headers: { 'apikey': SB_KEY } });
    var teamMembers = await tmRes.json();
    if (!Array.isArray(teamMembers)) teamMembers = [];
    
    // Load step progress
    var spRes = await fetch(SB_URL + '/cq_team_step_progress?project_id=eq.' + currentProjectId + '&unit_id=eq.4&order=team_number.asc,step_index.asc', { headers: { 'apikey': SB_KEY } });
    var stepProgress = await spRes.json();
    if (!Array.isArray(stepProgress)) stepProgress = [];
    
    // Group by team
    var teams = {};
    for (var ti = 0; ti < teamMembers.length; ti++) {
      var tm = teamMembers[ti];
      if (!teams[tm.team_number]) teams[tm.team_number] = { members: [], leader: null };
      var name = allStudentsMap[tm.student_id] || tm.student_id;
      teams[tm.team_number].members.push(name);
      if (!teams[tm.team_number].leader) teams[tm.team_number].leader = name;
    }
    
    // Group steps
    var stepsByTeam = {};
    for (var si = 0; si < stepProgress.length; si++) {
      var sp = stepProgress[si];
      if (!stepsByTeam[sp.team_number]) stepsByTeam[sp.team_number] = {};
      stepsByTeam[sp.team_number][sp.step_index] = sp;
    }
    
    // Show teams in manage section
    var msg = document.getElementById('manageMsg');
    if (Object.keys(teams).length > 0) {
      var mhtml = '<div style="font-size:.72rem;color:var(--lo1);font-weight:700;margin-bottom:.3rem">' + Object.keys(teams).length + ' équipes créées :</div>';
      for (var tn in teams) {
        var t = teams[tn];
        mhtml += '<div style="font-size:.68rem;margin-bottom:.15rem">';
        mhtml += '<span style="color:var(--accent2);font-weight:700">Équipe ' + tn + '</span> : ';
        mhtml += '<span style="color:var(--gold)">👑</span> ' + t.leader;
        if (t.members.length > 1) mhtml += ', ' + t.members.slice(1).join(', ');
        mhtml += '</div>';
      }
      msg.innerHTML = mhtml;
    } else {
      msg.innerHTML = '<span style="color:var(--muted)">Aucune équipe. Cliquez "Former les équipes".</span>';
    }
    
    if (Object.keys(teams).length === 0) {
      container.innerHTML = '<div class="empty">Aucune équipe pour ' + PROJECTS[currentProjectId] + '.<br>Cliquez "Former les équipes" ci-dessus.</div>';
      return;
    }
    
    // Render teams with steps
    var html = '';
    for (var tn2 in teams) {
      var team = teams[tn2];
      var tSteps = stepsByTeam[tn2] || {};
      var completed = 0;
      var validated = 0;
      for (var cs = 0; cs < 6; cs++) { 
        if (tSteps[cs] && tSteps[cs].done) completed++; 
        if (tSteps[cs] && tSteps[cs].done && tSteps[cs].score >= 100) validated++;
      }
      var pctColor = validated >= 6 ? 'var(--lo1)' : validated >= 3 ? 'var(--gold)' : 'var(--muted)';
      var progressText = validated + '/6 valid\u00e9es' + (completed > validated ? ' (' + (completed - validated) + ' en attente)' : '');
      
      html += '<div class="team-card">';
      html += '<div class="team-header">';
      html += '<div>';
      html += '<span class="team-name">Équipe ' + tn2 + '</span>';
      html += ' <span class="team-members">👑 ' + team.leader;
      if (team.members.length > 1) html += ' · ' + team.members.slice(1).join(' · ');
      html += '</span>';
      html += '</div>';
      html += '<span class="team-progress" style="color:' + pctColor + '">' + progressText + '</span>';
      html += '</div>';
      
      for (var si2 = 0; si2 < 6; si2++) {
        var step = tSteps[si2];
        var stepName = STEPS[si2];
        var isDone = step && step.done;
        var isValidated = isDone && step.score >= 100;
        var isPending = isDone && step.score < 100;
        
        if (isPending) {
          // === SOUMISSION EN ATTENTE → OK button ===
          var date2 = step.submitted_at ? new Date(step.submitted_at).toLocaleDateString('fr-CH') + ' ' + new Date(step.submitted_at).toLocaleTimeString('fr-CH',{hour:'2-digit',minute:'2-digit'}) : '';
          html += '<div class="step-row" style="border-color:var(--gold);background:rgba(245,158,11,.04)">';
          html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap">';
          html += '<div>';
          html += '<span style="font-size:.75rem;font-weight:800;color:var(--gold)">\u23f3 ' + stepName + '</span>';
          html += '<span style="font-size:.6rem;color:var(--muted);margin-left:.4rem">soumis ' + date2 + '</span>';
          html += '</div>';
          html += '<button onclick="validateStep(\'' + currentProjectId + '\',' + tn2 + ',' + si2 + ')" style="background:var(--lo1);color:#fff;border:none;padding:.5rem 1.8rem;border-radius:6px;font-size:.85rem;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(16,185,129,.3)">OK \u2713</button>';
          html += '</div>';
          
          // Show work preview
          if (step.work) {
            var fileMatch = step.work.match(/\uD83D\uDCCE Fichier: (https:\/\/[^\s]+)/);
            if (fileMatch) {
              var fUrl = fileMatch[1];
              var fName = fUrl.split('/').pop();
              html += '<div style="margin:.3rem 0;display:flex;align-items:center;gap:.3rem">';
              html += '<a href="' + fUrl + '" target="_blank" download style="color:var(--lo2);text-decoration:none;font-size:.7rem;font-weight:700">\uD83D\uDCCE ' + decodeURIComponent(fName) + '</a>';
              html += '<a href="' + fUrl + '" target="_blank" download class="btn btn-blue" style="font-size:.58rem;padding:.2rem .4rem">\u2B07</a>';
              html += '</div>';
            }
            var cleanWork = step.work.replace(/\uD83D\uDCCE Fichier:.*$/gm, '').trim();
            if (cleanWork) {
              html += '<details style="margin-top:.2rem"><summary style="font-size:.6rem;color:var(--muted);cursor:pointer">Voir le texte</summary>';
              html += '<div class="step-work">' + cleanWork.substring(0, 2000).replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
              html += '</details>';
            }
          }
          
          html += '<div style="margin-top:.3rem;display:flex;gap:.3rem;align-items:center">';
          html += '<input id="fb_' + tn2 + '_' + si2 + '" placeholder="Commentaire (optionnel)" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.25rem .4rem;font-size:.62rem;font-family:inherit">';
          html += '<button class="btn btn-blue" onclick="sendFeedback(\'' + currentProjectId + '\',' + tn2 + ',' + si2 + ')" style="font-size:.58rem;padding:.25rem .4rem">\u2709</button>';
          html += '<button onclick="rejectStep(\'' + currentProjectId + '\',' + tn2 + ',' + si2 + ')" style="background:transparent;color:var(--error);border:1px solid rgba(239,68,68,.3);padding:.25rem .5rem;border-radius:4px;font-size:.58rem;font-weight:700;cursor:pointer;font-family:inherit">\u2717</button>';
          html += '</div>';
          html += '<div id="fbs_' + tn2 + '_' + si2 + '" style="font-size:.58rem;margin-top:.15rem;min-height:.6rem"></div>';
          html += '</div>';
          
        } else if (isValidated) {
          // === VALIDÉ → compact green line ===
          var dateV = step.submitted_at ? new Date(step.submitted_at).toLocaleDateString('fr-CH') : '';
          html += '<div class="step-row done" style="padding:.3rem .6rem">';
          html += '<div style="display:flex;align-items:center;justify-content:space-between">';
          html += '<span style="font-size:.68rem;color:var(--lo1);font-weight:700">\u2705 ' + stepName + '</span>';
          html += '<span style="font-size:.58rem;color:var(--muted)">' + dateV + '</span>';
          html += '</div>';
          if (step.work) {
            var vFileMatch = step.work.match(/\uD83D\uDCCE Fichier: (https:\/\/[^\s]+)/);
            if (vFileMatch) {
              html += '<a href="' + vFileMatch[1] + '" target="_blank" download style="color:var(--lo2);text-decoration:none;font-size:.6rem">\uD83D\uDCCE ' + decodeURIComponent(vFileMatch[1].split('/').pop()) + '</a>';
            }
          }
          html += '</div>';
          
        } else {
          // === PAS ENCORE SOUMIS → quiet gray line ===
          html += '<div class="step-row" style="padding:.25rem .6rem;opacity:.5">';
          html += '<span style="font-size:.65rem;color:var(--muted)">' + (si2+1) + '. ' + stepName + '</span>';
          html += '</div>';
        }
      }
      html += '</div>';
    }
    container.innerHTML = html;
    // Populate add-student selects
    var addSel = document.getElementById('addStudentSelect');
    var addTeamSel = document.getElementById('addTeamSelect');
    if (addSel) {
      // Find students NOT in any team for this project
      var assignedIds = {};
      for (var ai = 0; ai < teamMembers.length; ai++) assignedIds[teamMembers[ai].student_id] = true;
      
      addSel.innerHTML = '<option value="">-- Élève --</option>';
      for (var sid in allStudentsMap) {
        if (!assignedIds[sid]) {
          addSel.innerHTML += '<option value="' + sid + '">' + allStudentsMap[sid] + '</option>';
        }
      }
    }
    if (addTeamSel) {
      addTeamSel.innerHTML = '';
      var maxTeam = 0;
      for (var tn3 in teams) { if (parseInt(tn3) > maxTeam) maxTeam = parseInt(tn3); }
      for (var tn4 = 1; tn4 <= maxTeam; tn4++) {
        addTeamSel.innerHTML += '<option value="' + tn4 + '">' + tn4 + '</option>';
      }
      addTeamSel.innerHTML += '<option value="' + (maxTeam + 1) + '">' + (maxTeam + 1) + ' (nouvelle)</option>';
    }
    
  } catch(e) {
    container.innerHTML = '<div class="empty" style="color:var(--error)">Erreur : ' + e.message + '</div>';
  }
}

// ===== TEAM MANAGEMENT =====
async function autoTeams() {
  if (!currentProjectId) return;
  var size = parseInt(document.getElementById('teamSize').value);
  var msg = document.getElementById('manageMsg');
  msg.innerHTML = '<span style="color:var(--muted)">Création des équipes...</span>';
  
  await loadStudentsMap();
  
  // Get connected students
  var res = await fetch(SB_URL + '/cq_students?select=id,first_name,last_name&role=eq.student&class_name=eq.' + (student.class_name || 'BI1'), { headers: { 'apikey': SB_KEY } });
  var sList = await res.json();
  if (!Array.isArray(sList)) sList = [];
  
  // Shuffle
  for (var i = sList.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = sList[i]; sList[i] = sList[j]; sList[j] = t;
  }
  
  // Delete old
  await fetch(SB_URL + '/cq_team_members?project_id=eq.' + currentProjectId + '&unit_id=eq.4', {
    method: 'DELETE', headers: { 'apikey': SB_KEY }
  });
  
  // Create teams
  var teams = [];
  for (var k = 0; k < sList.length; k += size) {
    teams.push(sList.slice(k, k + size));
  }
  
  for (var ti = 0; ti < teams.length; ti++) {
    for (var si = 0; si < teams[ti].length; si++) {
      await fetch(SB_URL + '/cq_team_members', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_id: currentProjectId, team_number: ti + 1, student_id: teams[ti][si].id, unit_id: 4 })
      });
    }
  }
  
  // Save team_data
  var teamData = teams.map(function(t) { return t.map(function(s) { return s.first_name + ' ' + s.last_name; }); });
  
  // Upsert project
  var pRes = await fetch(SB_URL + '/cq_team_projects?project_id=eq.' + currentProjectId + '&unit_id=eq.4', {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify({ team_data: teamData, updated_at: new Date().toISOString() })
  });
  var pData = await pRes.json();
  if (!Array.isArray(pData) || pData.length === 0) {
    await fetch(SB_URL + '/cq_team_projects', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: currentProjectId, status: 'unlocked', team_data: teamData, unit_id: 4 })
    });
  }
  
  loadTeams();
}

async function resetTeams() {
  if (!currentProjectId) return;
  if (!confirm('Supprimer toutes les équipes et leur progression pour ' + PROJECTS[currentProjectId] + ' ?')) return;
  
  await fetch(SB_URL + '/cq_team_members?project_id=eq.' + currentProjectId + '&unit_id=eq.4', {
    method: 'DELETE', headers: { 'apikey': SB_KEY }
  });
  await fetch(SB_URL + '/cq_team_step_progress?project_id=eq.' + currentProjectId + '&unit_id=eq.4', {
    method: 'DELETE', headers: { 'apikey': SB_KEY }
  });
  
  document.getElementById('manageMsg').innerHTML = '<span style="color:var(--gold)">Équipes supprimées.</span>';
  loadTeams();
}

async function unlockProject() {
  if (!currentProjectId) return;
  var res = await fetch(SB_URL + '/cq_team_projects?project_id=eq.' + currentProjectId + '&unit_id=eq.4', {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify({ status: 'unlocked', updated_at: new Date().toISOString() })
  });
  var data = await res.json();
  if (!Array.isArray(data) || data.length === 0) {
    await fetch(SB_URL + '/cq_team_projects', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: currentProjectId, status: 'unlocked', unit_id: 4 })
    });
  }
  document.getElementById('manageMsg').innerHTML = '<span style="color:var(--lo1)">✅ Projet débloqué !</span>';
}

async function lockProject() {
  if (!currentProjectId) return;
  await fetch(SB_URL + '/cq_team_projects?project_id=eq.' + currentProjectId + '&unit_id=eq.4', {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'locked', updated_at: new Date().toISOString() })
  });
  document.getElementById('manageMsg').innerHTML = '<span style="color:var(--gold)">🔒 Projet verrouillé.</span>';
}

// ===== FEEDBACK & VALIDATION =====
async function sendFeedback(projectId, teamNum, stepIdx) {
  var ta = document.getElementById('fb_' + teamNum + '_' + stepIdx);
  var fb = document.getElementById('fbs_' + teamNum + '_' + stepIdx);
  if (!ta || !ta.value.trim()) { if(fb) fb.innerHTML='<span style="color:var(--muted)">Tapez un commentaire d\'abord</span>'; return; }
  
  try {
    await fetch(SB_URL + '/cq_comments', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        student_id: student.id,
        module_id: 'project-' + projectId + '-team' + teamNum + '-step' + stepIdx,
        comment: '[FEEDBACK PROF] ' + ta.value,
        unit_id: 4
      })
    });
    fb.innerHTML = '<span style="color:var(--lo1)">💬 Commentaire envoyé !</span>';
    ta.value = '';
    setTimeout(function() { fb.innerHTML = ''; }, 3000);
  } catch(e) {
    fb.innerHTML = '<span style="color:var(--error)">Erreur</span>';
  }
}

async function validateStep(projectId, teamNum, stepIdx) {
  var fb = document.getElementById('fbs_' + teamNum + '_' + stepIdx);
  try {
    await fetch(SB_URL + '/cq_team_step_progress?project_id=eq.' + projectId + '&team_number=eq.' + teamNum + '&step_index=eq.' + stepIdx + '&unit_id=eq.4', {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ score: 100 })
    });
    fb.innerHTML = '<span style="color:var(--lo1)">✅ Validé à 100% !</span>';
    setTimeout(function() { loadTeams(); }, 1500);
  } catch(e) {
    fb.innerHTML = '<span style="color:var(--error)">Erreur</span>';
  }
}

async function rejectStep(projectId, teamNum, stepIdx) {
  var fb = document.getElementById('fbs_' + teamNum + '_' + stepIdx);
  try {
    await fetch(SB_URL + '/cq_team_step_progress?project_id=eq.' + projectId + '&team_number=eq.' + teamNum + '&step_index=eq.' + stepIdx + '&unit_id=eq.4', {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ done: false, score: 0 })
    });
    fb.innerHTML = '<span style="color:var(--error)">\u2717 Renvoy\u00e9</span>';
    setTimeout(function() { loadTeams(); }, 1500);
  } catch(e) {
    fb.innerHTML = '<span style="color:var(--error)">Erreur</span>';
  }
}

async function addStudentToTeam() {
  if (!currentProjectId) return;
  var studentId = document.getElementById('addStudentSelect').value;
  var teamNum = document.getElementById('addTeamSelect').value;
  var msg = document.getElementById('addStudentMsg');
  
  if (!studentId || !teamNum) {
    msg.innerHTML = '<span style="color:var(--error)">S\u00e9lectionnez un \u00e9l\u00e8ve et une \u00e9quipe</span>';
    return;
  }
  
  try {
    await fetch(SB_URL + '/cq_team_members', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: currentProjectId, team_number: parseInt(teamNum), student_id: studentId, unit_id: 4 })
    });
    msg.innerHTML = '<span style="color:var(--lo1)">\u2705 Ajout\u00e9 !</span>';
    setTimeout(function() { msg.innerHTML = ''; loadTeams(); }, 1000);
  } catch(e) {
    msg.innerHTML = '<span style="color:var(--error)">Erreur</span>';
  }
}
