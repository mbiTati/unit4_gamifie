<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--lo1:#10b981;--lo2:#3b82f6;--lo4:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.topbar h1{font-size:.9rem;font-weight:800;background:linear-gradient(135deg,var(--lo1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;gap:.4rem;flex-wrap:wrap}
.topbar-right a,.topbar-right button{color:var(--muted);text-decoration:none;font-size:.68rem;font-weight:600;border:1px solid var(--border);padding:.2rem .5rem;border-radius:4px;background:none;cursor:pointer;font-family:inherit}
.main{max-width:950px;margin:0 auto;padding:1rem}
.btn{padding:.4rem .8rem;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:.78rem}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#fff}
.btn-sm{font-size:.68rem;padding:.25rem .5rem}

/* PROJECT CARDS */
.projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.8rem;margin-bottom:1.5rem}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;position:relative;transition:all .2s}
.project-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.project-card.locked{opacity:.4;pointer-events:none}
.project-card.locked::after{content:'🔒 Verrouillé — le prof débloque';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.75rem;color:var(--gold);font-weight:700;background:rgba(10,15,26,.9);padding:.5rem 1rem;border-radius:6px;white-space:nowrap}
.project-card.active{border-color:var(--lo1);box-shadow:0 0 20px rgba(16,185,129,.1)}
.pc-tag{font-size:.5rem;font-weight:800;padding:.15rem .4rem;border-radius:3px;display:inline-block;margin-bottom:.4rem}
.pc-title{font-size:.95rem;font-weight:800;margin-bottom:.3rem}
.pc-desc{font-size:.7rem;color:var(--muted);line-height:1.4;margin-bottom:.5rem}
.pc-meta{display:flex;gap:.5rem;flex-wrap:wrap;font-size:.6rem;color:var(--muted)}
.pc-meta span{background:var(--surface);padding:.15rem .3rem;border-radius:3px}
.pc-team{margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);font-size:.68rem}
.pc-team .member{display:inline-block;background:rgba(50,224,196,.06);border:1px solid rgba(50,224,196,.15);padding:.1rem .4rem;border-radius:3px;margin:.1rem;font-size:.6rem}
.pc-progress{margin-top:.5rem;height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.pc-progress-fill{height:100%;border-radius:3px;transition:width .5s}

/* STEPS */
.steps{margin-top:1rem}
.step{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.8rem;margin-bottom:.5rem}
.step.done{border-color:var(--lo1);background:rgba(16,185,129,.02)}
.step.current{border-color:var(--gold);background:rgba(245,158,11,.02)}
.step.locked{opacity:.35}
.step-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;cursor:pointer}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;border:2px solid var(--border);color:var(--muted);flex-shrink:0}
.step.done .step-num{background:var(--lo1);border-color:var(--lo1);color:#fff}
.step.current .step-num{background:var(--gold);border-color:var(--gold);color:#fff}
.step-title{font-size:.8rem;font-weight:700;flex:1}
.step-badge{font-size:.5rem;font-weight:700;padding:.1rem .3rem;border-radius:3px}
.step-body{display:none;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)}
.step.current .step-body,.step.done .step-body{display:block}
.step-instructions{font-size:.72rem;color:var(--muted);line-height:1.6;margin-bottom:.5rem}
.step-instructions strong{color:var(--text)}
.step-deliverable{font-size:.68rem;color:var(--gold);font-weight:600;margin-bottom:.5rem}
.step-input{width:100%;min-height:80px;padding:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.72rem;resize:vertical}
.step-input:focus{outline:none;border-color:var(--accent2)}
.step-submit{margin-top:.4rem;display:flex;gap:.3rem;align-items:center}
.step-feedback{font-size:.7rem;margin-top:.3rem;min-height:1.5rem}

/* PROF PANEL */
.prof-panel{background:rgba(245,158,11,.04);border:1px dashed var(--gold);border-radius:10px;padding:1rem;margin-bottom:1.5rem;display:none}
.prof-panel h3{font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:.5rem}
</style>
</head>

</div>

    var p = PROJECTS[i];
    var state = projectStates[p.id] || {};
    var isUnlocked = state.unlocked || isTeacher;
    var completedSteps = 0;
    for (var s = 0; s < p.steps.length; s++) {
      if (state['step_' + s + '_done']) completedSteps++;
    }
    var pct = Math.round(completedSteps / p.steps.length * 100);
    var teamMembers = state.team || [];
    
    html += '<div class="project-card ' + (!isUnlocked ? 'locked' : completedSteps > 0 ? 'active' : '') + '" data-id="' + p.id + '">';
    html += '<span class="pc-tag" style="background:' + p.color + '20;color:' + p.color + '">' + p.sector + '</span>';
    html += '<div class="pc-title">' + p.name + '</div>';
    html += '<div class="pc-desc">' + p.desc.substring(0, 120) + '...</div>';
    html += '<div class="pc-meta">';
    html += '<span>⭐'.repeat(p.difficulty) + '</span>';
    html += '<span>' + p.tables.length + ' tables</span>';
    html += '<span>Équipes de ' + p.teams + '</span>';
    html += '<span>6 étapes</span>';
    html += '</div>';
    var myTeamNum = state.myTeam;
    var teamData = state.teamData || [];
    if (myTeamNum && teamData.length >= myTeamNum) {
      var myTeamMembers = teamData[myTeamNum - 1] || [];
      html += '<div class="pc-team">Mon équipe (#' + myTeamNum + ') : ' + myTeamMembers.map(function(m) { return '<span class="member">' + m + '</span>'; }).join('') + '</div>';
    } else if (isTeacher && teamData.length > 0) {
      html += '<div class="pc-team">' + teamData.length + ' équipes créées</div>';
    }
    if (isUnlocked && completedSteps > 0) {
      html += '<div class="pc-progress"><div class="pc-progress-fill" style="width:' + pct + '%;background:' + p.color + '"></div></div>';
      html += '<div style="font-size:.55rem;color:var(--muted);margin-top:.2rem">' + completedSteps + '/' + p.steps.length + ' étapes (' + pct + '%)</div>';
    }
    html += '</div>';
  }
  
  document.getElementById('projectsGrid').innerHTML = html;
  
  // Add click handlers
  document.querySelectorAll('.project-card:not(.locked)').forEach(function(card) {
    card.addEventListener('click', function() { openProject(this.dataset.id); });
  });
}

function openProject(id) {
  // VéloShop has its own enriched page
  if (id === 'veloshop') { window.location.href = 'projet-veloshop.html'; return; }

  currentProject = PROJECTS.find(function(p) { return p.id === id; });
  if (!currentProject) return;
  
  document.getElementById('projectsGrid').parentElement.querySelector('.projects').style.display = 'none';
  if (document.getElementById('profPanel')) document.getElementById('profPanel').style.display = 'none';
  document.getElementById('projectDetail').style.display = 'block';
  
  var state = projectStates[currentProject.id] || {};
  
  var info = '<div style="margin-bottom:1rem">';
  info += '<span class="pc-tag" style="background:' + currentProject.color + '20;color:' + currentProject.color + '">' + currentProject.sector + '</span>';
  info += '<h2 style="font-size:1.1rem;font-weight:800;margin:.3rem 0">' + currentProject.name + '</h2>';
  info += '<div style="font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:.5rem">' + currentProject.desc + '</div>';
  info += '<div style="font-size:.72rem;color:var(--text);line-height:1.5;padding:.5rem;background:var(--surface);border-radius:6px;border-left:3px solid ' + currentProject.color + '">' + currentProject.context + '</div>';
  info += '<div style="font-size:.65rem;color:var(--muted);margin-top:.5rem">Tables attendues : <strong>' + currentProject.tables.join(', ') + '</strong></div>';
  info += '</div>';
  document.getElementById('projectInfo').innerHTML = info;
  
  // Render steps
  var stepsHtml = '';
  for (var i = 0; i < currentProject.steps.length; i++) {
    var step = currentProject.steps[i];
    var isDone = state['step_' + i + '_done'];
    var isCurrent = !isDone && (i === 0 || state['step_' + (i-1) + '_done']);
    var isLocked = !isDone && !isCurrent;
    
    stepsHtml += '<div class="step ' + (isDone ? 'done' : isCurrent ? 'current' : 'locked') + '" data-step="' + i + '">';
    stepsHtml += '<div class="step-header" onclick="toggleStep(' + i + ')">';
    stepsHtml += '<div class="step-num">' + (isDone ? '✓' : (i + 1)) + '</div>';
    stepsHtml += '<div class="step-title">' + step.name + '</div>';
    stepsHtml += '<span class="step-badge" style="background:' + (isDone ? 'rgba(16,185,129,.1);color:var(--lo1)' : isCurrent ? 'rgba(245,158,11,.1);color:var(--gold)' : 'var(--surface);color:var(--muted)') + '">' + (isDone ? 'Terminé' : isCurrent ? 'En cours' : 'Verrouillé') + '</span>';
    stepsHtml += '</div>';
    stepsHtml += '<div class="step-body">';
    stepsHtml += '<div class="step-instructions">' + step.instructions + '</div>';
    stepsHtml += '<div class="step-deliverable">Livrable : ' + step.deliverable + '</div>';
    
    var savedWork = state['step_' + i + '_work'] || '';
    if (step.type === 'code') {
      stepsHtml += '<textarea class="step-input" id="work_' + i + '" placeholder="Écrivez votre code SQL ici..." style="min-height:150px">' + savedWork + '</textarea>';
    } else {
      stepsHtml += '<textarea class="step-input" id="work_' + i + '" placeholder="Écrivez votre réponse ici...">' + savedWork + '</textarea>';
    }
    stepsHtml += '<div class="step-submit">';
    stepsHtml += '<button class="btn btn-primary btn-sm" onclick="saveStep(' + i + ')">Sauvegarder</button>';
    stepsHtml += '<button class="btn btn-gold btn-sm" onclick="submitStep(' + i + ')">Soumettre ✓</button>';
    stepsHtml += '</div>';
    stepsHtml += '<div class="step-feedback" id="fb_' + i + '"></div>';
    stepsHtml += '</div>';
    stepsHtml += '</div>';
  }
  
  document.getElementById('projectSteps').innerHTML = stepsHtml;
}

function toggleStep(idx) {
  var step = document.querySelectorAll('.step')[idx];
  if (step && !step.classList.contains('locked')) {
    var body = step.querySelector('.step-body');
    body.style.display = body.style.display === 'none' ? 'block' : (body.style.display === 'block' ? 'none' : 'block');
  }
}

function saveStep(idx) {
  var work = document.getElementById('work_' + idx);
  if (!work) return;
  if (!projectStates[currentProject.id]) projectStates[currentProject.id] = {};
  projectStates[currentProject.id]['step_' + idx + '_work'] = work.value;
  localStorage.setItem('dq_team_projects', JSON.stringify(projectStates));
  var fb = document.getElementById('fb_' + idx);
  fb.innerHTML = '<span style="color:var(--lo1)">💾 Sauvegardé !</span>';
  setTimeout(function() { fb.innerHTML = ''; }, 2000);
}

function submitStep(idx) {
  var work = document.getElementById('work_' + idx);
  if (!work || !work.value.trim()) {
    document.getElementById('fb_' + idx).innerHTML = '<span style="color:var(--error)">Écrivez quelque chose avant de soumettre.</span>';
    return;
  }
  
  var step = currentProject.steps[idx];
  var input = work.value.toUpperCase();
  var found = 0;
  for (var k = 0; k < step.keywords.length; k++) {
    if (input.indexOf(step.keywords[k].toUpperCase()) > -1) found++;
  }
  var pct = Math.round(found / step.keywords.length * 100);
  
  if (!projectStates[currentProject.id]) projectStates[currentProject.id] = {};
  projectStates[currentProject.id]['step_' + idx + '_work'] = work.value;
  projectStates[currentProject.id]['step_' + idx + '_done'] = true;
  projectStates[currentProject.id]['step_' + idx + '_score'] = pct;
  localStorage.setItem('dq_team_projects', JSON.stringify(projectStates));
  
  var fb = document.getElementById('fb_' + idx);
  fb.innerHTML = '<span style="color:var(--lo1)">✅ Étape soumise ! (' + found + '/' + step.keywords.length + ' éléments détectés)</span>';
  
  // Save score
  if (typeof saveGameScore === 'function') {
    saveGameScore('team-' + currentProject.id, pct, 0);
  }
  
  // Refresh
  setTimeout(function() { openProject(currentProject.id); }, 1000);
}

function showProjects() {
  document.getElementById('projectDetail').style.display = 'none';
  document.querySelector('.projects').style.display = '';
  if (isTeacher) document.getElementById('profPanel').style.display = 'block';
  currentProject = null;
  renderProjects();
}

// ===================== PROF FUNCTIONS =====================
async function unlockProject() {
  var id = document.getElementById('profProjectSelect').value;
  var msg = document.getElementById('profMsg');
  msg.innerHTML = '<span style="color:var(--muted)">Déblocage en cours...</span>';
  
  // Upsert in cq_team_projects via REST API
  // First try to update
  var res = await fetch(SB_URL + '/cq_team_projects?project_id=eq.' + id + '&unit_id=eq.4', {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify({ status: 'unlocked', updated_at: new Date().toISOString() })
  });
  var data = await res.json();
  
  if (!Array.isArray(data) || data.length === 0) {
    // Insert new
    await fetch(SB_URL + '/cq_team_projects', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: id, status: 'unlocked', unit_id: 4 })
    });
  }
  
  projectStates[id] = projectStates[id] || {};
  projectStates[id].unlocked = true;
  msg.innerHTML = '<span style="color:var(--lo1)">✅ Projet <strong>' + id + '</strong> débloqué pour tous les élèves !</span>';
  renderProjects();
}

async function lockProject() {
  var id = document.getElementById('profProjectSelect').value;
  var msg = document.getElementById('profMsg');
  
  await fetch(SB_URL + '/cq_team_projects?project_id=eq.' + id + '&unit_id=eq.4', {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'locked', updated_at: new Date().toISOString() })
  });
  
  projectStates[id] = projectStates[id] || {};
  projectStates[id].unlocked = false;
  msg.innerHTML = '<span style="color:var(--gold)">🔒 Projet <strong>' + id + '</strong> verrouillé.</span>';
  renderProjects();
}

async function autoTeams() {
  var size = parseInt(document.getElementById('teamSize').value);
  var projectId = document.getElementById('profProjectSelect').value;
  var msg = document.getElementById('profMsg');
  msg.innerHTML = '<span style="color:var(--muted)">Création des équipes...</span>';
  
  // Load class students
  var students = await supabase.query('cq_students', { select: 'first_name,last_name,id', filter: { 'role': 'eq.student', 'class_name': 'eq.' + (student.class_name || 'BI1') } });
  var sList = Array.isArray(students) ? students : [];
  
  // Shuffle (Fisher-Yates)
  for (var i = sList.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = sList[i]; sList[i] = sList[j]; sList[j] = t;
  }
  
  // Delete existing team assignments for this project
  await fetch(SB_URL + '/cq_team_members?project_id=eq.' + projectId + '&unit_id=eq.4', {
    method: 'DELETE', headers: { 'apikey': SB_KEY }
  });
  
  // Create teams and save to Supabase
  var teams = [];
  for (var k = 0; k < sList.length; k += size) {
    teams.push(sList.slice(k, k + size));
  }
  
  var html = '<strong>Équipes pour ' + projectId + ' :</strong><br>';
  for (var ti = 0; ti < teams.length; ti++) {
    var names = [];
    for (var si = 0; si < teams[ti].length; si++) {
      var s = teams[ti][si];
      names.push(s.first_name + ' ' + s.last_name.charAt(0) + '.');
      // Save to Supabase
      await fetch(SB_URL + '/cq_team_members', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_id: projectId, team_number: ti + 1, student_id: s.id, unit_id: 4 })
      });
    }
    html += '<span style="color:var(--accent2)">Équipe ' + (ti + 1) + '</span> : ' + names.join(', ') + '<br>';
  }
  
  // Save team data to project
  await fetch(SB_URL + '/cq_team_projects?project_id=eq.' + projectId + '&unit_id=eq.4', {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ team_data: teams.map(function(t) { return t.map(function(s){ return s.first_name + ' ' + s.last_name; }); }), updated_at: new Date().toISOString() })
  });
  
  msg.innerHTML = '<span style="color:var(--lo1)">' + html + '</span>';
  renderProjects();
}



// Load project states from Supabase on init
async function loadProjectStates() {
  try {
    // Load unlock status from cq_team_projects
    var projects = await supabase.query('cq_team_projects', { select: '*', filter: { 'unit_id': 'eq.4' } });
    if (Array.isArray(projects)) {
      for (var i = 0; i < projects.length; i++) {
        var p = projects[i];
        if (!projectStates[p.project_id]) projectStates[p.project_id] = {};
        projectStates[p.project_id].unlocked = p.status === 'unlocked';
        if (p.team_data) projectStates[p.project_id].teamData = p.team_data;
      }
    }
    
    // Load my team assignment
    if (!isTeacher) {
      var myTeams = await supabase.query('cq_team_members', { select: '*', filter: { 'student_id': 'eq.' + student.id, 'unit_id': 'eq.4' } });
      if (Array.isArray(myTeams)) {
        for (var j = 0; j < myTeams.length; j++) {
          var m = myTeams[j];
          if (!projectStates[m.project_id]) projectStates[m.project_id] = {};
          projectStates[m.project_id].myTeam = m.team_number;
        }
      }
    }
  } catch(e) {
    console.log('Team projects: tables might not exist yet');
  }
  
  // Merge with localStorage (saved work)
  var local = JSON.parse(localStorage.getItem('dq_team_projects') || '{}');
  for (var k in local) {
    if (!projectStates[k]) projectStates[k] = {};
    for (var key in local[k]) {
      if (key.indexOf('step_') === 0) projectStates[k][key] = local[k][key];
    }
  }
  
  renderProjects();
}

loadProjectStates();
