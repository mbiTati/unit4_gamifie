<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DataQuest — Quiz Live</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--lo1:#10b981}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.topbar h1{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right a{color:var(--muted);text-decoration:none;font-size:.75rem;font-weight:600;border:1px solid var(--border);padding:.3rem .6rem;border-radius:5px}
.main{max-width:800px;margin:0 auto;padding:1.5rem;flex:1;width:100%}
.mode-select{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:500px;margin:2rem auto}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s}
.mode-card:hover{border-color:var(--accent2);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.mode-card .icon{font-size:2rem;margin-bottom:.5rem}
.mode-card h3{font-size:1rem;font-weight:700}
.mode-card p{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.bank-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem;margin:1rem 0}
.bank{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;transition:all .2s}
.bank:hover,.bank.selected{border-color:var(--accent2)}
.bank.selected{background:rgba(50,224,196,.05)}
.bank h4{font-size:.85rem;font-weight:700}
.bank p{font-size:.7rem;color:var(--muted)}
.quiz-area{text-align:center}
.question-text{font-size:1.1rem;font-weight:700;margin:1.5rem 0;line-height:1.5}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:1rem 0}
.answer{padding:1rem;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;min-height:60px;display:flex;align-items:center;justify-content:center}
.answer:hover{transform:scale(1.02)}
.a0{border-color:#ef4444;background:rgba(239,68,68,.08)}.a0:hover{background:rgba(239,68,68,.15)}
.a1{border-color:#3b82f6;background:rgba(59,130,246,.08)}.a1:hover{background:rgba(59,130,246,.15)}
.a2{border-color:#f59e0b;background:rgba(245,158,11,.08)}.a2:hover{background:rgba(245,158,11,.15)}
.a3{border-color:#10b981;background:rgba(16,185,129,.08)}.a3:hover{background:rgba(16,185,129,.15)}
.answer.correct{background:rgba(16,185,129,.25) !important;border-color:var(--lo1) !important;font-weight:800}
.answer.wrong{background:rgba(239,68,68,.2) !important;opacity:.5}
.answer.disabled{pointer-events:none}
.timer-bar{height:6px;background:var(--surface);border-radius:3px;margin:1rem 0}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--lo1),var(--gold),var(--error));border-radius:3px;transition:width .5s linear}
.score-display{font-size:1.5rem;font-weight:900;color:var(--accent2);margin:1rem 0}
.q-counter{font-size:.8rem;color:var(--muted);margin-bottom:.5rem}
.btn{padding:.5rem 1.2rem;border:none;border-radius:8px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer}
.btn-start{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:1rem;padding:.7rem 2rem}
.final-score{padding:2rem;text-align:center}
.final-score .big{font-size:3rem;font-weight:900;color:var(--accent2)}
.leaderboard-mini{max-width:400px;margin:1rem auto}
.leaderboard-mini .row{display:flex;justify-content:space-between;padding:.4rem .6rem;border-bottom:1px solid var(--border);font-size:.85rem}
</style>
</head>
<body>
<script>
if (!localStorage.getItem('cq_student')) { window.location.href = 'login.html'; }
</script>

<div class="topbar">
  <h1>Quiz Live</h1>
  <div class="topbar-right">
    <a href="home.html">Accueil</a>
    <a href="profile.html">Mon Profil</a>
    <a href="scores.html">Classement</a>
    <a href="settings.html">Paramètres</a>
    <button onclick="doLogout()">Déconnexion</button>
  </div>
</div>
<div class="main" id="mainArea">
  <div style="text-align:center;margin-bottom:2rem">
    <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:.3rem">Quiz Live — Kahoot Style</h2>
    <p style="color:var(--muted)">Testez vos connaissances en SQL et conception BDD</p>
  </div>
  
  <div style="font-size:.9rem;font-weight:700;margin-bottom:.8rem">Choisissez une banque de questions :</div>
  <div class="bank-select" id="bankSelect"></div>
  <div style="text-align:center;margin-top:1.5rem">
    <button class="btn btn-start" id="btnStart" onclick="startQuiz()" disabled>Lancer le Quiz</button>
  </div>
</div>

<script>
const BANKS = {
  "SQL Basics": [
    {q:"Quel mot-clé permet de filtrer les résultats d'un SELECT ?",a:["WHERE","FILTER","HAVING","LIMIT"],correct:"WHERE"},
    {q:"Comment trier les résultats par ordre décroissant ?",a:["ORDER BY ... DESC","SORT BY ... DESC","ORDER BY ... REVERSE","GROUP BY ... DESC"],correct:"ORDER BY ... DESC"},
    {q:"Quel opérateur vérifie si une valeur est dans une liste ?",a:["IN","BETWEEN","LIKE","EXISTS"],correct:"IN"},
    {q:"SELECT DISTINCT sert à :",a:["Éliminer les doublons","Sélectionner une seule ligne","Trier les résultats","Compter les valeurs"],correct:"Éliminer les doublons"},
    {q:"Quelle fonction compte le nombre de lignes ?",a:["COUNT()","SUM()","TOTAL()","NUMBER()"],correct:"COUNT()"},
    {q:"LIKE '%ville%' recherche :",a:["Contenant 'ville'","Commençant par 'ville'","Égal à 'ville'","Finissant par 'ville'"],correct:"Contenant 'ville'"},
    {q:"NULL signifie :",a:["Valeur inconnue/absente","Zéro","Chaîne vide","Faux"],correct:"Valeur inconnue/absente"},
    {q:"BETWEEN 10 AND 20 inclut-il 10 et 20 ?",a:["Oui, les deux bornes","Non, aucune","Seulement 10","Seulement 20"],correct:"Oui, les deux bornes"},
  ],
  "Jointures": [
    {q:"INNER JOIN retourne :",a:["Correspondances des 2 tables","Toutes les lignes des 2 tables","Seulement la table gauche","La différence entre 2 tables"],correct:"Correspondances des 2 tables"},
    {q:"LEFT JOIN affiche :",a:["Tout à gauche + correspondances droite","Seulement les correspondances","Toutes les lignes de droite","Les lignes sans correspondance"],correct:"Tout à gauche + correspondances droite"},
    {q:"Une clé étrangère (FK) sert à :",a:["Référencer une PK d'une autre table","Identifier de manière unique","Chiffrer les données","Trier automatiquement"],correct:"Référencer une PK d'une autre table"},
    {q:"ON a.id = b.id dans un JOIN définit :",a:["La condition de jointure","Le tri des résultats","Le filtre WHERE","L'alias de la table"],correct:"La condition de jointure"},
    {q:"Combien de tables peut-on joindre ?",a:["Autant que nécessaire","Maximum 2","Maximum 5","Maximum 10"],correct:"Autant que nécessaire"},
    {q:"Si LEFT JOIN ne trouve pas de correspondance :",a:["Colonnes de droite = NULL","Colonnes vides","Colonnes = 0","Ligne supprimée"],correct:"Colonnes de droite = NULL"},
  ],
  "Conception MCD": [
    {q:"Dans un MCD, une entité est :",a:["Un rectangle","Un losange","Un ovale","Un cercle"],correct:"Un rectangle"},
    {q:"La cardinalité (0,N) signifie :",a:["0 ou plusieurs","Exactement N","Au moins 1","0 ou 1"],correct:"0 ou plusieurs"},
    {q:"Une relation N:M nécessite :",a:["Une table de liaison","Rien de spécial","Une vue SQL","Un trigger"],correct:"Une table de liaison"},
    {q:"Un identifiant (PK) doit être :",a:["Unique et non nul","Unique mais nullable","Numérique obligatoirement","Composé de 2 colonnes"],correct:"Unique et non nul"},
    {q:"CIF signifie :",a:["Contrainte d'Intégrité Fonctionnelle","Clé Interne Fonctionnelle","Contrainte d'Identification Forte","Code d'Intégrité FK"],correct:"Contrainte d'Intégrité Fonctionnelle"},
    {q:"Un attribut multivalué viole :",a:["1NF","2NF","3NF","BCNF"],correct:"1NF"},
  ],
  "Normalisation": [
    {q:"La 1NF exige :",a:["Des valeurs atomiques","Pas de dépendances partielles","Pas de dépendances transitives","Des clés composites"],correct:"Des valeurs atomiques"},
    {q:"La 2NF élimine :",a:["Les dépendances partielles","Les groupes répétitifs","Les dépendances transitives","Les valeurs NULL"],correct:"Les dépendances partielles"},
    {q:"La 3NF élimine :",a:["Les dépendances transitives","Les dépendances partielles","Les doublons","Les clés étrangères"],correct:"Les dépendances transitives"},
    {q:"A → B → C est une dépendance :",a:["Transitive","Partielle","Fonctionnelle directe","Multivaluée"],correct:"Transitive"},
    {q:"NOART → NOFAM → LIBFAM, que faire en 3NF ?",a:["Créer une table FAMILLE","Supprimer LIBFAM","Fusionner les tables","Ajouter un index"],correct:"Créer une table FAMILLE"},
    {q:"Une clé primaire composite existe quand :",a:["La clé = plusieurs colonnes","Il y a plusieurs PK","La table a 5+ colonnes","C'est une relation N:M"],correct:"La clé = plusieurs colonnes"},
  ],
};

let selectedBank = null;
let questions = [];
let currentQ = 0;
let score = 0;
let timerInterval = null;
let timeLeft = 15;

// Render bank selection
const bankSelect = document.getElementById('bankSelect');
Object.entries(BANKS).forEach(([name, qs]) => {
  const div = document.createElement('div');
  div.className = 'bank';
  div.innerHTML = `<h4>${name}</h4><p>${qs.length} questions</p>`;
  div.onclick = () => {
    document.querySelectorAll('.bank').forEach(b => b.classList.remove('selected'));
    div.classList.add('selected');
    selectedBank = name;
    document.getElementById('btnStart').disabled = false;
  };
  const attKey = 'dq_quiz_attempts_' + name;
  const att = parseInt(localStorage.getItem(attKey) || '0');
  if (att >= 2) {
    div.style.opacity = '0.4';
    div.style.pointerEvents = 'none';
    div.innerHTML += '<div style="font-size:.6rem;color:var(--error);margin-top:.3rem">2/2 tentatives utilisées</div>';
  } else {
    div.innerHTML += '<div style="font-size:.6rem;color:var(--muted);margin-top:.3rem">' + att + '/2 tentatives</div>';
  }
  bankSelect.appendChild(div);
});

function startQuiz() {
  if (!selectedBank) return;
  
  // Check attempts (max 2 per bank)
  const attemptsKey = 'dq_quiz_attempts_' + selectedBank;
  const attempts = parseInt(localStorage.getItem(attemptsKey) || '0');
  if (attempts >= 2) {
    const msg = document.getElementById('mainArea');
    msg.innerHTML = '<div style="text-align:center;padding:3rem"><h2 style="color:var(--gold);margin-bottom:1rem">Maximum atteint</h2><p style="color:var(--muted)">Vous avez déjà fait ce quiz 2 fois.<br>Essayez une autre banque de questions !</p><br><button class="btn btn-start" onclick="location.reload()">Retour</button></div>';
    return;
  }
  localStorage.setItem(attemptsKey, attempts + 1);
  
  // Shuffle questions randomly
  const bank = [...BANKS[selectedBank]].sort(() => Math.random() - 0.5);
  
  // Shuffle answers for each question — correct answer moves to random position
  questions = bank.map(q => {
    const correctText = q.correct;
    const shuffled = [...q.a].sort(() => Math.random() - 0.5);
    return {
      q: q.q,
      a: shuffled,
      c: shuffled.indexOf(correctText),
    };
  });
  
  currentQ = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  if (currentQ >= questions.length) { showFinal(); return; }
  const q = questions[currentQ];
  timeLeft = 15;
  
  document.getElementById('mainArea').innerHTML = `
    <div class="quiz-area">
      <div class="q-counter">Question ${currentQ+1}/${questions.length}</div>
      <div class="score-display">${score} pts</div>
      <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
      <div class="question-text">${q.q}</div>
      <div class="answers" id="answers">
        ${q.a.map((a, i) => `<div class="answer a${i}" data-idx="${i}" onclick="answer(${i})">${a}</div>`).join('')}
      </div>
    </div>
  `;
  
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft -= 0.5;
    document.getElementById('timerFill').style.width = (timeLeft/15*100) + '%';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      revealAnswer(-1);
    }
  }, 500);
}

function answer(idx) {
  clearInterval(timerInterval);
  revealAnswer(idx);
}

function revealAnswer(idx) {
  const q = questions[currentQ];
  const answers = document.querySelectorAll('.answer');
  answers.forEach(a => {
    a.classList.add('disabled');
    const ai = parseInt(a.dataset.idx);
    if (ai === q.c) a.classList.add('correct');
    else if (ai === idx) a.classList.add('wrong');
  });
  
  if (idx === q.c) {
    const bonus = Math.max(0, Math.round(timeLeft));
    score += 100 + bonus * 10;
  }
  
  setTimeout(() => {
    currentQ++;
    showQuestion();
  }, 2000);
}

function showFinal() {
  saveGameScore("quiz-live", score, 0);
  const maxScore = questions.length * 25;
  const pct = Math.round(score / maxScore * 100);
  
  document.getElementById('mainArea').innerHTML = `
    <div class="final-score">
      <div style="font-size:3rem;margin-bottom:1rem">${pct >= 80 ? '🏆' : pct >= 50 ? '⭐' : '💪'}</div>
      <h2>Quiz terminé !</h2>
      <div class="big">${score} pts</div>
      <p style="color:var(--muted);margin:1rem 0">${pct}% — ${selectedBank}</p>
      <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem">
        <button class="btn" style="background:var(--surface);color:var(--accent2);border:1px solid var(--border)" onclick="location.reload()">Nouveau quiz</button>
        <a href="home.html" class="btn btn-start" style="text-decoration:none;display:inline-block">← Accueil</a>
      </div>
    </div>
  `;
}
</script>
<script src="progress-saver.js">
function doLogout() {
  localStorage.removeItem('cq_student');
  localStorage.removeItem('cq_token');
  localStorage.removeItem('cq_refresh');
  localStorage.removeItem('cq_user');
  window.location.href = 'login.html';
}
</script>
<script src="presence-tracker.js"></script>
<script src="duel-notify.js"></script>

<div id="dqDuelBtn" onclick="window.location.href=this.getAttribute('data-href')" style="position:fixed;bottom:20px;right:20px;z-index:9998;background:linear-gradient(135deg,#F59E0B,#d97706);color:#fff;padding:.5rem 1rem;border-radius:25px;font-family:Outfit,sans-serif;font-size:.78rem;font-weight:800;cursor:pointer;box-shadow:0 4px 15px rgba(245,158,11,.4);display:flex;align-items:center;gap:.4rem;transition:transform .2s;animation:dqPulseBtn 3s infinite" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">
  <span>⚔️</span> DUEL
  <style>@keyframes dqPulseBtn{0%,100%{box-shadow:0 4px 15px rgba(245,158,11,.4)}50%{box-shadow:0 4px 25px rgba(245,158,11,.6)}}</style>
</div>
<script>
(function(){
  var b = document.getElementById('dqDuelBtn');
  if (!b) return;
  var path = (window.location && window.location.pathname) || '';
  if (path.indexOf('duel-sql') > -1) { b.style.display = 'none'; return; }
  if (path.includes('/jeux/')) b.setAttribute('data-href', '../../app/duel-sql.html');
  else if (path.includes('/app/')) b.setAttribute('data-href', 'duel-sql.html');
  else b.setAttribute('data-href', 'app/duel-sql.html');
})();
</script>
</body>
</html>
