<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DataQuest — Connexion</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--success:#10b981}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(13,115,119,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(50,224,196,.08) 0%,transparent 40%)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:2rem}
.logo .school{font-size:.65rem;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem}
.logo h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .sub{font-size:.78rem;color:var(--muted);margin-top:.3rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
.field .wrap{position:relative}
.field input{width:100%;padding:.65rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.88rem}
.field input:focus{outline:none;border-color:var(--accent2)}
.field .pwd{padding-right:2.5rem}
.eye{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem}
.btn{width:100%;padding:.75rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:.5rem}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(13,115,119,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.msg{font-size:.78rem;margin-top:.8rem;padding:.5rem .7rem;border-radius:6px;text-align:center;display:none}
.msg.error{background:rgba(239,68,68,.1);color:var(--error);border:1px solid rgba(239,68,68,.2);display:block}
.msg.success{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2);display:block}
.note{text-align:center;margin-top:1.5rem;font-size:.68rem;color:var(--muted)}
.spinner{display:none;text-align:center;padding:1.5rem}
.spinner::after{content:'';display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="school">École Schulz</div>
    <h1>DataQuest</h1>
    <div class="sub">Unit 4 — Database Design & Development</div>
  </div>
  
  <div id="msgArea"></div>
  
  <div id="form">
    <div class="field">
      <label>Email</label>
      <div class="wrap"><input type="email" id="email" placeholder="votre.email@example.com" autocomplete="email"></div>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <div class="wrap">
        <input type="password" id="password" class="pwd" placeholder="••••••••" autocomplete="current-password">
        <button class="eye" onclick="togglePwd()">👁</button>
      </div>
    </div>
    <button class="btn" id="btnLogin" onclick="doLogin()">Se connecter</button>
  </div>
  
  <div class="spinner" id="spinner"></div>
  
  <div class="note">Votre compte est créé par votre enseignant(e)</div>
</div>

<script src="supabase-config.js"></script>
<script>
// If already logged in, redirect
const existingStudent = JSON.parse(localStorage.getItem('cq_student') || 'null');
if (existingStudent && supabase.isLoggedIn()) {
  window.location.href = existingStudent.role === 'teacher' ? 'teacher.html' : 'home.html';
}

function togglePwd() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Enter key triggers login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pwd = document.getElementById('password').value;
  const msgArea = document.getElementById('msgArea');
  msgArea.innerHTML = '';
  
  if (!email || !pwd) {
    msgArea.innerHTML = '<div class="msg error">Remplissez email et mot de passe.</div>';
    return;
  }
  
  // Show spinner
  document.getElementById('form').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  
  try {
    // 1. Try signIn
    let result = await supabase.signIn(email, pwd);
    
    // 2. If fails, check if profile exists (teacher-created, no auth yet)
    if (!result.access_token) {
      const checkRes = await fetch(SUPABASE_URL + '/rest/v1/cq_students?email=eq.' + encodeURIComponent(email) + '&select=id', {
        headers: { 'apikey': SUPABASE_ANON_KEY }
      });
      const profiles = await checkRes.json();
      
      if (Array.isArray(profiles) && profiles.length > 0) {
        // Profile exists but no auth — create auth via RPC then retry
        await supabase.rpc('create_student_account', { student_email: email, student_password: pwd });
        await new Promise(r => setTimeout(r, 500));
        result = await supabase.signIn(email, pwd);
      }
    }
    
    // 3. If still no token, error
    if (!result.access_token) {
      showError(result.error_description || result.msg || 'Email ou mot de passe incorrect.');
      return;
    }
    
    // 4. Load student profile
    const profileRes = await fetch(SUPABASE_URL + '/rest/v1/cq_students?email=eq.' + encodeURIComponent(email) + '&select=*', {
      headers: { 'apikey': SUPABASE_ANON_KEY }
    });
    const studentList = await profileRes.json();
    
    if (!Array.isArray(studentList) || studentList.length === 0) {
      showError('Profil non trouvé. Contactez votre enseignant(e).');
      return;
    }
    
    const profile = studentList[0];
    
    // Link auth_id if missing
    if (!profile.auth_id && result.user) {
      await fetch(SUPABASE_URL + '/rest/v1/cq_students?id=eq.' + profile.id, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + result.access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ auth_id: result.user.id })
      });
      profile.auth_id = result.user.id;
    }
    
    // Save and redirect
    localStorage.setItem('cq_student', JSON.stringify(profile));
    window.location.href = profile.role === 'teacher' ? 'teacher.html' : 'home.html';
    
  } catch(e) {
    showError('Erreur de connexion : ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('form').style.display = 'block';
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('msgArea').innerHTML = '<div class="msg error">' + msg + '</div>';
}
</script>
</body>
</html>
