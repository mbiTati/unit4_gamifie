<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DataQuest — Duel SQL</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--lo1:#10b981;--lo2:#3b82f6;--lo4:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.topbar h1{font-size:.9rem;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--error));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;gap:.4rem;flex-wrap:wrap}
.topbar-right a,.topbar-right button{color:var(--muted);text-decoration:none;font-size:.68rem;font-weight:600;border:1px solid var(--border);padding:.2rem .5rem;border-radius:4px;background:none;cursor:pointer;font-family:inherit}
.main{max-width:900px;margin:0 auto;padding:1rem}
.btn{padding:.5rem 1rem;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:.82rem}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#fff}
.btn-teal{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-sm{padding:.3rem .6rem;font-size:.7rem}

/* STEP 1: Choose exercise */
.step{display:none}.step.active{display:block}
.section-title{font-size:.9rem;font-weight:800;margin-bottom:.8rem}
.exercise-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.5rem;margin-bottom:1.5rem}
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem;cursor:pointer;transition:all .2s}
.exercise-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.exercise-card.selected{border-color:var(--gold);background:rgba(245,158,11,.05);box-shadow:0 0 15px rgba(245,158,11,.1)}
.exercise-card .tag{font-size:.55rem;font-weight:700;padding:.1rem .3rem;border-radius:3px;margin-bottom:.3rem;display:inline-block}
.exercise-card h4{font-size:.78rem;font-weight:700;margin-bottom:.2rem}
.exercise-card p{font-size:.65rem;color:var(--muted);line-height:1.3}

/* STEP 2: Choose opponent */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-bottom:1rem}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem;cursor:pointer;transition:all .2s;text-align:center}
.player-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.player-card.online{border-left:3px solid var(--lo1)}
.player-card.selected{border-color:var(--gold);background:rgba(245,158,11,.05)}
.player-name{font-size:.75rem;font-weight:700}
.player-status{font-size:.55rem;margin-top:.2rem}

/* STEP 3: Waiting */
.waiting{text-align:center;padding:2rem}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ARENA */
.arena-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:.8rem}
.arena-player{display:flex;align-items:center;gap:.5rem}
.arena-player .name{font-weight:700;font-size:.82rem}
.arena-player .score-val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:800}
.arena-vs{font-size:1.2rem;font-weight:900;color:var(--gold)}
.arena-timer{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:.6rem}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.6rem}
.q-card .q{font-size:.88rem;font-weight:600;margin-bottom:.6rem;line-height:1.5}
.q-card .schema{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);background:var(--surface);padding:.4rem;border-radius:5px;margin-bottom:.6rem}
.sql-input{width:100%;padding:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;resize:vertical;min-height:55px}
.sql-input:focus{outline:none;border-color:var(--accent2)}
.feedback{padding:.4rem;border-radius:5px;font-size:.75rem;margin-top:.4rem;min-height:1.8rem}
.feedback.ok{background:rgba(16,185,129,.1);color:var(--lo1)}.feedback.no{background:rgba(239,68,68,.1);color:var(--error)}

/* Results */
.results{text-align:center;padding:2rem}
.results .winner{font-size:1.5rem;font-weight:900;margin-bottom:.5rem}
.final-scores{display:flex;justify-content:center;gap:2rem;margin:1rem 0}
.final-player{text-align:center}
.final-player .fscore{font-size:2rem;font-weight:900;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<script>if (!localStorage.getItem('cq_student')) { window.location.href = 'login.html'; }</script>

<div class="topbar">
  <h1>⚔️ Duel SQL</h1>
  <div class="topbar-right">
    <a href="home.html">Accueil</a>
    <a href="profile.html">Mon Profil</a>
    <a href="scores.html">Classement</a>
    <a href="settings.html">Paramètres</a>
    <button onclick="doLogout()">Déconnexion</button>
  </div>
</div>

<div class="main">
  <!-- STEP 1: Choose Exercise -->
  <div id="step1" class="step active">
    <div class="section-title">1. Choisissez l'exercice du duel</div>
    <div class="exercise-grid" id="exerciseGrid"></div>
    <div style="text-align:center;margin-top:.5rem">
      <div id="duelCounter" style="font-size:.75rem;margin-bottom:.5rem"></div>
      <button class="btn btn-gold" onclick="goStep2()" id="btnStep2" disabled>Suivant → Choisir l'adversaire</button>
    </div>
  </div>
  
  <!-- STEP 2: Choose Opponent -->
  <div id="step2" class="step">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
      <div class="section-title" style="margin:0">2. Choisissez votre adversaire</div>
      <div id="teacherBadge" style="display:none;font-size:.65rem;color:var(--gold);background:rgba(245,158,11,.08);padding:.2rem .5rem;border-radius:4px">👑 Mode prof : vous voyez les réponses pendant le duel</div>
      <button class="btn-sm" style="background:var(--surface);color:var(--muted);border:1px solid var(--border);cursor:pointer;font-family:inherit" onclick="goStep(1)">← Retour</button>
    </div>
    <div id="selectedExName" style="font-size:.78rem;color:var(--gold);margin-bottom:.8rem"></div>
    <div class="players-grid" id="playersGrid"></div>
    <div style="display:flex;gap:.5rem;justify-content:center;margin-top:1rem">
      <button class="btn btn-gold" onclick="launchDuel()" id="btnLaunch" disabled>⚔️ Lancer le duel !</button>
      <button class="btn btn-teal" onclick="startSoloDuel()">Mode solo (vs Bot)</button>
    </div>
  </div>
  
  <!-- STEP 3: Waiting -->
  <div id="step3" class="step">
    <div class="waiting">
      <div class="spinner"></div>
      <div style="font-size:1rem;font-weight:700" id="waitText">En attente...</div>
      <div style="font-size:.78rem;color:var(--muted);margin-top:.3rem" id="waitSub"></div>
      <button class="btn" style="margin-top:1rem;background:var(--surface);color:var(--muted);border:1px solid var(--border)" onclick="cancelDuel()">Annuler</button>
    </div>
  </div>
  
  <!-- STEP 4: Arena -->
  <div id="step4" class="step">
    <div class="arena-header">
      <div class="arena-player"><div id="charMe" style="width:36px;height:46px"></div><div><div class="name" id="nameMe">Moi</div><div class="score-val" id="scoreMe" style="color:var(--accent2)">0</div></div></div>
      <div class="arena-vs">VS</div>
      <div class="arena-player" style="text-align:right"><div><div class="name" id="nameOpp">Adversaire</div><div class="score-val" id="scoreOpp" style="color:var(--gold)">0</div></div><div id="charOpp" style="width:36px;height:46px"></div></div>
    </div>
    <div class="arena-timer" id="timer">⏱ 5:00</div>
    <div id="exTitle" style="font-size:.7rem;color:var(--gold);text-align:center;margin-bottom:.4rem"></div>
    <div class="q-card">
      <div id="qNum" style="font-size:.62rem;color:var(--muted);margin-bottom:.2rem"></div>
      <div class="q" id="qText"></div>
      <div class="schema" id="qSchema"></div>
      <textarea class="sql-input" id="sqlInput" placeholder="Votre requête SQL..." rows="2"></textarea>
      <div style="display:flex;gap:.4rem;margin-top:.4rem">
        <button class="btn btn-gold btn-sm" onclick="submitAnswer()">Valider</button>
        <button class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--muted)" onclick="skipQ()">Passer →</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>
  
  <!-- STEP 5: Results -->
  <div id="step5" class="step">
    <div class="results">
      <div class="winner" id="winnerText"></div>
      <div id="recapText" style="font-size:.82rem;color:var(--muted);margin-bottom:.5rem"></div>
      <div class="final-scores">
        <div class="final-player"><div class="name" id="fNameMe">Moi</div><div class="fscore" id="fScoreMe" style="color:var(--accent2)">0</div><div style="font-size:.65rem;color:var(--muted)">points</div></div>
        <div class="final-player"><div class="name" id="fNameOpp">Bot</div><div class="fscore" id="fScoreOpp" style="color:var(--gold)">0</div><div style="font-size:.65rem;color:var(--muted)">points</div></div>
      </div>
      <div style="display:flex;gap:.5rem;justify-content:center">
        <button class="btn btn-gold" onclick="location.reload()">Nouveau duel</button>
        <button class="btn btn-teal" onclick="location.href='home.html'">Accueil</button>
      </div>
    </div>
  </div>
</div>

<script src="characters.js"></script>

<script>
const student = JSON.parse(localStorage.getItem('cq_student') || 'null');
const isTeacher = student && student.role === 'teacher';

// Daily duel limit
const DUEL_MAX_PER_DAY = 3;
function getDuelCount() {
  const today = new Date().toISOString().slice(0, 10);
  const data = JSON.parse(localStorage.getItem('dq_duel_count') || '{}');
  if (data.date !== today) return 0;
  return data.count || 0;
}
function incrementDuelCount() {
  const today = new Date().toISOString().slice(0, 10);
  const data = JSON.parse(localStorage.getItem('dq_duel_count') || '{}');
  if (data.date !== today) { localStorage.setItem('dq_duel_count', JSON.stringify({date: today, count: 1})); return 1; }
  data.count = (data.count || 0) + 1;
  localStorage.setItem('dq_duel_count', JSON.stringify(data));
  return data.count;
}
function canDuel() { return getDuelCount() < DUEL_MAX_PER_DAY; }

const SB = 'https://jslbfkaujahihvjdxcjg.supabase.co/rest/v1';
const AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGJma2F1amFoaWh2amR4Y2pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODA3MzksImV4cCI6MjA4ODE1NjczOX0.h1lCm-DOG8wgUpMc0Ob1fUDSGpSu_Ix6PpboggdAVAc';

function doLogout(){ localStorage.clear(); window.location.href='login.html'; }

// ========== EXERCISE BANKS ==========
const EXERCISES = [
  { id:'sql_select', name:'SELECT & WHERE', tag:'SQL', color:'var(--lo2)', desc:'Filtrage, tri, LIKE, BETWEEN, DISTINCT (15 questions)', questions:[
    {q:"Tous les modèles de la marque 1",schema:"modele(id_modele, id_marque, nom_modele, prix_vente)",kw:["SELECT","modele","WHERE","id_marque","1"],hint:"Filtrez par identifiant",answer:"SELECT * FROM modele WHERE id_marque = 1"},
    {q:"Clients de Genève triés par nom",schema:"client(id_client, nom, prenom, ville)",kw:["SELECT","client","WHERE","ville","ORDER BY","nom"],hint:"Filtrez par ville puis triez",answer:"SELECT * FROM client WHERE ville = 'Genève' ORDER BY nom"},
    {q:"Les 5 modèles les plus chers",schema:"modele(id_modele, nom_modele, prix_vente)",kw:["SELECT","modele","ORDER BY","prix_vente","DESC","LIMIT","5"],hint:"Triez et limitez",answer:"SELECT * FROM modele ORDER BY prix_vente DESC LIMIT 5"},
    {q:"Modèles entre 50 et 150 CHF",schema:"modele(id_modele, nom_modele, prix_vente)",kw:["SELECT","modele","WHERE","prix_vente","BETWEEN","50","150"],hint:"Utilisez un intervalle",answer:"SELECT * FROM modele WHERE prix_vente BETWEEN 50 AND 150"},
    {q:"Clients dont le nom commence par D",schema:"client(id_client, nom, prenom)",kw:["SELECT","client","WHERE","nom","LIKE","D%"],hint:"Utilisez un joker",answer:"SELECT * FROM client WHERE nom LIKE 'D%'"},
    {q:"Villes distinctes des clients",schema:"client(id_client, nom, ville)",kw:["SELECT","DISTINCT","ville","client"],hint:"Éliminez les doublons",answer:"SELECT DISTINCT ville FROM client"},
    {q:"Modèles hors catégorie Running",schema:"modele(id_modele, nom_modele, categorie)",kw:["SELECT","modele","WHERE","categorie","Running"],hint:"Excluez une valeur",answer:"SELECT * FROM modele WHERE categorie != 'Running'"},
    {q:"10 dernières ventes par date",schema:"vente(id_vente, date_vente, prix_paye)",kw:["SELECT","vente","ORDER BY","date_vente","DESC","LIMIT","10"],hint:"Triez par date récente",answer:"SELECT * FROM vente ORDER BY date_vente DESC LIMIT 10"},
    {q:"Clients sans carte fidélité",schema:"client(id_client, nom, carte_fidelite)",kw:["SELECT","client","WHERE","carte_fidelite","0"],hint:"Filtrez sur un booléen",answer:"SELECT * FROM client WHERE carte_fidelite = 0"},
    {q:"Modèles dont le nom contient Air",schema:"modele(id_modele, nom_modele)",kw:["SELECT","modele","WHERE","nom_modele","LIKE","%Air%"],hint:"Recherche partielle",answer:"SELECT * FROM modele WHERE nom_modele LIKE '%Air%'"},
    {q:"Ventes de plus de 200 CHF en 2024",schema:"vente(id_vente, prix_paye, date_vente)",kw:["SELECT","vente","WHERE","prix_paye","200","date_vente","2024"],hint:"Deux conditions combinées",answer:"SELECT * FROM vente WHERE prix_paye > 200 AND date_vente >= '2024-01-01'"},
    {q:"Clients de Lausanne OU Genève",schema:"client(id_client, nom, ville)",kw:["SELECT","client","WHERE","ville","OR","IN"],hint:"Utilisez OR ou IN",answer:"SELECT * FROM client WHERE ville IN ('Lausanne','Genève')"},
    {q:"Nom et prix des 3 modèles les moins chers",schema:"modele(id_modele, nom_modele, prix_vente)",kw:["SELECT","nom_modele","prix_vente","modele","ORDER BY","ASC","LIMIT","3"],hint:"Triez du moins cher",answer:"SELECT nom_modele, prix_vente FROM modele ORDER BY prix_vente ASC LIMIT 3"},
    {q:"Ventes payées par carte",schema:"vente(id_vente, mode_paiement, prix_paye)",kw:["SELECT","vente","WHERE","mode_paiement","carte"],hint:"Filtrez par mode",answer:"SELECT * FROM vente WHERE mode_paiement = 'carte'"},
    {q:"Modèles sortis après 2023",schema:"modele(id_modele, nom_modele, date_sortie)",kw:["SELECT","modele","WHERE","date_sortie","2023"],hint:"Filtrez par date",answer:"SELECT * FROM modele WHERE date_sortie > '2023-12-31'"},
  ]},
  { id:'sql_aggregation', name:'Agrégation & GROUP BY', tag:'SQL', color:'var(--lo4)', desc:'COUNT, SUM, AVG, MAX, GROUP BY, HAVING (15 questions)', questions:[
    {q:"Nombre total de clients",schema:"client(id_client, nom)",kw:["SELECT","COUNT","client"],hint:"Comptez les lignes",answer:"SELECT COUNT(*) FROM client"},
    {q:"Chiffre d affaires total",schema:"vente(id_vente, prix_paye)",kw:["SELECT","SUM","prix_paye","vente"],hint:"Additionnez les montants",answer:"SELECT SUM(prix_paye) FROM vente"},
    {q:"Prix moyen des modèles",schema:"modele(id_modele, prix_vente)",kw:["SELECT","AVG","prix_vente","modele"],hint:"Calculez la moyenne",answer:"SELECT AVG(prix_vente) FROM modele"},
    {q:"Ventes par mode de paiement",schema:"vente(id_vente, mode_paiement)",kw:["SELECT","mode_paiement","COUNT","vente","GROUP BY"],hint:"Regroupez par catégorie",answer:"SELECT mode_paiement, COUNT(*) FROM vente GROUP BY mode_paiement"},
    {q:"Modèles par catégorie",schema:"modele(id_modele, categorie)",kw:["SELECT","categorie","COUNT","modele","GROUP BY"],hint:"Comptez par groupe",answer:"SELECT categorie, COUNT(*) FROM modele GROUP BY categorie"},
    {q:"Catégories avec plus de 3 modèles",schema:"modele(id_modele, categorie)",kw:["SELECT","categorie","COUNT","GROUP BY","HAVING","3"],hint:"Filtrez les groupes",answer:"SELECT categorie, COUNT(*) FROM modele GROUP BY categorie HAVING COUNT(*) > 3"},
    {q:"CA par client",schema:"vente(id_vente, id_client, prix_paye)",kw:["SELECT","id_client","SUM","prix_paye","vente","GROUP BY"],hint:"Sommez par personne",answer:"SELECT id_client, SUM(prix_paye) FROM vente GROUP BY id_client"},
    {q:"Prix max des modèles",schema:"modele(id_modele, prix_vente)",kw:["SELECT","MAX","prix_vente","modele"],hint:"Trouvez le maximum",answer:"SELECT MAX(prix_vente) FROM modele"},
    {q:"Prix min et max par catégorie",schema:"modele(id_modele, categorie, prix_vente)",kw:["SELECT","categorie","MIN","MAX","prix_vente","GROUP BY"],hint:"Min et Max par groupe",answer:"SELECT categorie, MIN(prix_vente), MAX(prix_vente) FROM modele GROUP BY categorie"},
    {q:"Nombre de ventes par mois en 2024",schema:"vente(id_vente, date_vente)",kw:["SELECT","MONTH","COUNT","vente","GROUP BY","2024"],hint:"Extrayez le mois et groupez",answer:"SELECT MONTH(date_vente), COUNT(*) FROM vente WHERE YEAR(date_vente)=2024 GROUP BY MONTH(date_vente)"},
    {q:"Moyenne des prix payés par client",schema:"vente(id_vente, id_client, prix_paye)",kw:["SELECT","id_client","AVG","prix_paye","GROUP BY"],hint:"Moyenne par groupe",answer:"SELECT id_client, AVG(prix_paye) FROM vente GROUP BY id_client"},
    {q:"Clients ayant fait plus de 5 achats",schema:"vente(id_vente, id_client)",kw:["SELECT","id_client","COUNT","GROUP BY","HAVING","5"],hint:"Comptez et filtrez",answer:"SELECT id_client, COUNT(*) FROM vente GROUP BY id_client HAVING COUNT(*) > 5"},
    {q:"Nombre de marques par pays",schema:"marque(id_marque, nom_marque, pays_origine)",kw:["SELECT","pays_origine","COUNT","marque","GROUP BY"],hint:"Comptez par pays",answer:"SELECT pays_origine, COUNT(*) FROM marque GROUP BY pays_origine"},
    {q:"Total des ventes du jour",schema:"vente(id_vente, prix_paye, date_vente)",kw:["SELECT","SUM","prix_paye","vente","WHERE","CURDATE"],hint:"Filtrez par date du jour",answer:"SELECT SUM(prix_paye) FROM vente WHERE date_vente = CURDATE()"},
    {q:"Modèle le plus cher par marque",schema:"modele(id_modele, id_marque, nom_modele, prix_vente)",kw:["SELECT","id_marque","MAX","prix_vente","GROUP BY"],hint:"Max par groupe",answer:"SELECT id_marque, MAX(prix_vente) FROM modele GROUP BY id_marque"},
  ]},
  { id:'sql_join', name:'Jointures (JOIN)', tag:'JOIN', color:'var(--lo1)', desc:'INNER, LEFT, RIGHT, multi-tables (12 questions)', questions:[
    {q:"Modèles avec le nom de leur marque",schema:"marque(id_marque, nom_marque) + modele(id_modele, id_marque, nom_modele)",kw:["SELECT","JOIN","modele","marque","ON","id_marque"],hint:"Joignez sur la clé étrangère",answer:"SELECT m.nom_modele, ma.nom_marque FROM modele m JOIN marque ma ON m.id_marque = ma.id_marque"},
    {q:"Ventes avec le nom du client",schema:"client(id_client, nom) + vente(id_vente, id_client, prix_paye)",kw:["SELECT","JOIN","vente","client","ON","id_client"],hint:"Joignez deux tables",answer:"SELECT c.nom, v.prix_paye FROM vente v JOIN client c ON v.id_client = c.id_client"},
    {q:"Marques sans aucun modèle",schema:"marque(id_marque, nom_marque) + modele(id_modele, id_marque)",kw:["SELECT","LEFT JOIN","marque","modele","IS NULL"],hint:"Trouvez les non-correspondances",answer:"SELECT ma.* FROM marque ma LEFT JOIN modele m ON ma.id_marque = m.id_marque WHERE m.id_modele IS NULL"},
    {q:"Ventes avec nom client ET nom modèle",schema:"client + vente + modele",kw:["SELECT","JOIN","vente","client","modele","ON"],hint:"Chaînez deux jointures",answer:"SELECT c.nom, m.nom_modele, v.prix_paye FROM vente v JOIN client c ON v.id_client = c.id_client JOIN modele m ON v.id_modele = m.id_modele"},
    {q:"CA par marque",schema:"marque + modele + vente",kw:["SELECT","nom_marque","SUM","JOIN","GROUP BY"],hint:"3 tables puis regroupez",answer:"SELECT ma.nom_marque, SUM(v.prix_paye) FROM marque ma JOIN modele m ON ma.id_marque = m.id_marque JOIN vente v ON m.id_modele = v.id_modele GROUP BY ma.nom_marque"},
    {q:"Clients avec plus de 500 CHF total",schema:"client(id_client, nom) + vente(id_vente, id_client, prix_paye)",kw:["SELECT","nom","SUM","JOIN","GROUP BY","HAVING","500"],hint:"Joignez, sommez et filtrez",answer:"SELECT c.nom, SUM(v.prix_paye) FROM client c JOIN vente v ON c.id_client = v.id_client GROUP BY c.nom HAVING SUM(v.prix_paye) > 500"},
    {q:"Clients qui n ont jamais acheté",schema:"client(id_client, nom) + vente(id_vente, id_client)",kw:["SELECT","LEFT JOIN","client","vente","IS NULL"],hint:"LEFT JOIN + NULL",answer:"SELECT c.* FROM client c LEFT JOIN vente v ON c.id_client = v.id_client WHERE v.id_vente IS NULL"},

function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
}
function goStep2() { if (!selectedExercise) return; goStep(2); loadPlayers(); }

// ========== STEP 1: EXERCISE SELECTION ==========
function renderExercises() {
  const grid = document.getElementById('exerciseGrid');
  grid.innerHTML = EXERCISES.map(ex => 
    '<div class="exercise-card" data-id="' + ex.id + '" id="ex_' + ex.id + '">' +
    '<span class="tag" style="background:' + ex.color + '20;color:' + ex.color + '">' + ex.tag + '</span>' +
    '<h4>' + ex.name + '</h4>' +
    '<p>' + ex.desc + '</p>' +
    '<div style="font-size:.55rem;color:var(--muted);margin-top:.2rem">' + ex.questions.length + ' questions</div>' +
    '</div>'
  ).join('');
  
  // Add click handlers via delegation
  grid.querySelectorAll('.exercise-card').forEach(function(card) {
    card.addEventListener('click', function() {
      selectExercise(this.dataset.id);
    });
  });
  
  // Show duel counter
  var dc = getDuelCount();
  var remain = DUEL_MAX_PER_DAY - dc;
  var counterEl = document.getElementById('duelCounter');
  if (counterEl) {
    if (remain <= 0 && !isTeacher) {
      counterEl.innerHTML = '<span style="color:var(--error);font-weight:700">⚠ 0/' + DUEL_MAX_PER_DAY + ' duels restants aujourd\'hui. Revenez demain !</span>';
      document.getElementById('btnStep2').disabled = true;
      document.getElementById('btnStep2').style.opacity = '.3';
    } else {
      counterEl.innerHTML = '<span style="color:var(--accent2)">' + remain + '/' + DUEL_MAX_PER_DAY + ' duels restants aujourd\'hui</span>';
    }
  }
}

function selectExercise(id) {
  selectedExercise = EXERCISES.find(e => e.id === id);
  document.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('ex_' + id).classList.add('selected');
  document.getElementById('btnStep2').disabled = false;
}

// ========== STEP 2: OPPONENT SELECTION ==========
async function loadPlayers() {
  if (isTeacher) document.getElementById('teacherBadge').style.display = 'block';
  document.getElementById('selectedExName').textContent = '⚔️ Exercice : ' + selectedExercise.name;
  
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '<div style="text-align:center;color:var(--muted);padding:1rem">Chargement...</div>';
  
  try {
    // Load ALL students (same class + teachers)
    const students = await supabase.query('cq_students', { select: '*' });
    console.log('Students result:', students);
    
    // Filter: must be array, not error
    let sList = [];
    if (Array.isArray(students)) {
      sList = students;
    } else if (students && typeof students === 'object' && !students.message) {
      sList = [students];
    }
    
    // Teacher sees ALL students; Student sees own class + teachers
    const myClass = student.class_name || 'BI1';
    let allPlayers;
    if (isTeacher) {
      allPlayers = sList.filter(s => s.id !== student.id);
    } else {
      const classmates = sList.filter(s => s.class_name === myClass && s.id !== student.id && s.role !== 'teacher');
      const profs = sList.filter(s => s.role === 'teacher' && s.id !== student.id);
      allPlayers = [...classmates, ...profs];
    }
    
    // Try to get presence (optional — might not exist)
    let pMap = {};
    try {
      const pres = await supabase.query('cq_presence', { select: '*' });
      if (Array.isArray(pres)) {
        const now = new Date();
        for (const p of pres) {
          pMap[p.student_id] = (now - new Date(p.last_seen)) < 120000;
        }
      }
    } catch(e) { console.log('Presence not available'); }
    
    let html = '';
    let onlineCount = 0;
    
    for (const s of allPlayers) {
      const isOnline = pMap[s.id] || false;
      const isProf = s.role === 'teacher';
      if (isOnline) onlineCount++;
      
      // Escape names for onclick
      const safeFN = (s.first_name || '').replace(/'/g, '');
      const safeLN = (s.last_name || '').replace(/'/g, '');
      
      html += '<div class="player-card ' + (isOnline ? 'online' : '') + '" id="pl_' + s.id + '" data-pid="' + s.id + '" data-fn="' + safeFN + '" data-ln="' + safeLN + '">';
      html += '<div class="player-name">' + (isProf ? '👑 ' : '') + s.first_name + ' ' + (s.last_name || '').charAt(0) + '.</div>';
      html += '<div style="font-size:.6rem;color:' + (isProf ? 'var(--gold)' : 'var(--muted)') + '">' + (isProf ? 'Prof' : (s.class_name || '')) + '</div>';
      html += '<div class="player-status" style="color:' + (isOnline ? 'var(--lo1)' : 'var(--muted)') + '">' + (isOnline ? '● En ligne' : '') + '</div>';
      html += '</div>';
    }
    
    if (!html) {
      html = '<div style="text-align:center;color:var(--muted);padding:1.5rem;font-size:.85rem">Aucun joueur trouvé' + (isTeacher ? '' : ' dans la classe ' + myClass) + '.<br><span style="font-size:.7rem">Total élèves chargés: ' + sList.length + '</span></div>';
    }
    
    grid.innerHTML = html;
    
    // Add click handlers for player cards
    grid.querySelectorAll('.player-card').forEach(function(card) {
      card.addEventListener('click', function() {
        selectPlayer(this.dataset.pid, this.dataset.fn, this.dataset.ln);
      });
    });
    
    document.getElementById('selectedExName').textContent = '⚔️ ' + selectedExercise.name + ' · ' + allPlayers.length + ' joueurs' + (onlineCount > 0 ? ' · ' + onlineCount + ' en ligne' : '');
    
  } catch(err) {
    console.error('loadPlayers error:', err);
    grid.innerHTML = '<div style="text-align:center;color:var(--error);padding:1rem">Erreur de chargement : ' + err.message + '</div>';
  }
}

function selectPlayer(id, first, last) {
  selectedOpponent = { id, name: first + ' ' + last.charAt(0) + '.' };
  document.querySelectorAll('.player-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('pl_' + id).classList.add('selected');
  document.getElementById('btnLaunch').disabled = false;
}

// ========== LAUNCH DUEL ==========
async function launchDuel() {
  if (!selectedExercise || !selectedOpponent) return;
  if (!isTeacher && !canDuel()) { alert('Maximum ' + DUEL_MAX_PER_DAY + ' duels par jour atteint !'); return; }
  
  const qs = [...selectedExercise.questions].sort(() => Math.random() - 0.5);
  oppName = selectedOpponent.name;
  
  // Create duel in Supabase
  const res = await fetch(SB + '/cq_duels', {
    method: 'POST',
    headers: { 'apikey': AK, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify({
      player1_id: student.id,
      player2_id: selectedOpponent.id,
      status: 'waiting',
      questions: qs.map(q => ({ q: q.q, schema: q.schema, kw: q.kw, hint: q.hint })),
      unit_id: 4
    })
  }).then(r => r.json());
  
  duelId = Array.isArray(res) ? res[0]?.id : res?.id;
  if (!duelId) { alert('Erreur'); return; }
  
  goStep(3);
  document.getElementById('waitText').textContent = 'Défi envoyé à ' + oppName + ' !';
  document.getElementById('waitSub').textContent = 'Exercice : ' + selectedExercise.name + ' · En attente...';
  
  // Poll for acceptance
  pollInterval = setInterval(async () => {
    const chk = await fetch(SB + '/cq_duels?id=eq.' + duelId + '&select=status', { headers: { 'apikey': AK } }).then(r => r.json());
    if (Array.isArray(chk) && chk[0]?.status === 'playing') {
      clearInterval(pollInterval);
      startArena(qs, oppName);
    }
  }, 2000);
}

function startSoloDuel() {
  if (!selectedExercise) return;
  if (!isTeacher && !canDuel()) { alert('Maximum ' + DUEL_MAX_PER_DAY + ' duels par jour atteint !'); return; }
  oppName = 'Bot SQL';
  const qs = [...selectedExercise.questions].sort(() => Math.random() - 0.5);
  startArena(qs, 'Bot SQL');
}

function cancelDuel() {
  if (pollInterval) clearInterval(pollInterval);
  if (duelId) fetch(SB + '/cq_duels?id=eq.' + duelId, { method: 'DELETE', headers: { 'apikey': AK } });
  goStep(2);
}

// ========== ARENA ==========
function startArena(qs, opp) {
  questions = qs; currentQ = 0; myScore = 0; oppScore = 0; oppName = opp; timeLeft = 300; _amP1 = null;
  
  goStep(4);
  if (!isTeacher) incrementDuelCount();
  document.getElementById('nameMe').textContent = student.first_name;
  document.getElementById('nameOpp').textContent = oppName;
  document.getElementById('exTitle').textContent = selectedExercise ? '⚔️ ' + selectedExercise.name : '';
  
  createCharacter(0, document.getElementById('charMe'), 30);
  createCharacter(3, document.getElementById('charOpp'), 30);
  
  showQ();
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timer').textContent = '⏱ ' + m + ':' + (s < 10 ? '0' : '') + s;
    if (timeLeft <= 60) document.getElementById('timer').style.color = 'var(--error)';
    if (timeLeft <= 0) endDuel();
  }, 1000);
  
  if (duelId && oppName !== 'Bot SQL') startScorePoll();
}

function showQ() {
  if (currentQ >= questions.length) { endDuel(); return; }
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = 'Question ' + (currentQ + 1) + '/' + questions.length;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qSchema').textContent = 'Tables: ' + q.schema;
  document.getElementById('sqlInput').value = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  
  // Show answer panel for teachers
  var ansPanel = document.getElementById('teacherAnswer');
  if (isTeacher) {
    if (!ansPanel) {
      ansPanel = document.createElement('div');
      ansPanel.id = 'teacherAnswer';
      ansPanel.style.cssText = 'margin-top:.5rem;padding:.6rem;background:rgba(245,158,11,.06);border:1px dashed var(--gold);border-radius:6px';
      document.querySelector('.q-card').appendChild(ansPanel);
    }
    var kws = q.kw ? q.kw.join(', ') : '';
    var hint = q.hint || '';
    var fullAnswer = q.answer || 'Pas de réponse définie';
    ansPanel.innerHTML = '<div style="font-size:.6rem;font-weight:700;color:var(--gold);margin-bottom:.3rem">👑 RÉPONSE COMPLÈTE (invisible pour l\'élève)</div>' +
      '<div style="font-family:JetBrains Mono,monospace;font-size:.78rem;color:var(--accent2);background:var(--surface);padding:.5rem;border-radius:4px;margin-bottom:.3rem;white-space:pre-wrap">' + fullAnswer + '</div>' +
      '<div style="font-size:.6rem;color:var(--muted)">Mots-clés: ' + kws + '</div>';
  } else if (ansPanel) {
    ansPanel.remove();
  }
  
  document.getElementById('sqlInput').focus();
}

function submitAnswer() {
  const input = document.getElementById('sqlInput').value.trim().toUpperCase();
  const q = questions[currentQ];
  const fb = document.getElementById('feedback');
  if (!input) { fb.textContent = 'Écrivez une réponse !'; fb.className = 'feedback no'; return; }
  
  let matched = 0;
  for (const kw of q.kw) { if (input.includes(kw.toUpperCase())) matched++; }
  
  if (matched / q.kw.length >= 0.7) {
    const pts = 10 + Math.max(0, Math.floor(timeLeft / 30));
    myScore += pts;
    document.getElementById('scoreMe').textContent = myScore;
    fb.innerHTML = '✅ +' + pts + ' pts !'; fb.className = 'feedback ok';
    syncScore();
    if (oppName === 'Bot SQL' && Math.random() < 0.45) { oppScore += 5 + Math.floor(Math.random() * 8); document.getElementById('scoreOpp').textContent = oppScore; }
    setTimeout(() => { currentQ++; showQ(); }, 1000);
  } else {
    if (isTeacher) {
      fb.innerHTML = '❌ Réponse attendue : <span style="color:var(--accent2);font-family:JetBrains Mono,monospace">' + (q.answer || q.kw.join(' ')) + '</span>';
    } else {
      fb.innerHTML = '❌ ' + (q.hint || 'Réessayez...');
    }
    fb.className = 'feedback no';
    if (oppName === 'Bot SQL' && Math.random() < 0.25) { oppScore += 5 + Math.floor(Math.random() * 6); document.getElementById('scoreOpp').textContent = oppScore; }
  }
}

function skipQ() {
  const fb = document.getElementById('feedback');
  if (isTeacher) {
    fb.innerHTML = 'Passée ! Réponse : <span style="color:var(--accent2);font-family:JetBrains Mono,monospace">' + (questions[currentQ].answer || '') + '</span>';
  } else {
    fb.innerHTML = 'Passée ! ' + (questions[currentQ].hint || 'Question suivante...');
  }
  fb.className = 'feedback no';
  if (oppName === 'Bot SQL') { oppScore += 8; document.getElementById('scoreOpp').textContent = oppScore; }
  setTimeout(() => { currentQ++; showQ(); }, 1500);
}

// ========== SCORE SYNC ==========
async function syncScore() {
  if (!duelId) return;
  if (_amP1 === null) {
    const d = await fetch(SB + '/cq_duels?id=eq.' + duelId + '&select=player1_id', { headers: { 'apikey': AK } }).then(r => r.json()).catch(() => []);
    if (Array.isArray(d) && d[0]) _amP1 = d[0].player1_id === student.id;
  }
  const f = _amP1 ? 'player1_score' : 'player2_score';
  const b = {}; b[f] = myScore;
  fetch(SB + '/cq_duels?id=eq.' + duelId, { method: 'PATCH', headers: { 'apikey': AK, 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).catch(() => {});
}

function startScorePoll() {
  setInterval(async () => {
    if (_amP1 === null) return;
    const f = _amP1 ? 'player2_score' : 'player1_score';
    const d = await fetch(SB + '/cq_duels?id=eq.' + duelId + '&select=' + f, { headers: { 'apikey': AK } }).then(r => r.json()).catch(() => []);
    if (Array.isArray(d) && d[0]) {
      const ns = d[0][f] || 0;
      if (ns !== oppScore) { oppScore = ns; document.getElementById('scoreOpp').textContent = oppScore; document.getElementById('scoreOpp').style.textShadow = '0 0 10px var(--gold)'; setTimeout(() => document.getElementById('scoreOpp').style.textShadow = 'none', 500); }
    }
  }, 3000);
}

// ========== END DUEL ==========
function endDuel() {
  clearInterval(timerInterval);
  goStep(5);
  const won = myScore > oppScore, tie = myScore === oppScore;
  document.getElementById('winnerText').innerHTML = tie ? '<span style="color:var(--gold)">Égalité !</span>' : won ? '<span style="color:var(--lo1)">Victoire ! 🎉</span>' : '<span style="color:var(--error)">Défaite... 💪</span>';
  document.getElementById('recapText').textContent = (selectedExercise?.name || 'Duel') + ' · ' + questions.length + ' questions';
  document.getElementById('fNameMe').textContent = student.first_name;
  document.getElementById('fScoreMe').textContent = myScore;
  document.getElementById('fNameOpp').textContent = oppName;
  document.getElementById('fScoreOpp').textContent = oppScore;
  if (typeof saveGameScore === 'function') saveGameScore('duel-sql', myScore, 300 - timeLeft);
  if (duelId) fetch(SB + '/cq_duels?id=eq.' + duelId, { method: 'PATCH', headers: { 'apikey': AK, 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'finished' }) }).catch(() => {});
}

// ========== JOIN FROM URL ==========
async function checkJoinDuel() {
  try {
    const p = new URLSearchParams(window.location.search);
    const jid = p.get('duel');
    if (!jid) return false;
    const d = await fetch(SB + '/cq_duels?id=eq.' + jid + '&select=*', { headers: { 'apikey': AK } }).then(r => r.json());
  if (!Array.isArray(d) || !d[0]) return false;
  duelId = jid;
  const duel = d[0];
  const oppId = duel.player1_id === student.id ? duel.player2_id : duel.player1_id;
  const oppR = await fetch(SB + '/cq_students?id=eq.' + oppId + '&select=first_name,last_name', { headers: { 'apikey': AK } }).then(r => r.json());
  oppName = (Array.isArray(oppR) && oppR[0]) ? oppR[0].first_name + ' ' + oppR[0].last_name.charAt(0) + '.' : 'Adversaire';
  const qs = (duel.questions || []).map(q => ({ q: q.q, schema: q.schema, kw: q.kw, hint: q.hint }));
  selectedExercise = { name: 'Duel', questions: qs };
    startArena(qs, oppName);
    return true;
  } catch(e) {
    console.error('checkJoinDuel error:', e);
    return false;
  }
}

// Enter to submit
document.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey && document.getElementById('step4').classList.contains('active')) { e.preventDefault(); submitAnswer(); } });

// Init
(async () => {
  try {
    const joined = await checkJoinDuel();
    if (!joined) renderExercises();
  } catch(e) {
    console.error('Init error:', e);
    renderExercises();
  }
})();
</script>
