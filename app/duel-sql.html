<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DataQuest — Duel SQL</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--lo1:#10b981;--lo2:#3b82f6;--lo4:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.topbar h1{font-size:.9rem;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--error));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;gap:.4rem;flex-wrap:wrap}
.topbar-right a,.topbar-right button{color:var(--muted);text-decoration:none;font-size:.68rem;font-weight:600;border:1px solid var(--border);padding:.2rem .5rem;border-radius:4px;background:none;cursor:pointer;font-family:inherit}
.main{max-width:900px;margin:0 auto;padding:1rem}
.btn{padding:.5rem 1rem;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:.82rem}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#fff}
.btn-teal{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-sm{padding:.3rem .6rem;font-size:.7rem}

/* STEP 1: Choose exercise */
.step{display:none}.step.active{display:block}
.section-title{font-size:.9rem;font-weight:800;margin-bottom:.8rem}
.exercise-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.5rem;margin-bottom:1.5rem}
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem;cursor:pointer;transition:all .2s}
.exercise-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.exercise-card.selected{border-color:var(--gold);background:rgba(245,158,11,.05);box-shadow:0 0 15px rgba(245,158,11,.1)}
.exercise-card .tag{font-size:.55rem;font-weight:700;padding:.1rem .3rem;border-radius:3px;margin-bottom:.3rem;display:inline-block}
.exercise-card h4{font-size:.78rem;font-weight:700;margin-bottom:.2rem}
.exercise-card p{font-size:.65rem;color:var(--muted);line-height:1.3}

/* STEP 2: Choose opponent */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-bottom:1rem}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem;cursor:pointer;transition:all .2s;text-align:center}
.player-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.player-card.online{border-left:3px solid var(--lo1)}
.player-card.selected{border-color:var(--gold);background:rgba(245,158,11,.05)}
.player-name{font-size:.75rem;font-weight:700}
.player-status{font-size:.55rem;margin-top:.2rem}

/* STEP 3: Waiting */
.waiting{text-align:center;padding:2rem}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ARENA */
.arena-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:.8rem}
.arena-player{display:flex;align-items:center;gap:.5rem}
.arena-player .name{font-weight:700;font-size:.82rem}
.arena-player .score-val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:800}
.arena-vs{font-size:1.2rem;font-weight:900;color:var(--gold)}
.arena-timer{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:.6rem}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.6rem}
.q-card .q{font-size:.88rem;font-weight:600;margin-bottom:.6rem;line-height:1.5}
.q-card .schema{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);background:var(--surface);padding:.4rem;border-radius:5px;margin-bottom:.6rem}
.sql-input{width:100%;padding:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;resize:vertical;min-height:55px}
.sql-input:focus{outline:none;border-color:var(--accent2)}
.feedback{padding:.4rem;border-radius:5px;font-size:.75rem;margin-top:.4rem;min-height:1.8rem}
.feedback.ok{background:rgba(16,185,129,.1);color:var(--lo1)}.feedback.no{background:rgba(239,68,68,.1);color:var(--error)}

/* Results */
.results{text-align:center;padding:2rem}
.results .winner{font-size:1.5rem;font-weight:900;margin-bottom:.5rem}
.final-scores{display:flex;justify-content:center;gap:2rem;margin:1rem 0}
.final-player{text-align:center}
.final-player .fscore{font-size:2rem;font-weight:900;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<script>if (!localStorage.getItem('cq_student')) { window.location.href = 'login.html'; }</script>

<div class="topbar">
  <h1>⚔️ Duel SQL</h1>
  <div class="topbar-right">
    <a href="home.html">Accueil</a>
    <a href="profile.html">Mon Profil</a>
    <a href="scores.html">Classement</a>
    <a href="settings.html">Paramètres</a>
    <button onclick="doLogout()">Déconnexion</button>
  </div>
</div>

<div class="main">
  <!-- STEP 1: Choose Exercise -->
  <div id="step1" class="step active">
    <div class="section-title">1. Choisissez l'exercice du duel</div>
    <div class="exercise-grid" id="exerciseGrid"></div>
    <div style="text-align:center;margin-top:.5rem">
      <button class="btn btn-gold" onclick="goStep2()" id="btnStep2" disabled>Suivant → Choisir l'adversaire</button>
    </div>
  </div>
  
  <!-- STEP 2: Choose Opponent -->
  <div id="step2" class="step">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
      <div class="section-title" style="margin:0">2. Choisissez votre adversaire</div>
      <button class="btn-sm" style="background:var(--surface);color:var(--muted);border:1px solid var(--border);cursor:pointer;font-family:inherit" onclick="goStep(1)">← Retour</button>
    </div>
    <div id="selectedExName" style="font-size:.78rem;color:var(--gold);margin-bottom:.8rem"></div>
    <div class="players-grid" id="playersGrid"></div>
    <div style="display:flex;gap:.5rem;justify-content:center;margin-top:1rem">
      <button class="btn btn-gold" onclick="launchDuel()" id="btnLaunch" disabled>⚔️ Lancer le duel !</button>
      <button class="btn btn-teal" onclick="startSoloDuel()">Mode solo (vs Bot)</button>
    </div>
  </div>
  
  <!-- STEP 3: Waiting -->
  <div id="step3" class="step">
    <div class="waiting">
      <div class="spinner"></div>
      <div style="font-size:1rem;font-weight:700" id="waitText">En attente...</div>
      <div style="font-size:.78rem;color:var(--muted);margin-top:.3rem" id="waitSub"></div>
      <button class="btn" style="margin-top:1rem;background:var(--surface);color:var(--muted);border:1px solid var(--border)" onclick="cancelDuel()">Annuler</button>
    </div>
  </div>
  
  <!-- STEP 4: Arena -->
  <div id="step4" class="step">
    <div class="arena-header">
      <div class="arena-player"><div id="charMe" style="width:36px;height:46px"></div><div><div class="name" id="nameMe">Moi</div><div class="score-val" id="scoreMe" style="color:var(--accent2)">0</div></div></div>
      <div class="arena-vs">VS</div>
      <div class="arena-player" style="text-align:right"><div><div class="name" id="nameOpp">Adversaire</div><div class="score-val" id="scoreOpp" style="color:var(--gold)">0</div></div><div id="charOpp" style="width:36px;height:46px"></div></div>
    </div>
    <div class="arena-timer" id="timer">⏱ 5:00</div>
    <div id="exTitle" style="font-size:.7rem;color:var(--gold);text-align:center;margin-bottom:.4rem"></div>
    <div class="q-card">
      <div id="qNum" style="font-size:.62rem;color:var(--muted);margin-bottom:.2rem"></div>
      <div class="q" id="qText"></div>
      <div class="schema" id="qSchema"></div>
      <textarea class="sql-input" id="sqlInput" placeholder="Votre requête SQL..." rows="2"></textarea>
      <div style="display:flex;gap:.4rem;margin-top:.4rem">
        <button class="btn btn-gold btn-sm" onclick="submitAnswer()">Valider</button>
        <button class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--muted)" onclick="skipQ()">Passer →</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>
  
  <!-- STEP 5: Results -->
  <div id="step5" class="step">
    <div class="results">
      <div class="winner" id="winnerText"></div>
      <div id="recapText" style="font-size:.82rem;color:var(--muted);margin-bottom:.5rem"></div>
      <div class="final-scores">
        <div class="final-player"><div class="name" id="fNameMe">Moi</div><div class="fscore" id="fScoreMe" style="color:var(--accent2)">0</div><div style="font-size:.65rem;color:var(--muted)">points</div></div>
        <div class="final-player"><div class="name" id="fNameOpp">Bot</div><div class="fscore" id="fScoreOpp" style="color:var(--gold)">0</div><div style="font-size:.65rem;color:var(--muted)">points</div></div>
      </div>
      <div style="display:flex;gap:.5rem;justify-content:center">
        <button class="btn btn-gold" onclick="location.reload()">Nouveau duel</button>
        <button class="btn btn-teal" onclick="location.href='home.html'">Accueil</button>
      </div>
    </div>
  </div>
</div>

<script src="characters.js"></script>
<script src="supabase-config.js"></script>
<script src="progress-saver.js"></script>
<script>
const student = JSON.parse(localStorage.getItem('cq_student') || 'null');
const SB = 'https://jslbfkaujahihvjdxcjg.supabase.co/rest/v1';
const AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGJma2F1amFoaWh2amR4Y2pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODA3MzksImV4cCI6MjA4ODE1NjczOX0.h1lCm-DOG8wgUpMc0Ob1fUDSGpSu_Ix6PpboggdAVAc';

// ========== EXERCISE BANKS ==========
const EXERCISES = [
  { id:'sql_select', name:'SELECT & WHERE', tag:'SQL', color:'var(--lo2)', desc:'Filtrage, tri, LIKE, BETWEEN, DISTINCT', questions:[
    {q:"Tous les modèles de la marque 1",schema:"modele(id_modele, id_marque, nom_modele, prix_vente)",kw:["SELECT","modele","WHERE","id_marque","1"],hint:"SELECT ... FROM ... WHERE ..."},
    {q:"Clients de Genève triés par nom",schema:"client(id_client, nom, prenom, ville)",kw:["SELECT","client","WHERE","ville","Genève","ORDER BY","nom"],hint:"WHERE ville = '...' ORDER BY ..."},

    {q:"Modèles entre 50 et 150 CHF",schema:"modele(id_modele, nom_modele, prix_vente)",kw:["SELECT","modele","WHERE","prix_vente","BETWEEN","50","150"],hint:"BETWEEN ... AND ..."},
    {q:"Clients dont le nom commence par 'D'",schema:"client(id_client, nom, prenom)",kw:["SELECT","client","WHERE","nom","LIKE","D%"],hint:"WHERE nom LIKE '...'"},
    {q:"Villes distinctes des clients",schema:"client(id_client, nom, ville)",kw:["SELECT","DISTINCT","ville","client"],hint:"SELECT DISTINCT ..."},
    {q:"Modèles qui ne sont PAS de la catégorie 'Running'",schema:"modele(id_modele, nom_modele, categorie)",kw:["SELECT","modele","WHERE","categorie","NOT","Running"],hint:"WHERE categorie != '...' ou NOT"},
    {q:"10 dernières ventes par date",schema:"vente(id_vente, date_vente, prix_paye)",kw:["SELECT","vente","ORDER BY","date_vente","DESC","LIMIT","10"],hint:"ORDER BY ... DESC LIMIT ..."},
  ]},
  { id:'sql_aggregation', name:'Agrégation & GROUP BY', tag:'SQL', color:'var(--lo4)', desc:'COUNT, SUM, AVG, MAX, GROUP BY, HAVING', questions:[
    {q:"Nombre total de clients",schema:"client(id_client, nom, prenom)",kw:["SELECT","COUNT","client"],hint:"SELECT COUNT(*) FROM ..."},
    {q:"Chiffre d'affaires total",schema:"vente(id_vente, prix_paye)",kw:["SELECT","SUM","prix_paye","vente"],hint:"SELECT SUM(...) FROM ..."},
    {q:"Prix moyen des modèles",schema:"modele(id_modele, prix_vente)",kw:["SELECT","AVG","prix_vente","modele"],hint:"SELECT AVG(...) FROM ..."},
    {q:"Nombre de ventes par mode de paiement",schema:"vente(id_vente, mode_paiement)",kw:["SELECT","mode_paiement","COUNT","vente","GROUP BY"],hint:"GROUP BY mode_paiement"},
    {q:"Nombre de modèles par catégorie",schema:"modele(id_modele, categorie)",kw:["SELECT","categorie","COUNT","modele","GROUP BY"],hint:"SELECT ..., COUNT(*) ... GROUP BY ..."},
    {q:"Catégories ayant plus de 3 modèles",schema:"modele(id_modele, categorie)",kw:["SELECT","categorie","COUNT","GROUP BY","HAVING","3"],hint:"GROUP BY ... HAVING COUNT(*) > ..."},
    {q:"Chiffre d'affaires par client",schema:"vente(id_vente, id_client, prix_paye)",kw:["SELECT","id_client","SUM","prix_paye","vente","GROUP BY"],hint:"SELECT id_client, SUM(...) ... GROUP BY ..."},
    {q:"Modèle le plus cher (avec MAX)",schema:"modele(id_modele, nom_modele, prix_vente)",kw:["SELECT","MAX","prix_vente","modele"],hint:"SELECT MAX(...) FROM ..."},

    {q:"Ventes avec le nom du client",schema:"client(id_client, nom) · vente(id_vente, id_client, prix_paye)",kw:["SELECT","JOIN","vente","client","ON","id_client"],hint:"... JOIN client ON ..."},
    {q:"Marques sans aucun modèle (LEFT JOIN)",schema:"marque(id_marque, nom_marque) · modele(id_modele, id_marque)",kw:["SELECT","LEFT JOIN","marque","modele","ON","NULL","IS NULL"],hint:"LEFT JOIN ... WHERE ... IS NULL"},
    {q:"Ventes avec nom du client ET nom du modèle",schema:"client(id_client, nom) · vente(id_vente, id_client, id_modele) · modele(id_modele, nom_modele)",kw:["SELECT","JOIN","vente","client","modele","ON"],hint:"Double JOIN : ... JOIN client ON ... JOIN modele ON ..."},
    {q:"Chiffre d'affaires par marque",schema:"marque(id_marque, nom_marque) · modele(id_modele, id_marque) · vente(id_vente, id_modele, prix_paye)",kw:["SELECT","nom_marque","SUM","JOIN","GROUP BY"],hint:"JOIN marque → modele → vente puis GROUP BY"},
    {q:"Clients ayant acheté plus de 500 CHF au total",schema:"client(id_client, nom) · vente(id_vente, id_client, prix_paye)",kw:["SELECT","nom","SUM","JOIN","GROUP BY","HAVING","500"],hint:"JOIN + GROUP BY + HAVING SUM(...) > ..."},
  ]},
  { id:'sql_dml', name:'INSERT / UPDATE / DELETE', tag:'DML', color:'var(--error)', desc:'Manipulation des données', questions:[
    {q:"Insérer un client 'Dupont' à Lausanne",schema:"client(id_client, nom, prenom, ville)",kw:["INSERT","INTO","client","VALUES","Dupont","Lausanne"],hint:"INSERT INTO ... VALUES (...)"},
    {q:"Augmenter tous les prix de 10%",schema:"modele(id_modele, prix_vente)",kw:["UPDATE","modele","SET","prix_vente","1.1"],hint:"UPDATE ... SET prix_vente = prix_vente * 1.1"},
    {q:"Supprimer les ventes de 2020",schema:"vente(id_vente, date_vente)",kw:["DELETE","FROM","vente","WHERE","date_vente","2020"],hint:"DELETE FROM ... WHERE ..."},
    {q:"Modifier la ville du client 5 en 'Berne'",schema:"client(id_client, ville)",kw:["UPDATE","client","SET","ville","Berne","WHERE","id_client","5"],hint:"UPDATE ... SET ... WHERE id_client = ..."},
    {q:"Insérer un modèle 'Air Max' pour la marque 2",schema:"modele(id_modele, id_marque, nom_modele)",kw:["INSERT","INTO","modele","VALUES","Air Max","2"],hint:"INSERT INTO modele ... VALUES ..."},
    {q:"Supprimer les clients sans carte fidélité",schema:"client(id_client, carte_fidelite)",kw:["DELETE","FROM","client","WHERE","carte_fidelite","0"],hint:"DELETE FROM ... WHERE carte_fidelite = 0"},
  ]},
  { id:'mcd_quiz', name:'MCD & Normalisation', tag:'MCD', color:'var(--gold)', desc:'Questions théoriques sur la conception', questions:[
    {q:"Quel est le résultat d'une relation N:M au passage MLD ?",schema:"MCD → MLD",kw:["table","liaison","associative","intermédiaire"],hint:"Pensez à la table qui fait le lien entre les deux"},
    {q:"Qu'élimine la 2NF ?",schema:"Normalisation",kw:["dépendances","partielles","partielle"],hint:"Concerne les dépendances vis-à-vis d'une PARTIE de la clé"},
    {q:"Qu'élimine la 3NF ?",schema:"Normalisation",kw:["dépendances","transitives","transitive"],hint:"A → B → C, que faire de C ?"},
    {q:"Que signifie la cardinalité (0,N) ?",schema:"MCD Merise",kw:["zéro","plusieurs","0","optionnel","N"],hint:"Le minimum est 0, le maximum est illimité"},
    {q:"Qu'est-ce qu'un attribut multivalué viole ?",schema:"Normalisation",kw:["1NF","première","forme","normale","atomique"],hint:"Les valeurs doivent être ..."},
    {q:"PK signifie ?",schema:"Bases de données",kw:["primary","key","primaire","clé","unique","identifiant"],hint:"L'identifiant unique d'un enregistrement"},
  ]},
];

// ========== STATE ==========
let selectedExercise = null;
let selectedOpponent = null;
let questions = [];
let currentQ = 0;
let myScore = 0;
let oppScore = 0;
let oppName = '';
let timerInterval = null;
let timeLeft = 300;
let duelId = null;
let pollInterval = null;
let _amP1 = null;

function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
}
function goStep2() { if (!selectedExercise) return; goStep(2); loadPlayers(); }

// ========== STEP 1: EXERCISE SELECTION ==========
function renderExercises() {
  const grid = document.getElementById('exerciseGrid');
  grid.innerHTML = EXERCISES.map(ex => 
    '<div class="exercise-card" id="ex_' + ex.id + '" onclick="selectExercise(\'' + ex.id + '\')">' +
    '<span class="tag" style="background:' + ex.color + '20;color:' + ex.color + '">' + ex.tag + '</span>' +
    '<h4>' + ex.name + '</h4>' +
    '<p>' + ex.desc + '</p>' +
    '<div style="font-size:.55rem;color:var(--muted);margin-top:.2rem">' + ex.questions.length + ' questions</div>' +
    '</div>'
  ).join('');
}

function selectExercise(id) {
  selectedExercise = EXERCISES.find(e => e.id === id);
  document.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('ex_' + id).classList.add('selected');
  document.getElementById('btnStep2').disabled = false;
}

// ========== STEP 2: OPPONENT SELECTION ==========
async function loadPlayers() {
  document.getElementById('selectedExName').textContent = '⚔️ Exercice : ' + selectedExercise.name;
  
  // Load class students + presence
  const students = await supabase.query('cq_students', {
    select: '*',
    filter: { 'class_name': 'eq.' + (student.class_name || 'BI1') }
  }) || [];
  
  const presence = await supabase.query('cq_presence', {
    select: '*', filter: { 'unit_id': 'eq.4' }
  }) || [];
  
  const sList = Array.isArray(students) ? students : [];
  const pList = Array.isArray(presence) ? presence : [];
  const now = new Date();
  
  const grid = document.getElementById('playersGrid');
  let html = '';
  
  // Also load teachers from all classes
  const teachers = await supabase.query('cq_students', {
    select: '*', filter: { 'role': 'eq.teacher' }
  }) || [];
  const tList = Array.isArray(teachers) ? teachers : [];
  
  const allPlayers = [...sList, ...tList.filter(t => !sList.find(s => s.id === t.id))];
  
  for (const s of allPlayers) {
    if (s.id === student.id) continue;
    const p = pList.find(pr => pr.student_id === s.id);
    const lastSeen = p ? new Date(p.last_seen) : null;
    const isOnline = lastSeen && (now - lastSeen) < 120000;
    const isTeacher = s.role === 'teacher';
    
    html += '<div class="player-card ' + (isOnline ? 'online' : '') + '" id="pl_' + s.id + '" onclick="selectPlayer(\'' + s.id + '\',\'' + s.first_name + '\',\'' + s.last_name + '\')">';
    html += '<div class="player-name">' + (isTeacher ? '👑 ' : '') + s.first_name + ' ' + s.last_name.charAt(0) + '.</div>';
    html += '<div style="font-size:.6rem;color:' + (isTeacher ? 'var(--gold)' : 'var(--muted)') + '">' + (isTeacher ? 'Prof' : s.class_name) + '</div>';
    html += '<div class="player-status" style="color:' + (isOnline ? 'var(--lo1)' : 'var(--muted)') + '">' + (isOnline ? '● En ligne' : '○ Hors ligne') + '</div>';
    html += '</div>';
  }
  
  grid.innerHTML = html || '<div style="text-align:center;color:var(--muted);padding:1rem">Aucun autre joueur trouvé.</div>';
}

function selectPlayer(id, first, last) {
  selectedOpponent = { id, name: first + ' ' + last.charAt(0) + '.' };
  document.querySelectorAll('.player-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('pl_' + id).classList.add('selected');
  document.getElementById('btnLaunch').disabled = false;
}

// ========== LAUNCH DUEL ==========
async function launchDuel() {
  if (!selectedExercise || !selectedOpponent) return;
  
  const qs = [...selectedExercise.questions].sort(() => Math.random() - 0.5);
  oppName = selectedOpponent.name;
  
  // Create duel in Supabase
  const res = await fetch(SB + '/cq_duels', {
    method: 'POST',
    headers: { 'apikey': AK, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify({
      player1_id: student.id,
      player2_id: selectedOpponent.id,
      status: 'waiting',
      questions: qs.map(q => ({ q: q.q, schema: q.schema, kw: q.kw, hint: q.hint })),
      unit_id: 4
    })
  }).then(r => r.json());
  
  duelId = Array.isArray(res) ? res[0]?.id : res?.id;
  if (!duelId) { alert('Erreur'); return; }
  
  goStep(3);
  document.getElementById('waitText').textContent = 'Défi envoyé à ' + oppName + ' !';
  document.getElementById('waitSub').textContent = 'Exercice : ' + selectedExercise.name + ' · En attente...';
  
  // Poll for acceptance
  pollInterval = setInterval(async () => {
    const chk = await fetch(SB + '/cq_duels?id=eq.' + duelId + '&select=status', { headers: { 'apikey': AK } }).then(r => r.json());
    if (Array.isArray(chk) && chk[0]?.status === 'playing') {
      clearInterval(pollInterval);
      startArena(qs, oppName);
    }
  }, 2000);
}

function startSoloDuel() {
  if (!selectedExercise) return;
  oppName = 'Bot SQL';
  const qs = [...selectedExercise.questions].sort(() => Math.random() - 0.5);
  startArena(qs, 'Bot SQL');
}

function cancelDuel() {
  if (pollInterval) clearInterval(pollInterval);
  if (duelId) fetch(SB + '/cq_duels?id=eq.' + duelId, { method: 'DELETE', headers: { 'apikey': AK } });
  goStep(2);
}

// ========== ARENA ==========
function startArena(qs, opp) {
  questions = qs; currentQ = 0; myScore = 0; oppScore = 0; oppName = opp; timeLeft = 300; _amP1 = null;
  
  goStep(4);
  document.getElementById('nameMe').textContent = student.first_name;
  document.getElementById('nameOpp').textContent = oppName;
  document.getElementById('exTitle').textContent = selectedExercise ? '⚔️ ' + selectedExercise.name : '';
  
  createCharacter(0, document.getElementById('charMe'), 30);
  createCharacter(3, document.getElementById('charOpp'), 30);
  
  showQ();
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timer').textContent = '⏱ ' + m + ':' + (s < 10 ? '0' : '') + s;
    if (timeLeft <= 60) document.getElementById('timer').style.color = 'var(--error)';
    if (timeLeft <= 0) endDuel();
  }, 1000);
  
  if (duelId && oppName !== 'Bot SQL') startScorePoll();
}

function showQ() {
  if (currentQ >= questions.length) { endDuel(); return; }
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = 'Question ' + (currentQ + 1) + '/' + questions.length;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qSchema').textContent = 'Tables: ' + q.schema;
  document.getElementById('sqlInput').value = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('sqlInput').focus();
}

function submitAnswer() {
  const input = document.getElementById('sqlInput').value.trim().toUpperCase();
  const q = questions[currentQ];
  const fb = document.getElementById('feedback');
  if (!input) { fb.textContent = 'Écrivez une réponse !'; fb.className = 'feedback no'; return; }
  
  let matched = 0;
  for (const kw of q.kw) { if (input.includes(kw.toUpperCase())) matched++; }
  
  if (matched / q.kw.length >= 0.7) {
    const pts = 10 + Math.max(0, Math.floor(timeLeft / 30));
    myScore += pts;
    document.getElementById('scoreMe').textContent = myScore;
    fb.innerHTML = '✅ +' + pts + ' pts !'; fb.className = 'feedback ok';
    syncScore();
    if (oppName === 'Bot SQL' && Math.random() < 0.45) { oppScore += 5 + Math.floor(Math.random() * 8); document.getElementById('scoreOpp').textContent = oppScore; }
    setTimeout(() => { currentQ++; showQ(); }, 1000);
  } else {
    fb.innerHTML = '❌ Indice : ' + (q.hint || 'Vérifiez les mots-clés SQL'); fb.className = 'feedback no';
    if (oppName === 'Bot SQL' && Math.random() < 0.25) { oppScore += 5 + Math.floor(Math.random() * 6); document.getElementById('scoreOpp').textContent = oppScore; }
  }
}

function skipQ() {
  const fb = document.getElementById('feedback');
  fb.innerHTML = 'Passée ! Indice : ' + (questions[currentQ].hint || ''); fb.className = 'feedback no';
  if (oppName === 'Bot SQL') { oppScore += 8; document.getElementById('scoreOpp').textContent = oppScore; }
  setTimeout(() => { currentQ++; showQ(); }, 1500);
}

// ========== SCORE SYNC ==========
async function syncScore() {
  if (!duelId) return;
  if (_amP1 === null) {
    const d = await fetch(SB + '/cq_duels?id=eq.' + duelId + '&select=player1_id', { headers: { 'apikey': AK } }).then(r => r.json()).catch(() => []);
    if (Array.isArray(d) && d[0]) _amP1 = d[0].player1_id === student.id;
  }
  const f = _amP1 ? 'player1_score' : 'player2_score';
  const b = {}; b[f] = myScore;
  fetch(SB + '/cq_duels?id=eq.' + duelId, { method: 'PATCH', headers: { 'apikey': AK, 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).catch(() => {});
}

function startScorePoll() {
  setInterval(async () => {
    if (_amP1 === null) return;
    const f = _amP1 ? 'player2_score' : 'player1_score';
    const d = await fetch(SB + '/cq_duels?id=eq.' + duelId + '&select=' + f, { headers: { 'apikey': AK } }).then(r => r.json()).catch(() => []);
    if (Array.isArray(d) && d[0]) {
      const ns = d[0][f] || 0;
      if (ns !== oppScore) { oppScore = ns; document.getElementById('scoreOpp').textContent = oppScore; document.getElementById('scoreOpp').style.textShadow = '0 0 10px var(--gold)'; setTimeout(() => document.getElementById('scoreOpp').style.textShadow = 'none', 500); }
    }
  }, 3000);
}

// ========== END DUEL ==========
function endDuel() {
  clearInterval(timerInterval);
  goStep(5);
  const won = myScore > oppScore, tie = myScore === oppScore;
  document.getElementById('winnerText').innerHTML = tie ? '<span style="color:var(--gold)">Égalité !</span>' : won ? '<span style="color:var(--lo1)">Victoire ! 🎉</span>' : '<span style="color:var(--error)">Défaite... 💪</span>';
  document.getElementById('recapText').textContent = (selectedExercise?.name || 'Duel') + ' · ' + questions.length + ' questions';
  document.getElementById('fNameMe').textContent = student.first_name;
  document.getElementById('fScoreMe').textContent = myScore;
  document.getElementById('fNameOpp').textContent = oppName;
  document.getElementById('fScoreOpp').textContent = oppScore;
  if (typeof saveGameScore === 'function') saveGameScore('duel-sql', myScore, 300 - timeLeft);
  if (duelId) fetch(SB + '/cq_duels?id=eq.' + duelId, { method: 'PATCH', headers: { 'apikey': AK, 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'finished' }) }).catch(() => {});
}

// ========== JOIN FROM URL ==========
async function checkJoinDuel() {
  const p = new URLSearchParams(window.location.search);
  const jid = p.get('duel');
  if (!jid) return false;
  const d = await fetch(SB + '/cq_duels?id=eq.' + jid + '&select=*', { headers: { 'apikey': AK } }).then(r => r.json());
  if (!Array.isArray(d) || !d[0]) return false;
  duelId = jid;
  const duel = d[0];
  const oppId = duel.player1_id === student.id ? duel.player2_id : duel.player1_id;
  const oppR = await fetch(SB + '/cq_students?id=eq.' + oppId + '&select=first_name,last_name', { headers: { 'apikey': AK } }).then(r => r.json());
  oppName = (Array.isArray(oppR) && oppR[0]) ? oppR[0].first_name + ' ' + oppR[0].last_name.charAt(0) + '.' : 'Adversaire';
  const qs = (duel.questions || []).map(q => ({ q: q.q, schema: q.schema, kw: q.kw, hint: q.hint }));
  selectedExercise = { name: 'Duel', questions: qs };
  startArena(qs, oppName);
  return true;
}

// Enter to submit
document.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey && document.getElementById('step4').classList.contains('active')) { e.preventDefault(); submitAnswer(); } });

// Init
(async () => { if (!(await checkJoinDuel())) { renderExercises(); } })();
</script>
