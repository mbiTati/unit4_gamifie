<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DataQuest — Connexion</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--success:#10b981}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(13,115,119,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(50,224,196,.08) 0%,transparent 40%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:1.5rem}
.logo .school{font-size:.65rem;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem}
.logo h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .unit{font-size:.78rem;color:var(--muted);margin-top:.3rem}
.tabs{display:flex;margin-bottom:1.5rem;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.tab{flex:1;padding:.55rem;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600}
.tab.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.input-wrap{position:relative}
.input-wrap input,.input-wrap select{width:100%;padding:.6rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.85rem}
.input-wrap input:focus,.input-wrap select:focus{outline:none;border-color:var(--accent2)}
.input-wrap .pwd-input{padding-right:2.5rem}
.eye-btn{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:.2rem}
.btn-login{width:100%;padding:.7rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:.3rem}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(13,115,119,.3)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.msg{font-size:.78rem;margin-top:.6rem;padding:.4rem .6rem;border-radius:6px;text-align:center;display:none}
.msg.error{background:rgba(239,68,68,.1);color:var(--error);border:1px solid rgba(239,68,68,.2);display:block}
.msg.success{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2);display:block}
.footer-links{text-align:center;margin-top:1.2rem;font-size:.72rem;color:var(--muted)}
.footer-links a{color:var(--accent2);text-decoration:none;font-weight:600}
.loading{display:none;text-align:center;padding:1rem}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="school">École Schulz</div>
    <h1>DataQuest</h1>
    <div class="unit">Unit 4 — Database Design & Development</div>
  </div>
  
  
  
  <div id="msgArea"></div>
  
  <div id="formArea">
    <!-- Signup-only fields -->
    
    
    <!-- Shared fields -->
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap"><input type="email" id="email" placeholder="votre.email@example.com" autocomplete="email"></div>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="password" class="pwd-input" placeholder="••••••••" autocomplete="current-password">
        <button class="eye-btn" onclick="togglePwd()">👁</button>
      </div>
    </div>
    
    <button class="btn-login" id="btnSubmit" onclick="handleSubmit()">Se connecter</button>
  </div>
  
  <div class="loading" id="loading"><div class="spinner"></div><div style="margin-top:.5rem;font-size:.78rem;color:var(--muted)">Chargement...</div></div>
  
  <div class="footer-links">
    <a href="../index.html">← Accéder au hub sans compte</a>
    <br><span style="font-size:.6rem;color:var(--muted)">Votre compte est créé par votre enseignant(e)</span>
  </div>
</div>

<script src="supabase-config.js"></script>
<script>


if (supabase.isLoggedIn()) {
  window.location.href = 'home.html';
}

-child`).classList.add('active');
  document.getElementById('signupFields').style.display = m === 'signup' ? 'block' : 'none';
  document.getElementById('btnSubmit').textContent = m === 'login' ? 'Se connecter' : "S'inscrire";
  document.getElementById('msgArea').innerHTML = '';
}

function togglePwd() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });

async function handleSubmit() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pwd = document.getElementById('password').value;
  const msgArea = document.getElementById('msgArea');
  msgArea.innerHTML = '';
  
  if (!email || !pwd) {
    msgArea.innerHTML = '<div class="msg error">Remplissez tous les champs.</div>';
    return;
  }
  
  document.getElementById('formArea').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  
  try {
    {
      const result = await supabase.signIn(email, pwd);
      if (result.access_token) {
        // Load or link student profile
        const students = await supabase.query('cq_students', { select: '*', filter: { 'email': `eq.${email}` } });
        if (students && students.length > 0) {
          // Link auth_id if not already set
          if (!students[0].auth_id && result.user) {
            await supabase.update('cq_students', { auth_id: result.user.id }, { 'id': `eq.${students[0].id}` });
          }
          localStorage.setItem('cq_student', JSON.stringify(students[0]));
          window.location.href = students[0].role === 'teacher' ? 'teacher.html' : 'home.html';
        } else {
          msgArea.innerHTML = '<div class="msg error">Profil non trouvé. Contactez votre enseignant ou inscrivez-vous.</div>';
          showForm();
        }
      } else {
        msgArea.innerHTML = `<div class="msg error">${result.error_description || 'Email ou mot de passe incorrect.'}</div>`;
        showForm();
      }
    } else {
      // SIGNUP
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const className = document.getElementById('className').value;
      const cohort = document.getElementById('cohort').value;
      
      if (!firstName || !lastName) {
        msgArea.innerHTML = '<div class="msg error">Prénom et nom requis.</div>';
        showForm(); return;
      }
      
      const result = await supabase.signUp(email, pwd);
      if (result.error) {
        msgArea.innerHTML = `<div class="msg error">${result.error.message || result.error}</div>`;
        showForm(); return;
      }
      
      // Create or link student profile
      const existing = await supabase.query('cq_students', { select: '*', filter: { 'email': `eq.${email}` } });
      
      if (existing && existing.length > 0) {
        // Pre-created by teacher — link auth_id
        if (result.user) {
          await supabase.update('cq_students', { auth_id: result.user.id }, { 'id': `eq.${existing[0].id}` });
        }
      } else {
        // Create new student profile
        await supabase.insert('cq_students', {
          email: email,
          first_name: firstName,
          last_name: lastName.toUpperCase(),
          class_name: className,
          cohort: cohort,
          role: 'student',
          auth_id: result.user?.id || null,
        });
      }
      
      msgArea.innerHTML = '<div class="msg success">Compte créé ! Connectez-vous maintenant.</div>';
      switchMode('login');
      showForm();
    }
  } catch (e) {
    msgArea.innerHTML = `<div class="msg error">Erreur : ${e.message}</div>`;
    showForm();
  }
}

function showForm() {
  document.getElementById('formArea').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}
</script>
</body>
</html>
