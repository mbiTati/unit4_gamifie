<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeQuest — Connexion</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(13,115,119,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(50,224,196,.08) 0%,transparent 40%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .unit{font-size:.8rem;color:var(--muted);margin-top:.3rem;letter-spacing:.1em;text-transform:uppercase}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:.7rem 1rem;padding-right:2.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.9rem;transition:border-color .2s}
.input-wrap input:focus{outline:none;border-color:var(--accent2)}
.eye-btn{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem}
.eye-btn:hover{color:var(--accent2)}
.btn-login{width:100%;padding:.8rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:.5rem}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(13,115,119,.3)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:.6rem 1rem;color:var(--error);font-size:.8rem;margin-bottom:1rem;display:none}
.footer-links{text-align:center;margin-top:1.5rem;font-size:.78rem;color:var(--muted)}
.footer-links a{color:var(--accent2);text-decoration:none;font-weight:600}
.footer-links a:hover{text-decoration:underline}
.loading{display:none;text-align:center;padding:1rem}
.loading .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>CodeQuest</h1>
    <div class="unit">Unit 4 — Database Design & Development</div>
  </div>
  
  <div class="error-msg" id="errorMsg"></div>
  
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="votre.email@example.com" autocomplete="email">
      </div>
    </div>
    
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="eye-btn" onclick="togglePwd()" id="eyeBtn">👁</button>
      </div>
    </div>
    
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Se connecter</button>
  </div>
  
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="margin-top:.5rem;font-size:.8rem;color:var(--muted)">Connexion en cours...</div>
  </div>
  
  <div class="footer-links">
    <a href="index.html">← Accéder sans compte</a>
    <br><br>
    <span style="font-size:.65rem">Mot de passe par défaut : Schulz2025!</span>
  </div>
</div>

<script src="supabase-config.js"></script>
<script>
// Check if already logged in
if (supabase.isLoggedIn()) {
  window.location.href = 'home.html';
}

function togglePwd() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🔒';
  } else {
    inp.type = 'password';
    btn.textContent = '👁';
  }
}

// Enter key
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  
  if (!email || !pwd) {
    errEl.textContent = 'Veuillez remplir tous les champs.';
    errEl.style.display = 'block';
    return;
  }
  
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('btnLogin').disabled = true;
  
  try {
    const result = await supabase.signIn(email, pwd);
    
    if (result.access_token) {
      // Check if student profile exists
      const students = await supabase.query('cq_students', {
        select: '*',
        filter: { 'email': `eq.${email}` }
      });
      
      if (students && students.length > 0) {
        localStorage.setItem('cq_student', JSON.stringify(students[0]));
        window.location.href = 'home.html';
      } else {
        errEl.textContent = 'Profil étudiant non trouvé. Contactez votre enseignant.';
        errEl.style.display = 'block';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('btnLogin').disabled = false;
      }
    } else {
      errEl.textContent = result.error_description || result.msg || 'Email ou mot de passe incorrect.';
      errEl.style.display = 'block';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('btnLogin').disabled = false;
    }
  } catch (e) {
    errEl.textContent = 'Erreur de connexion. Vérifiez votre connexion internet.';
    errEl.style.display = 'block';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btnLogin').disabled = false;
  }
}
</script>
</body>
</html>
