<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeQuest — Dashboard Enseignant</title>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--text:#e2e8f0;--muted:#94a3b8;--border:#1e3a5f;--accent:#0D7377;--accent2:#32E0C4;--gold:#F59E0B;--error:#ef4444;--lo1:#10b981;--lo2:#3b82f6;--lo3:#f59e0b;--lo4:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.topbar h1{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;gap:.8rem;align-items:center}
.topbar-right a,.topbar-right button{color:var(--muted);text-decoration:none;font-size:.75rem;font-weight:600;background:none;border:1px solid var(--border);padding:.3rem .6rem;border-radius:5px;cursor:pointer;font-family:inherit}
.main{max-width:1100px;margin:0 auto;padding:1.5rem}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem;margin-bottom:1.5rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
.kpi .n{font-size:2rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.kpi .l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.3rem}
.alert{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.82rem}
.alert strong{color:var(--error)}
.section-title{font-size:1.1rem;font-weight:700;margin:1.5rem 0 .8rem}
.students-table{width:100%;border-collapse:collapse;font-size:.8rem}
.students-table th{background:var(--surface);color:var(--accent2);font-weight:700;padding:.6rem .8rem;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0}
.students-table td{padding:.5rem .8rem;border-bottom:1px solid var(--border)}
.students-table tr:hover{background:rgba(50,224,196,.03)}
.bar{height:8px;background:var(--surface);border-radius:4px;min-width:80px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.danger{color:var(--error);font-weight:700}
.comments-section{margin-top:1.5rem}
.comment-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.8rem;margin-bottom:.5rem}
.comment-card .meta{font-size:.7rem;color:var(--muted);margin-bottom:.3rem}
.comment-card .msg{font-size:.82rem}
.tab-bar{display:flex;gap:.3rem;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.3rem}
.tab{padding:.4rem .8rem;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--muted);border-radius:6px 6px 0 0;border:none;background:none;font-family:inherit}
.tab.active{color:var(--accent2);border-bottom:2px solid var(--accent2)}
</style>
</head>
<body>
<div class="topbar">
  <h1>CodeQuest — Dashboard Enseignant</h1>
  <div class="topbar-right">
    <a href="home.html">Accueil</a>
    <a href="../index.html">Hub Cours</a>
    <a href="../enseignant.html">Espace Documents</a>
    <button onclick="supabase.signOut();localStorage.removeItem('cq_student');location.href='login.html'">Déconnexion</button>
  </div>
</div>

<div class="main">
  <div class="kpis" id="kpis">
    <div class="kpi"><div class="n" id="kpiStudents">-</div><div class="l">Élèves</div></div>
    <div class="kpi"><div class="n" id="kpiAvgProgress">-</div><div class="l">Progression moyenne</div></div>
    <div class="kpi"><div class="n" id="kpiAvgQuiz">-</div><div class="l">Score Quiz moyen</div></div>
    <div class="kpi"><div class="n" id="kpiComments">-</div><div class="l">Questions en attente</div></div>
  </div>
  
  <div id="alerts"></div>
  
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('progress',this)">Progression</button>
    <button class="tab" onclick="showTab('comments',this)">Questions élèves</button>
  </div>
  
  <div id="progressTab">
    <div style="overflow-x:auto">
      <table class="students-table" id="studentsTable">
        <thead><tr>
          <th>Élève</th>
          <th>Niveau</th>
          <th>XP</th>
          <th>Modules</th>
          <th>Progression</th>
          <th>Quiz moyen</th>
        </tr></thead>
        <tbody id="studentsBody"></tbody>
      </table>
    </div>
  </div>
  
  <div id="commentsTab" style="display:none">
    <div id="commentsList"><div style="color:var(--muted);font-size:.85rem">Chargement...</div></div>
  </div>
</div>

<script src="supabase-config.js"></script>
<script>
function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('progressTab').style.display = tab === 'progress' ? 'block' : 'none';
  document.getElementById('commentsTab').style.display = tab === 'comments' ? 'block' : 'none';
}

async function loadTeacherDashboard() {
  const student = JSON.parse(localStorage.getItem('cq_student') || 'null');
  if (!student || student.role !== 'teacher') {
    document.querySelector('.main').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--error)">Accès réservé aux enseignants.<br><a href="login.html" style="color:var(--accent2)">Se connecter</a></div>';
    return;
  }
  
  // Load all students
  const students = await supabase.query('cq_students', {
    select: '*',
    filter: { 'role': 'eq.student', 'class_name': 'eq.BI1' },
    order: 'last_name.asc'
  });
  
  // Load all progress for Unit 4 modules (401-420)
  const allProgress = await supabase.query('cq_student_progress', {
    select: '*',
    filter: { 'module_id': 'gte.401' }
  }) || [];
  
  // Load comments
  const comments = await supabase.query('cq_comments', {
    select: '*',
    order: 'created_at.desc',
    limit: 20
  }) || [];
  
  // KPIs
  document.getElementById('kpiStudents').textContent = students.length;
  
  // Build student data
  const tbody = document.getElementById('studentsBody');
  let totalProgress = 0;
  let totalQuiz = 0;
  let quizCount = 0;
  const alertsHTML = [];
  
  tbody.innerHTML = '';
  for (const s of students) {
    const sp = allProgress.filter(p => p.student_id === s.id && p.module_id >= 401 && p.module_id <= 420);
    const completed = sp.filter(p => p.completed_at).length;
    const pct = Math.round(completed / 20 * 100);
    totalProgress += pct;
    
    let xp = 0;
    let quizAvg = '-';
    const quizScores = [];
    for (const p of sp) {
      xp += (p.credits_earned || 0) + (p.game_score || 0);
      if (p.quiz_score !== null && p.total_questions > 0) {
        quizScores.push(Math.round(p.quiz_score / p.total_questions * 100));
      }
    }
    if (quizScores.length > 0) {
      quizAvg = Math.round(quizScores.reduce((a,b)=>a+b,0) / quizScores.length) + '%';
      totalQuiz += parseInt(quizAvg);
      quizCount++;
    }
    
    const level = getLevel(xp);
    const barColor = pct < 30 ? 'var(--error)' : pct < 60 ? 'var(--gold)' : 'var(--lo1)';
    
    if (pct < 20 && sp.length > 0) {
      alertsHTML.push(`<div class="alert"><strong>⚠ ${s.first_name} ${s.last_name}</strong> — progression très faible (${pct}%). Intervention recommandée.</div>`);
    }
    
    tbody.innerHTML += `<tr>
      <td><strong>${s.first_name} ${s.last_name}</strong></td>
      <td><span style="color:${level.color};font-weight:700;font-size:.75rem">${level.name}</span></td>
      <td style="font-family:monospace;font-weight:600">${xp}</td>
      <td>${completed}/20</td>
      <td><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div><span style="font-size:.65rem;color:var(--muted)">${pct}%</span></td>
      <td class="${parseInt(quizAvg) < 40 ? 'danger' : ''}">${quizAvg}</td>
    </tr>`;
  }
  
  document.getElementById('kpiAvgProgress').textContent = students.length > 0 ? Math.round(totalProgress / students.length) + '%' : '-';
  document.getElementById('kpiAvgQuiz').textContent = quizCount > 0 ? Math.round(totalQuiz / quizCount) + '%' : '-';
  document.getElementById('kpiComments').textContent = comments.filter(c => !c.resolved).length || 0;
  document.getElementById('alerts').innerHTML = alertsHTML.join('');
  
  // Comments
  const commentsList = document.getElementById('commentsList');
  if (comments.length === 0) {
    commentsList.innerHTML = '<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:1rem">Aucune question pour le moment.</div>';
  } else {
    commentsList.innerHTML = comments.map(c => {
      const s = students.find(st => st.id === c.student_id);
      return `<div class="comment-card">
        <div class="meta">${s ? s.first_name + ' ' + s.last_name : 'Anonyme'} — ${new Date(c.created_at).toLocaleDateString('fr-CH')} ${new Date(c.created_at).toLocaleTimeString('fr-CH', {hour:'2-digit',minute:'2-digit'})}</div>
        <div class="msg">${c.content || c.message || ''}</div>
      </div>`;
    }).join('');
  }
}

loadTeacherDashboard();
</script>
</body>
</html>
